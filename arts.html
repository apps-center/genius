ue. Wilde écrit ce roman six ans après l'invention de la photographie commerciale."}],"quiz":{"q":"Quel pacte implicite Dorian Gray réalise-t-il au début du roman ?","r":"Son portrait vieillit et se dégrade à sa place, pendant que lui conserve éternellement sa beauté et sa jeunesse","hint":"Ce vœu formulé devant le peintre Basil Hallward est la mécanique centrale de tout le roman"},"era_disc":"Symbolisme","era_disc_start":1880}]},{"era":"Art Nouveau / Symbolisme","events":[{"title":"Le Baiser — Gustav Klimt","artiste":"Gustav Klimt","date":"1907–1908","mouvement":"Art Nouveau / Symbolisme","discipline":"Peinture","img":"img/arts/le baiser.webp","musee":"Österreichische Galerie Belvedere, Vienne","technique":"Huile sur toile avec feuilles d'or, 180 × 180 cm","desc":"Deux amants enlacés, drapés d'un manteau orné de motifs géométriques et floraux en feuilles d'or et d'argent, s'embrassent au bord d'un précipice fleuri. Ce tableau est le symbole absolu de la 'période dorée' de Klimt — une fusion entre arts décoratifs, symbolisme et sensualité. Les feuilles d'or réelles donnent à l'œuvre une aura quasi sacrée.","anecdotes":[{"e":"💛","t":"<b>Klimt a utilisé de vraies feuilles d'or.</b> Fils d'un graveur, il connaissait les techniques orfévristes. L'or, l'argent et le platine réels sont appliqués sur la toile. Cette technique, inspirée des mosaïques byzantines vues lors d'un voyage à Ravenne, donne à ses tableaux leur caractère à la fois précieux et spirituel."},{"e":"😶","t":"<b>On ne voit pas le visage de l'homme.</b> Le visage de l'amant est caché — seul celui de la femme est visible, les yeux fermés. Klimt laisse délibérément l'homme dans l'anonymat. Certains historiens pensent que c'est un autoportrait avec Emilie Flöge, son amie de toujours."},{"e":"🏛️","t":"<b>L'Autriche refusa de laisser sortir le tableau.</b> Acheté par la Galerie du Belvédère en 1908, Le Baiser ne quitta presque jamais l'Autriche. En 1938, lors de l'Anschluss, les nazis cataloguèrent l'œuvre mais ne purent s'en emparer — elle était propriété de l'État autrichien."}],"quiz":{"q":"Quelle technique décorative, inspirée des mosaïques byzantines de Ravenne, Klimt utilise-t-il dans Le Baiser ?","r":"L'application de vraies feuilles d'or et d'argent sur la toile — une technique héritée de son père graveur","hint":"Ce voyage en Italie fut une révélation pour Klimt — il vit les mosaïques de Ravenne et décida d'intégrer l'or à sa peinture"},"era_disc":"Art Nouveau / Symbolisme","era_disc_start":1890},{"title":"Le Cri — Edvard Munch","artiste":"Edvard Munch","date":"1893","mouvement":"Art Nouveau / Symbolisme","discipline":"Peinture","img":"img/arts/le cri 2.webp","musee":"Galerie nationale, Oslo","technique":"Tempera et pastel sur carton, 91 × 73,5 cm","desc":"Une figure androgyine à la tête de crâne se tord les mains sur un pont tandis que le ciel tourbillonne en rouge et orange. Ce n'est pas le cri d'une personne — c'est le cri de la nature tout entière qui envahit la tête du personnage. Munch nota dans son journal : 'J'entendis un cri infini déchirer la nature.' Le tableau est devenu le symbole universel de l'angoisse moderne.","anecdotes":[{"e":"🌋","t":"<b>Le ciel rouge pourrait être dû à l'éruption du Krakatoa.</b> En 1883, le volcan indonésien projeta des cendres dans la stratosphère, créant des couchers de soleil rouges extraordinaires dans toute l'Europe pendant des mois. Munch a peut-être observé ce phénomène depuis le fjord d'Oslo."},{"e":"✏️","t":"<b>Munch a écrit le texte du tableau sur le tableau.</b> Dans le coin supérieur gauche de la version au pastel, on peut lire : 'Kan kun være malet af en gal Mand' (Ceci ne peut avoir été peint que par un fou). Ce texte fut longtemps attribué à un vandale — on découvrit en 2021 qu'il s'agissait bien de l'écriture de Munch."},{"e":"🔓","t":"<b>Le tableau a été volé deux fois.</b> En 1994, il fut dérobé du Musée national d'Oslo pendant les Jeux olympiques de Lillehammer. En 2004, une autre version fut volée au Munch Museum en plein jour, par des hommes armés. Les deux fois, les œuvres furent récupérées."}],"quiz":{"q":"Selon son journal, qu'est-ce que Munch 'entend' au moment d'avoir la vision qui l'inspire ?","r":"'Un cri infini déchirant la nature' — ce n'est pas lui qui crie, c'est la nature entière qui hurle en lui","hint":"La figure au centre ne crie pas — elle se bouche les oreilles face au cri du monde qui l'envahit"},"era_disc":"Art Nouveau / Symbolisme","era_disc_start":1890},{"title":"Le Voyage de Chihiro — Hayao Miyazaki","artiste":"Hayao Miyazaki / Studio Ghibli","date":"2001","mouvement":"Cinéma d'auteur","discipline":"Cinéma","img":"img/arts/le voyage de chihiro.webp","musee":"Studio Ghibli, Tokyo","technique":"Film d'animation, 125 min","desc":"Chihiro, une fillette de 10 ans, pénètre par accident dans le monde des esprits japonais. Ses parents transformés en cochons, elle doit travailler dans les thermes d'une sorcière pour les sauver. Ce film d'animation est le plus grand succès de l'histoire du cinéma japonais, Oscar du meilleur film d'animation en 2003, et l'une des œuvres les plus poétiques et inventives de la culture mondiale.","anecdotes":[{"e":"🐷","t":"<b>Le film est une critique voilée de la société de consommation.</b> Les parents de Chihiro se transforment en cochons pour avoir mangé gloutonnement sans permission — la gourmandise et l'avidité matérielle sont leur perte. Miyazaki décrit une société japonaise qui a oublié ses racines spirituelles pour le consumérisme."},{"e":"🥇","t":"<b>Il a détrôné Titanic au box-office japonais en 2001.</b> Avec 304 millions de dollars de recettes mondiales, il resta le film le plus vu au Japon pendant 20 ans — jusqu'à ce que Demon Slayer le détrône en 2020. En 2022, une ressortie en salles lui rendit sa première place."},{"e":"🎨","t":"<b>Miyazaki a dessiné personnellement des milliers d'images-clés.</b> Dans le processus d'animation japonais, le réalisateur dessine les images 'clés' à la main. Pour Le Voyage de Chihiro, Miyazaki supervisa l'animation de façon quasi obsessionnelle, refusant les processus numériques pour de nombreuses séquences."}],"quiz":{"q":"Pourquoi les parents de Chihiro se transforment-ils en cochons dans le film ?","r":"Pour avoir mangé gloutonnement de la nourriture des esprits sans permission — symbole de la gourmandise et du consumérisme","hint":"Miyazaki critique la société de consommation japonaise à travers cette punition symbolique"},"era_disc":"Ère numérique","era_disc_start":2000},{"title":"Pelléas et Mélisande — Claude Debussy","artiste":"Claude Debussy","date":"1902","mouvement":"Modernité musicale","discipline":"Musique","img":"img/arts/debussy.webp","musee":"Opéra-Comique, Paris (création)","technique":"Opéra en 5 actes","desc":"Unique opéra de Debussy, Pelléas et Mélisande est considéré comme le chef-d'œuvre de l'impressionnisme musical. Basé sur la pièce symboliste de Maeterlinck, il raconte l'amour interdit de deux âmes dans un château médiéval brumeux. La musique refuse les effets wagnériens : elle murmure, suggère, laisse des silences. Debussy invente ici un langage musical entièrement nouveau.","anecdotes":[{"e":"🌊","t":"<b>Debussy passa dix ans à composer cet opéra.</b> Il y travailla de 1893 à 1902, recommençant plusieurs fois des actes entiers. Sa méthode : rester le plus près possible de la prosodie naturelle du français, éviter les grands airs et les effets dramatiques de l'opéra traditionnel."},{"e":"😤","t":"<b>Maeterlinck détestait la mise en scène de la création.</b> Le dramaturge belge avait voulu que sa compagne chante le rôle de Mélisande. Debussy choisit une autre soprano. Maeterlinck publia une lettre ouverte souhaitant 'l'échec immédiat et retentissant' de l'œuvre. Elle fut un triomphe."},{"e":"🎹","t":"<b>Debussy invente l'harmonie impressionniste.</b> Il utilise des gammes pentatoniques, des accords de neuvième flottants, des modalités médiévales — tout ce que l'harmonie académique germanique proscrivait. Cette liberté harmonique influencera directement le jazz et toute la musique du XXe siècle."}],"quiz":{"q":"Quelle philosophie musicale Debussy oppose-t-il à Wagner dans Pelléas et Mélisande ?","r":"Suggérer plutôt qu'affirmer — la musique murmure, laisse des silences, refuse les grands effets dramatiques wagnériens","hint":"Debussy voulait rester le plus proche possible de la prosodie naturelle du français parlé"},"era_disc":"La modernité","era_disc_start":1900}]},{"era":"Modernisme","events":[{"title":"La Persistance de la Mémoire — Salvador Dalí","artiste":"Salvador Dalí","date":"1931","mouvement":"Modernisme","discipline":"Peinture","img":"img/arts/persistance de la memoire.webp","musee":"Museum of Modern Art (MoMA), New York","technique":"Huile sur toile, 24 × 33 cm","desc":"Les montres molles qui fondent sur un paysage de Cap Creus en Catalogne sont l'image surréaliste la plus connue au monde. Dalí dit avoir eu l'idée en regardant fondre un camembert. Le tableau illustre la conception freudienne du temps dans les rêves — le temps n'y est pas linéaire, il se distord.","anecdotes":[{"e":"🧀","t":"<b>L'idée vint d'un camembert trop mûr.</b> Dalí raconte : 'Je m'assis à table pour manger et vis un camembert qui fondait. Je le regardai et aussitôt l'idée des montres molles me vint.' Il aurait réalisé ce tableau en moins de deux heures."},{"e":"🪰","t":"<b>La montre couverte de fourmis représente la décomposition et la mort.</b> Les fourmis apparaissent souvent dans les œuvres de Dalí — symbole de putréfaction, d'angoisse et d'obsession."},{"e":"📏","t":"<b>Ce chef-d'œuvre est minuscule.</b> 24 × 33 cm — environ la taille d'une tablette numérique. Dalí préférait peindre petit pour atteindre une précision quasi photographique, inspirée des maîtres flamands du XVe siècle."}],"quiz":{"q":"Quelle vision quotidienne aurait inspiré à Dalí l'idée des montres molles ?","r":"Un camembert trop mûr qui fondait — il aurait peint le tableau en moins de deux heures","hint":"Ce fromage normand, observé pendant un repas, aurait déclenché l'une des images les plus célèbres de l'art"},"era_disc":"Modernisme","era_disc_start":1900},{"title":"Guernica — Pablo Picasso","artiste":"Pablo Picasso","date":"1937","mouvement":"Modernisme","discipline":"Peinture","img":"img/arts/guernica.webp","musee":"Museo Reina Sofía, Madrid","technique":"Huile sur toile, 349,3 × 776,6 cm","desc":"Guernica est la réponse de Picasso au bombardement de la ville basque de Guernica par l'aviation nazie et franquiste le 26 avril 1937. Peint en noir, blanc et gris — les couleurs des photographies de presse — en quelques semaines, ce tableau de presque 8 mètres de large est devenu le symbole universel contre la guerre.","anecdotes":[{"e":"🕊️","t":"<b>Un officier nazi demanda à Picasso : 'C'est vous qui avez fait ça ?'</b> Dans son atelier à Paris pendant l'Occupation, Picasso répondit : 'Non, c'est vous.' Cette anecdote symbolise l'engagement politique de l'œuvre."},{"e":"✊","t":"<b>Le tableau vécut en exil 43 ans.</b> Picasso le confia au MoMA de New York avec instruction formelle : il ne devait retourner en Espagne que lorsque la liberté y serait rétablie. Le tableau rentra à Madrid en 1981."},{"e":"🐴","t":"<b>Les symboles sont délibérément ambigus.</b> Picasso refusa toujours d'expliquer la signification du taureau, du cheval agonisant ou de la lampe. 'Le taureau est un taureau et le cheval un cheval', dit-il."}],"quiz":{"q":"Pourquoi Picasso a-t-il peint Guernica uniquement en noir, blanc et gris ?","r":"Pour évoquer les couleurs des photographies de presse et des journaux — ancrer l'œuvre dans la réalité documentaire","hint":"La couleur aurait rendu la scène 'belle' — le noir et blanc la rend témoignage"},"era_disc":"Modernisme","era_disc_start":1900},{"title":"Les Demoiselles d'Avignon — Pablo Picasso","artiste":"Pablo Picasso","date":"1907","mouvement":"Modernisme","discipline":"Peinture","img":"img/arts/demoiselles d'avignon.webp","musee":"Museum of Modern Art (MoMA), New York","technique":"Huile sur toile, 243,9 × 233,7 cm","desc":"Ce tableau choc marque la naissance du Cubisme et révolutionne toute l'histoire de l'art. Picasso représente cinq femmes nues en fragmentant leurs corps en facettes géométriques, montrant plusieurs angles simultanément. Les deux figures de droite, aux visages comme des masques africains, indiquent l'influence de l'art tribal sur Picasso.","anecdotes":[{"e":"😱","t":"<b>Même ses amis proches furent choqués.</b> Matisse fut scandalisé. Degas hocha la tête de désapprobation. Seule Gertrude Stein soutint Picasso. Le tableau ne fut montré au public qu'en 1916 — neuf ans après sa création."},{"e":"🌍","t":"<b>C'est l'art africain qui a tout changé.</b> Picasso visita une exposition d'art africain et océanien au Trocadéro en 1907. Les masques africains lui révélèrent une façon de représenter le visage humain tel qu'il est pensé, avec plusieurs faces simultanées."},{"e":"🖼️","t":"<b>Picasso travailla avec une centaine d'études préparatoires.</b> La composition originale incluait deux hommes. Peu à peu, Picasso les supprima pour garder les cinq femmes dans leur confrontation directe avec le spectateur."}],"quiz":{"q":"Quelle découverte artistique a transformé la peinture des deux figures de droite dans Les Demoiselles d'Avignon ?","r":"L'art africain et océanien — Picasso fut bouleversé par les masques africains vus au Trocadéro en 1907","hint":"Ces masques représentent le visage tel qu'il est pensé, pas tel qu'il est vu — plusieurs faces simultanées"},"era_disc":"Modernisme","era_disc_start":1900},{"title":"La Danse — Henri Matisse","artiste":"Henri Matisse","date":"1910","mouvement":"Modernisme","discipline":"Peinture","img":"img/arts/la danse.webp","musee":"Musée de l'Ermitage, Saint-Pétersbourg","technique":"Huile sur toile, 260 × 391 cm","desc":"Cinq figures nues forment une ronde dans un espace réduit à trois aplats de couleurs : le bleu du ciel, le vert de la colline, le rouge-brique des corps. Matisse simplifie tout à l'extrême — plus d'ombres, plus de profondeur, plus de détails.","anecdotes":[{"e":"🎨","t":"<b>Matisse a réduit la peinture à ses éléments essentiels.</b> Pas de perspective, pas d'ombre, pas de détail anatomique. Juste la couleur et la ligne. Cette radicalité influencera tout l'art abstrait du XXe siècle."},{"e":"🩺","t":"<b>Matisse était destiné à être avocat.</b> Cloué au lit par une appendicite à 20 ans, sa mère lui offrit une boîte de couleurs pour passer le temps. Il découvrit 'une sorte de paradis' et abandonna le droit."},{"e":"✂️","t":"<b>Immobilisé à 70 ans, Matisse inventa les 'papiers découpés'.</b> Ne pouvant plus peindre debout, il demanda à ses assistants de peindre de grandes feuilles en aplats de couleurs, qu'il découpait et composait depuis son fauteuil."}],"quiz":{"q":"À combien de couleurs Matisse a-t-il réduit La Danse, et lesquelles ?","r":"Trois : bleu du ciel, vert de la colline, rouge-brique des corps — plus d'ombres ni de détails","hint":"Cette radicalité — tout simplifier à l'extrême — influencera tout l'art abstrait du siècle suivant"},"era_disc":"Modernisme","era_disc_start":1900},{"title":"Composition VIII — Wassily Kandinsky","artiste":"Wassily Kandinsky","date":"1923","mouvement":"Modernisme","discipline":"Peinture","img":"img/arts/kandinsky.webp","musee":"Solomon R. Guggenheim Museum, New York","technique":"Huile sur toile, 140 × 201 cm","desc":"Kandinsky est considéré comme le père de la peinture abstraite. Dans Composition VIII, formes géométriques — cercles, triangles, lignes — s'organisent dans un espace sans référence au monde visible. Pour Kandinsky, les formes et les couleurs ont des équivalents émotionnels et musicaux.","anecdotes":[{"e":"🎵","t":"<b>Kandinsky 'entendait' les couleurs et 'voyait' la musique.</b> Il souffrait de synesthésie — un croisement des sens qui lui faisait associer sons et couleurs. En entendant Wagner, il voyait des couleurs."},{"e":"📚","t":"<b>Son livre 'Du Spirituel dans l'Art' (1912) est la bible de l'abstraction.</b> Il y théorise que chaque couleur a une 'résonance intérieure' — le jaune est actif et irritant, le bleu est profond et céleste, le rouge brûle."},{"e":"🏫","t":"<b>Kandinsky enseigna au Bauhaus aux côtés de Klee et Moholy-Nagy.</b> Lorsque les nazis fermèrent le Bauhaus en 1933, Kandinsky s'exila à Paris, où il mourut en 1944."}],"quiz":{"q":"Pourquoi Kandinsky comparait-il la peinture abstraite à la musique ?","r":"Il souffrait de synesthésie et associait sons et couleurs — pour lui, la peinture pouvait toucher l'âme directement, sans représenter le monde visible","hint":"En entendant Wagner, il voyait des couleurs — cette condition rare fut sa révélation artistique"},"era_disc":"Modernisme","era_disc_start":1900},{"title":"Metropolis — Fritz Lang","artiste":"Fritz Lang","date":"1927","mouvement":"Muet & Expressionnisme","discipline":"Cinéma","img":"img/arts/Metropolis.webp","musee":"Universum Film AG (UFA), Berlin","technique":"Film muet, 153 min (version restaurée 2010)","desc":"Dans une mégapole futuriste du XXIIe siècle, les élites vivent dans des tours lumineuses pendant que les ouvriers s'épuisent dans des souterrains. Freder, fils du maître de la ville, descend dans les profondeurs et découvre Maria, prophétesse ouvrière. Premier grand film de science-fiction, Metropolis invente visuellement l'imaginaire dystopique qui inspirera tout le cinéma à venir.","anecdotes":[{"e":"🤖","t":"<b>Le robot féminin de Metropolis est l'ancêtre de tous les robots du cinéma.</b> Maschinenmensch, la femme-robot à l'armure d'or, a directement inspiré C-3PO de Star Wars, le robot de Terminator, et d'innombrables autres. Son design, créé par le sculpteur Walter Schulze-Mittendorff, est l'image emblématique de la science-fiction."},{"e":"🔥","t":"<b>Le film coûta une fortune et ruina la UFA.</b> Le tournage de 17 mois mobilisa 36 000 figurants et 1 million de mètres de pellicule. Son coût catapulta le studio dans la faillite. Pourtant, c'est l'un des films les plus influents de l'histoire du cinéma."},{"e":"🎵","t":"<b>Giorgio Moroder en fit une version musicale en 1984.</b> Le compositeur électronique ajouta une bande originale rock avec Freddie Mercury, Bonnie Tyler et Pat Benatar. Cette version, d'abord scandaleuse pour les puristes, contribua à faire redécouvrir le film à toute une génération."}],"quiz":{"q":"Quelle créature emblématique de Metropolis a directement inspiré C-3PO dans Star Wars ?","r":"Maschinenmensch, la femme-robot à l'armure d'or — dont le design fut directement copié par George Lucas","hint":"Fritz Lang invente ici l'archétype visuel du robot humanoïde qui hantera tout le cinéma du XXe siècle"},"era_disc":"Cinéma muet","era_disc_start":1910},{"title":"À la Recherche du Temps Perdu — Marcel Proust","artiste":"Marcel Proust","date":"1913–1927","mouvement":"Modernisme littéraire","discipline":"Littérature","img":"img/arts/a la recherche du temps perdu.webp","musee":"Éditions Grasset puis Gallimard, Paris","technique":"Roman en 7 volumes, 3 000 pages","desc":"Le narrateur, Marcel, trempe une madeleine dans du thé et est soudain submergé par le souvenir de son enfance à Combray. Cette involuntary memory déclenche le roman le plus long et le plus ambitieux de la littérature française. Proust explore la mémoire, le temps, l'amour, la jalousie et la société aristocratique de la Belle Époque à travers un style de phrases interminables et précises.","anecdotes":[{"e":"🍪","t":"<b>La madeleine n'était pas une madeleine dans la première version.</b> Dans les brouillons, le souvenir était déclenché par une biscotte, puis un morceau de pain grillé. C'est seulement en révisant que Proust choisit la madeleine — plus poétique, plus ronde, plus symboliquement féminine et enfantine."},{"e":"🛏️","t":"<b>Proust écrivait couché dans une chambre tapissée de liège.</b> Souffrant d'asthme sévère, il fit tapisser sa chambre de liège pour atténuer les bruits et filtrer les pollens. Il écrivait la nuit, au lit, dans une chaleur étouffante, les carnets de brouillon posés sur ses genoux."},{"e":"📚","t":"<b>C'est le plus long roman de la littérature mondiale.</b> Avec ses 3 000 pages et 1,5 million de mots, il dépasse Guerre et Paix et Les Misérables. La première édition fut refusée par Gallimard — André Gide s'en mordit les doigts toute sa vie."}],"quiz":{"q":"Quel aliment trempe le narrateur dans son thé, déclenchant le torrent de souvenirs qui ouvre À la Recherche du Temps Perdu ?","r":"Une madeleine — dont le goût fait resurgir involontairement toute son enfance à Combray","hint":"Ce moment est devenu le symbole de la 'mémoire involontaire' — un souvenir déclenché par un sens, non par la volonté"},"era_disc":"Littérature moderne & contemporaine","era_disc_start":1900},{"title":"Le Voyage dans la Lune — Georges Méliès","artiste":"Georges Méliès","date":"1902","mouvement":"Débuts du cinéma","discipline":"Cinéma","era_disc":"Débuts du cinéma","era_disc_start":1895,"img":"img/arts/Le_Voyage_dans_la_lune.webp","musee":"Production Star Film, Paris","technique":"Film muet, 14 min, noir et blanc colorié","desc":"Premier film de science-fiction de l'histoire du cinéma, Le Voyage dans la Lune adapte Jules Verne et H.G. Wells. Des savants sont propulsés sur la Lune dans un obus, rencontrent des Sélénites et reviennent sur Terre. Méliès invente les effets spéciaux, les trucages, les transitions — et pose les bases du cinéma comme art du rêve et de l'illusion.","anecdotes":[{"e":"🎩","t":"<b>Méliès était prestidigitateur avant d'être cinéaste.</b> Directeur du Théâtre Robert-Houdin à Paris, il appliqua ses techniques de magie au cinéma : arrêts caméra, substitutions, fondus. Il découvrit accidentellement les trucages quand sa caméra se bloqua en filmant la rue — un omnibus se transforma en corbillard."},{"e":"🔵","t":"<b>Le film était colorié à la main, image par image.</b> Méliès employait des dizaines de femmes pour colorier chaque photogramme avec de minuscules pinceaux. La version colorée fut retrouvée en 1993 dans un état de décomposition avancé — une restauration numérique de plusieurs années la rendit au monde en 2011."},{"e":"😢","t":"<b>Méliès mourut ruiné et oublié.</b> Incapable de s'adapter au cinéma industriel, il vendit ses films pour en récupérer l'argent de la pellicule — détruisant ainsi une grande partie de son œuvre. Redécouvert dans les années 1920, il terminait ses jours dans un kiosque à bonbons à Paris quand des cinéphiles le retrouvèrent."}],"quiz":{"q":"Comment Méliès découvrit-il accidentellement les effets spéciaux cinématographiques ?","r":"Sa caméra se bloqua en filmant la rue — à la projection, un omnibus semblait se transformer en corbillard par magie","hint":"Ce hasard technique devint la base de toute sa carrière de prestidigitateur du cinéma"}},{"title":"M le Maudit — Fritz Lang","artiste":"Fritz Lang","date":"1931","mouvement":"Cinéma parlant","discipline":"Cinéma","era_disc":"Cinéma parlant","era_disc_start":1927,"img":"","musee":"Nero-Film AG, Berlin","technique":"Film parlant, 117 min, noir et blanc","desc":"M le Maudit est le premier film parlant de Fritz Lang. Un tueur en série d'enfants terrorise une ville allemande. Traqué à la fois par la police et par le milieu criminel, il est finalement jugé par les criminels eux-mêmes. Chef-d'œuvre du thriller psychologique, le film invente le portrait du tueur en série au cinéma et utilise le son comme outil dramatique inédit.","anecdotes":[{"e":"🎵","t":"<b>Peter Lorre siffle 'Dans le hall du roi de la montagne' de Grieg pour signaler sa présence.</b> Ce motif musical, sifflé compulsivement par le tueur, devient sa signature — le moyen par lequel un aveugle le reconnaît dans la foule. C'est l'une des utilisations les plus brillantes du son dans l'histoire du cinéma."},{"e":"🇩🇪","t":"<b>Lang quitta l'Allemagne le lendemain de sa rencontre avec Goebbels.</b> En 1933, le ministre de la propagande nazie convoqua Lang pour lui proposer de diriger le cinéma du Reich. Lang fit semblant d'accepter, rentra chez lui et prit le premier train pour Paris — abandonnant sa femme nazie et toute sa fortune."},{"e":"🔍","t":"<b>Le film utilise deux espaces sonores parallèles : la police et les criminels.</b> Lang monte en alternance les réunions de la police criminelle et celles du milieu — mêmes problèmes, même structure. Cette construction formelle souligne que les deux camps utilisent les mêmes méthodes pour le même but."}],"quiz":{"q":"Par quel moyen sonore le tueur Hans Beckert est-il finalement reconnu dans la foule ?","r":"Son sifflement compulsif du thème de Grieg — reconnu par un mendiant aveugle qui lui colle une lettre M dans le dos","hint":"C'est l'une des utilisations les plus célèbres du son comme élément dramatique dans l'histoire du cinéma"}},{"title":"Citizen Kane — Orson Welles","artiste":"Orson Welles","date":"1941","mouvement":"Âge d’or","discipline":"Cinéma","era_disc":"Âge d’or","era_disc_start":1930,"img":"img/arts/Citizen_Kane.webp","musee":"RKO Radio Pictures, Hollywood","technique":"Film noir, 119 min, noir et blanc","desc":"Citizen Kane retrace la vie de Charles Foster Kane, magnat de la presse, à travers les témoignages de ceux qui l'ont connu. La narration fragmentée en flash-backs, la profondeur de champ révolutionnaire, les angles de caméra inédits, la bande-son complexe — tout ici est innovation. Élu régulièrement 'meilleur film de tous les temps', il reste la référence absolue du cinéma d'auteur américain.","anecdotes":[{"e":"🌹","t":"<b>'Rosebud' est l'un des plus grands MacGuffins de l'histoire du cinéma.</b> Le mot murmuré par Kane à sa mort déclenche toute l'enquête du film — et la réponse finale, révélée au spectateur seul, est à la fois simple et bouleversante. Hearst, dont Kane est le portrait-clé, tenta par tous les moyens d'empêcher la sortie du film."},{"e":"🎬","t":"<b>Welles avait 25 ans et n'avait jamais réalisé de film.</b> Après son canular radiophonique de 'La Guerre des Mondes' en 1938, RKO lui offrit un contrat rêvé : liberté totale. Welles passa des semaines à étudier le cinéma — regardant notamment Stagecoach de Ford des dizaines de fois — avant de tourner."},{"e":"📸","t":"<b>La profondeur de champ révolutionnaire fut obtenue avec le directeur de la photo Gregg Toland.</b> Pour la première fois, le premier plan et l'arrière-plan sont nets simultanément dans la même image. Cette technique, combinée aux plafonds visibles (impossibles dans le cinéma classique), donna au film son esthétique unique."}],"quiz":{"q":"Quel aspect technique révolutionnaire Orson Welles introduit-il dans Citizen Kane, permettant de voir le premier et l'arrière-plan nets simultanément ?","r":"La grande profondeur de champ — obtenue avec le directeur de la photo Gregg Toland grâce à des optiques et éclairages inédits","hint":"Cette technique rendit également visible les plafonds des décors, jusque-là cachés car la caméra filmait de bas vers le haut"}},{"title":"À bout de souffle — Jean-Luc Godard","artiste":"Jean-Luc Godard","date":"1960","mouvement":"Nouvelles vagues","discipline":"Cinéma","era_disc":"Nouvelles vagues","era_disc_start":1950,"img":"img/arts/a bout de soufle_.webp","musee":"Les Films Georges de Beauregard, Paris","technique":"Film, 90 min, noir et blanc","desc":"Michel Poiccard, petit criminel qui se prend pour Humphrey Bogart, tue un policier et fuit à Paris avec une Américaine. Tourné avec une caméra portée dans les rues de Paris, avec un budget minimal et des acteurs peu connus, À bout de souffle invente un nouveau langage cinématographique : jump cuts, caméra à l'épaule, improvisation, références au cinéma américain. C'est l'acte fondateur de la Nouvelle Vague française.","anecdotes":[{"e":"✂️","t":"<b>Le jump cut — la coupe brutale dans un plan continu — fut inventé par accident.</b> Le film était trop long. Au montage, Godard coupa des morceaux au milieu des plans au lieu de couper entre les plans — créant des sauts visuels choquants. Ce 'défaut' devint une signature esthétique copiée dans le monde entier."},{"e":"📋","t":"<b>Il n'y avait pas de scénario.</b> Godard écrivait les dialogues chaque matin sur des petits papiers qu'il glissait dans les poches des acteurs. Belmondo et Seberg improvisaient en grande partie. Ce tournage 'à la volée' dans les rues de Paris était radicalement opposé au cinéma de studio français de l'époque."},{"e":"🎬","t":"<b>Le film fut tourné en 4 semaines pour 40 millions de francs — dix fois moins qu'un film classique.</b> Godard utilisa une caméra de reportage légère (Caméflex) portée à l'épaule, qui permit de tourner dans de vraies rues, de vrais cafés, de vrais appartements. Cette économie de moyens devint une esthétique."}],"quiz":{"q":"Comment le jump cut — coupe brutale au milieu d'un plan — fut-il inventé dans À bout de souffle ?","r":"Par accident au montage : le film était trop long, Godard coupa des morceaux dans les plans au lieu d'entre les plans","hint":"Ce 'défaut' technique choquant devint une signature esthétique de la Nouvelle Vague copiée dans le monde entier"}},{"title":"Centre Pompidou — Piano & Rogers","artiste":"Renzo Piano & Richard Rogers","date":"1971–1977","mouvement":"Architecture contemporaine","discipline":"Architecture & Arts","era_disc":"Architecture contemporaine","era_disc_start":1950,"img":"img/arts/centre pompidou.webp","musee":"Beaubourg, Paris, France","technique":"Structure métallique et verre, façade high-tech, 166 m × 60 m","desc":"Le Centre Pompidou renversa toutes les conventions architecturales : la structure porteuse, les conduits techniques, les escalators sont à l'extérieur du bâtiment, exposés et colorés selon leur fonction (bleu pour l'air, vert pour l'eau, jaune pour l'électricité, rouge pour la circulation). Le bâtiment est son propre squelette visible — l'intérieur est un plateau libre, adaptable à toutes les configurations.","anecdotes":[{"e":"😱","t":"<b>Le projet fut surnommé 'la raffinerie de pétrole' par les Parisiens.</b> Lancé en 1971 à la suite d'un concours international remporté par deux inconnus de 34 ans, le projet choqua profondément. Les riverains protestèrent, les architectes établis s'indignèrent. Aujourd'hui, c'est l'un des bâtiments les plus aimés de Paris, visité par 3 millions de personnes par an."},{"e":"🔧","t":"<b>L'idée centrale : libérer l'intérieur en mettant tout à l'extérieur.</b> En exposant les structures et les circuits techniques sur la façade, Piano et Rogers obtinrent un plateau de 7 500 m² par étage, sans aucun pilier ni cloison fixe — adaptable à n'importe quelle exposition, spectacle ou activité. C'est l'architecture comme flexibilité absolue."},{"e":"🌍","t":"<b>Le concours international reçut 681 projets de 49 pays.</b> Le jury présidé par Jean Prouvé choisit le projet Piano-Rogers — le plus radical et le plus inattendu. La plupart des jurés ne s'attendaient pas à ce qu'il soit réellement construit à l'identique. Il le fut, sans compromis majeurs."}],"quiz":{"q":"Quelle philosophie architecturale révolutionnaire le Centre Pompidou incarne-t-il en exposant ses structures et conduites à l'extérieur ?","r":"Libérer l'intérieur en externalisant tout le technique — obtenant un plateau libre sans piliers, adaptable à toute configuration","hint":"Les conduites sont codées par couleur selon leur fonction : bleu pour l'air, vert pour l'eau, rouge pour la circulation"}}]}];

// Siècle pour "Tout" : déterminé par date de début de l'œuvre
function getToutEra(ev){
  const d = parseInt((ev.date||'').replace(/[^0-9].*$/, '')) || 9999;
  if(d < 1600) return 'XVe – XVIe s.';
  if(d < 1700) return 'XVIIe s.';
  if(d < 1800) return 'XVIIIe s.';
  if(d < 1900) return 'XIXe s.';
  return 'XXe – XXIe s.';
}

// Retourne l'era à afficher pour une œuvre selon le filtre actif
function getDisplayEra(ev){
  if(activeFilter === 'Tout') return getToutEra(ev);
  const disc = ev.discipline || 'Peinture';
  if(activeFilter === disc) return ev.era_disc || ev.mouvement;
  return null; // ne pas afficher dans ce filtre
}

function buildFilterChips(){
  const chipsEl = document.getElementById('filter-chips');
  chipsEl.innerHTML='';

  // Collect disciplines present in data
  const present = new Set(['Tout']);
  DATA.forEach(era=>era.events.forEach(ev=>present.add(ev.discipline||'Peinture')));

  Object.entries(discConfig).forEach(([name,cfg])=>{
    if(!present.has(name)) return;
    const btn = document.createElement('button');
    btn.className = 'filter-chip' + (name===activeFilter?' active':'');
    btn.dataset.disc = name;
    btn.innerHTML = `<span class="chip-icon">${cfg.icon}</span>${name}`;
    btn.addEventListener('click',()=>setFilter(name));
    chipsEl.appendChild(btn);
  });
}

function buildEraTabs(){
  const tabsEl = document.getElementById('era-tabs');
  tabsEl.innerHTML='';
  const eras = DISC_ERAS_CONFIG[activeFilter] || DISC_ERAS_CONFIG['Tout'];
  // Ne garder que les ères qui ont au moins une œuvre visible
  const present = new Set();
  DATA.forEach(era => era.events.forEach(ev => {
    const disc = ev.discipline || 'Peinture';
    if(activeFilter === 'Tout' || disc === activeFilter){
      present.add(ev.era_disc || ev.mouvement);
      if(activeFilter === 'Tout') present.add(getToutEra(ev));
    }
  }));
  eras.filter(e => present.has(e.name)).forEach((e,i)=>{
    const tab = document.createElement('button');
    tab.className = 'era-tab'+(i===0?' active':'');
    tab.dataset.eraname = e.name;
    tab.innerHTML=`<span class="era-tab-name">${e.name}</span><span class="era-tab-dates">${e.dates}</span>`;
    tab.addEventListener('click',()=>scrollToDiscEra(e.name));
    tabsEl.appendChild(tab);
  });
}

function buildMain(){
  const mainEl = document.getElementById('main-content');
  mainEl.innerHTML='';

  // Collecter toutes les œuvres plate + les regrouper par era_disc selon le filtre
  const eraGroups = {}; // eraName -> {events:[], start:number}
  const eras = DISC_ERAS_CONFIG[activeFilter] || DISC_ERAS_CONFIG['Tout'];

  // Index plat de toutes les œuvres avec référence era/ev
  const allEvents = [];
  DATA.forEach((era,eraIdx)=>{
    era.events.forEach((ev,evIdx)=>{
      allEvents.push({ev, eraIdx, evIdx});
    });
  });

  allEvents.forEach(({ev, eraIdx, evIdx})=>{
    const disc = ev.discipline||'Peinture';
    const show = activeFilter==='Tout' || disc===activeFilter;
    if(!show) return;
    const eraName = activeFilter==='Tout' ? getToutEra(ev) : (ev.era_disc||ev.mouvement);
    if(!eraGroups[eraName]) eraGroups[eraName]={items:[], start: eras.find(e=>e.name===eraName)?.start||9999};
    eraGroups[eraName].items.push({ev,eraIdx,evIdx});
  });

  // Trier les groupes par start
  const sortedGroups = Object.entries(eraGroups).sort((a,b)=>a[1].start-b[1].start);

  sortedGroups.forEach(([eraName, group],gIdx)=>{
    const section = document.createElement('section');
    section.className='era-section';
    section.id=`disc-era-${gIdx}`;
    section.dataset.eraname = eraName;

    // Trouver l'info de dates pour ce groupe
    const eraInfo = eras.find(e=>e.name===eraName)||{dates:''};
    // Emoji : pour peinture on garde l'emoji d'époque, sinon on prend celui de la discipline
    const discEmojis = {'Littérature':'📚','Musique':'🎵','Cinéma':'🎬','Architecture & Arts':'🏛️'};
    let emoji;
    if(activeFilter==='Tout'){
      emoji = '✦';
    } else if(activeFilter==='Peinture'){
      // trouver l'emoji de l'ère picturale correspondante
      const paintEra = group.items[0]?.ev?.mouvement;
      emoji = eraEmojis[paintEra]||'🖼️';
    } else {
      emoji = discEmojis[activeFilter]||'🎨';
    }

    const hdr = document.createElement('div');
    hdr.className='era-header';
    hdr.innerHTML=`
      <h2 class="era-title">
        ${emoji}&nbsp; ${eraName}
        <span class="era-dates" style="font-size:1.4rem">${eraInfo.dates}</span>
      </h2>
      <div class="era-line"></div>`;
    section.appendChild(hdr);

    const grid = document.createElement('div');
    grid.className='cards-grid';

    group.items.forEach(({ev,eraIdx,evIdx})=>{
      const disc = ev.discipline||'Peinture';
      const cfg = discConfig[disc]||discConfig['Peinture'];
      const card = document.createElement('div');
      card.className='art-card';
      card.dataset.discipline=disc;
      card.setAttribute('role','button');
      card.setAttribute('tabindex','0');
      card.setAttribute('aria-label',`Voir la fiche de ${ev.title}`);

      const imgSrc = ev.img ? encodeImgPath(ev.img):'';
      let imgHtml;
      if(imgSrc){
        imgHtml=`<img class="card-img" src="${imgSrc}" alt="${ev.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                 <div class="card-no-img" data-disc="${disc}" style="display:none">${cfg.icon}<span class="card-no-img-label">${disc}</span></div>`;
      } else {
        imgHtml=`<div class="card-no-img" data-disc="${disc}">${cfg.icon}<span class="card-no-img-label">${disc}</span></div>`;
      }
      const badgeCls=discClass(disc);
      const ctaLabel=discCta[disc]||"Découvrir l\'œuvre";
      // Sur la carte : afficher mouvement propre si pas Peinture
      const mouvLabel = disc==='Peinture' ? ev.mouvement : ev.mouvement;

      card.innerHTML=`
        ${imgHtml}
        <div class="card-disc-badge ${badgeCls}">${cfg.icon} ${disc}</div>
        <div class="card-body">
          <div class="card-mouvement">${mouvLabel}</div>
          <div class="card-title">${ev.title}</div>
          <div class="card-meta">
            <span class="card-date">${ev.date}</span>
            <span class="card-museum">📍 ${ev.musee}</span>
          </div>
          <div class="card-cta">${ctaLabel}</div>
        </div>`;

      card.addEventListener('click',()=>openModal(eraIdx,evIdx));
      card.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openModal(eraIdx,evIdx);}});
      grid.appendChild(card);
    });

    section.appendChild(grid);
    mainEl.appendChild(section);
  });

  // Observers
  const sectionEls=document.querySelectorAll('.era-section');
  const cardObs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis');});
  },{threshold:.08});
  sectionEls.forEach(s=>cardObs.observe(s));

  const eraObs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const name=e.target.dataset.eraname;
        document.querySelectorAll('.era-tab').forEach(t=>t.classList.toggle('active',t.dataset.eraname===name));
      }
    });
  },{rootMargin:'-40% 0px -50% 0px'});
  sectionEls.forEach(s=>eraObs.observe(s));
}

/* ──────────────────────────────────────────
   FILTER LOGIC
────────────────────────────────────────── */
function setFilter(disc){
  activeFilter = disc;
  document.querySelectorAll('.filter-chip').forEach(c=>{
    c.classList.toggle('active', c.dataset.disc===disc);
  });
  // Reconstruire les tabs ET le contenu
  buildEraTabs();
  buildMain();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ──────────────────────────────────────────
   SCROLL & ACTIVE LOGIC
────────────────────────────────────────── */
function scrollToDiscEra(eraName){
  const sections=document.querySelectorAll('.era-section');
  for(const s of sections){
    if(s.dataset.eraname===eraName){
      const navH=document.getElementById('era-nav').offsetHeight;
      const filterH=document.getElementById('filter-bar').offsetHeight;
      const top=s.getBoundingClientRect().top+window.scrollY-navH-filterH-16;
      window.scrollTo({top,behavior:'smooth'});
      return;
    }
  }
}

/* ──────────────────────────────────────────
   MODAL
────────────────────────────────────────── */
const overlay=document.getElementById('modal-overlay');
const modalInner=document.getElementById('modal-inner');
const modalClose=document.getElementById('modal-close');
let lastFocus=null;

function openModal(eraIdx,evIdx){
  const ev=DATA[eraIdx].events[evIdx];
  lastFocus=document.activeElement;

  const disc=ev.discipline||'Peinture';
  const cfg=discConfig[disc]||discConfig['Peinture'];

  let imgSection;
  if(ev.img){
    imgSection=`<div class="modal-img-wrap">
      <img class="modal-img" src="${encodeImgPath(ev.img)}" alt="${ev.title}" onerror="this.parentElement.style.display='none'">
      <div class="modal-img-grad"></div>
    </div>`;
  } else {
    imgSection=`<div class="modal-no-img" data-disc="${disc}">
      <div class="modal-no-img-icon">${cfg.icon}</div>
      <div class="modal-no-img-label">${disc}</div>
      <div class="modal-no-img-grad"></div>
    </div>`;
  }

  // Icône adaptée pour les métadonnées
  const metaIcon = disc==='Peinture'?'🖌️':disc==='Cinéma'?'🎬':disc==='Musique'?'🎼':disc==='Littérature'?'✍️':'🏛️';
  const metaLabel = disc==='Peinture'?'Artiste':disc==='Cinéma'?'Réalisateur':disc==='Musique'?'Compositeur':disc==='Littérature'?'Auteur':'Créateur';
  const techLabel = disc==='Peinture'?'🔬':disc==='Cinéma'?'📽️':disc==='Musique'?'🎹':disc==='Littérature'?'📖':'🏗️';

  const anecdotes=ev.anecdotes.map(a=>`
    <div class="anecdote">
      <div class="anecdote-icon">${a.e}</div>
      <div class="anecdote-text">${a.t}</div>
    </div>`).join('');

  const quiz=ev.quiz?`
    <div class="quiz-title">Quiz</div>
    <div class="quiz-box">
      <div class="quiz-q">❓ ${ev.quiz.q}</div>
      <div class="quiz-hint"><strong>Indice :</strong> ${ev.quiz.hint}</div>
      <button class="quiz-toggle" onclick="toggleQuiz(this)">Révéler la réponse</button>
      <div class="quiz-answer">✅ ${ev.quiz.r}</div>
    </div>`:'';

  modalInner.innerHTML=`
    ${imgSection}
    <div class="modal-body">
      <div class="modal-supra">${ev.mouvement} · ${disc} · ${ev.date}</div>
      <h2 class="modal-title">${ev.title}</h2>
      <div class="modal-meta">
        <span>${metaIcon} <strong>${ev.artiste}</strong></span>
        <span>📍 <strong>${ev.musee}</strong></span>
        <span>${techLabel} ${ev.technique}</span>
      </div>
      <p class="modal-desc">${ev.desc}</p>
      <div class="anecdotes-title">Anecdotes</div>
      ${anecdotes}
      ${quiz}
    </div>`;

  overlay.classList.add('open');
  document.body.style.overflow='hidden';
  document.getElementById('modal').scrollTop=0;
  modalClose.focus();
}

function closeModal(){
  overlay.classList.remove('open');
  document.body.style.overflow='';
  if(lastFocus)lastFocus.focus();
}

function toggleQuiz(btn){
  const ans=btn.nextElementSibling;
  const show=!ans.classList.contains('show');
  ans.classList.toggle('show',show);
  btn.textContent=show?'Masquer la réponse':'Révéler la réponse';
}

modalClose.addEventListener('click',closeModal);
overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

/* ──────────────────────────────────────────
   INIT — load JSON then build
────────────────────────────────────────── */
fetch('json/arts/arts-data.json')
  .then(r=>r.json())
  .then(data=>{
    DATA=data;
    buildEraTabs();
    buildFilterChips();
    buildMain();
  })
  .catch(err=>{
    console.error('Erreur chargement arts-data.json',err);
    document.getElementById('main-content').innerHTML=
      '<p style="text-align:center;padding:60px;color:rgba(232,223,196,.4)">Impossible de charger les données.</p>';
  });
</script>
