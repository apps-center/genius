  { id:173, img:"corsaires.webp", title:"Les Corsaires — La Guerre de Course", date:"1550 - 1815", year:0, era:"Monarchie Absolue", desc:"Les corsaires sont des marins privés autorisés par le roi (via une « lettre de marque ») à attaquer et piller les navires ennemis. Légalement pirates pour les ennemis, héros nationaux en France. Duguay-Trouin et Jean Bart sont les plus célèbres. Ils affaiblissent le commerce anglais et hollandais sans que le roi ait à payer une flotte." },
  { id:174, img:"traite negriere.webp", title:"Le Commerce Triangulaire", date:"1640 - 1848", year:0, era:"Monarchie Absolue", desc:"La France participe activement à la traite négrière atlantique. Nantes, Bordeaux et La Rochelle envoient des navires en Afrique, échangent des marchandises contre des esclaves, les déportent aux Antilles." },
  { id:175, img:"peste marseille.webp", title:"La Grande Peste de Marseille", date:"1720 - 1722", year:0, era:"Monarchie Absolue", desc:"Le navire Grand-Saint-Antoine débarque la peste à Marseille. En deux ans, la ville perd la moitié de sa population — 50 000 morts sur 90 000 habitants. La Provence entière est frappée." },
  { id:176, img:"louis XV.webp", title:"Louis XV — Le Bien-Aimé", date:"1715 - 1774", year:0, era:"Monarchie Absolue", desc:"Arrière-petit-fils de Louis XIV, il hérite d'un royaume épuisé. D'abord adoré (« le Bien-Aimé »), son long règne voit la montée des philosophes des Lumières, la perte du Canada et des Indes, et la France glisser vers." },
  { id:177, img:"voltaire.webp", title:"Voltaire — Les Lumières & la Tolérance", date:"1734", year:0, era:"Monarchie Absolue", desc:"François-Marie Arouet, dit Voltaire, symbole des Lumières : défenseur de la tolérance, ennemi du fanatisme. Candide et ses pamphlets incarnèrent la puissance de la plume contre l'arbitraire et l'injustice." },
  { id:178, img:"diderot dalembert.webp", title:"L'Encyclopédie de Diderot & d'Alembert", date:"1751 - 1772", year:0, era:"Monarchie Absolue", desc:"En 1747, Denis Diderot et Jean le Rond d'Alembert lancent le projet le plus ambitieux du siècle des Lumières : rassembler tout le savoir humain en un seul ouvrage. Pendant 25 ans, 150 auteurs — Voltaire, Rousseau, Montesquieu — rédigent 72 000 articles sur tout : philosophie, sciences, arts, métiers, agriculture. L'Encyclopédie est un acte politique autant qu'intellectuel : en expliquant que la connaissance appartient à tous et non à l'Église ou au roi, elle sape les fondements de l'Ancien Régime. Le pouvoir royal la censure deux fois. Elle n'en continue pas moins de circuler clandestinement et d'inspirer les Révolutionnaires de 1789. Les 28 volumes seront traduits dans toute l'Europe et changeront la façon dont les hommes pensent le monde." },
  { id:179, img:"guerre de 7 ans.webp", title:"La Guerre de Sept Ans — La Première Guerre Mondiale", date:"1756 - 1763", year:0, era:"Monarchie Absolue", desc:"Souvent appelée la première guerre mondiale, elle oppose la France à l'Angleterre sur 5 continents. La France perd le Canada, la Louisiane et ses comptoirs en Inde. L'Angleterre devient la première puissance mondiale." },
  { id:180, img:"rousseau.webp", title:"Rousseau — Le Contrat Social", date:"1762", year:0, era:"Monarchie Absolue", desc:"Rousseau affirme dans Le Contrat Social (1762) que le pouvoir ne vient pas de Dieu ni du roi de naissance, mais du peuple lui-même — qui délègue son autorité à un gouvernement. Si le gouvernement trahit le peuple, celui-ci peut le renverser. Ces idées nourriront directement la Révolution française 27 ans plus tard." },
  { id:181, img:"louis XVI.webp", title:"Louis XVI — La Fin de la Monarchie", date:"1774 - 1792", year:0, era:"Monarchie Absolue", desc:"Louis XVI hérite d'une France au bord de la faillite. Incapable de réformer les finances, il convoque les États Généraux en 1789 — déclenchant la Révolution. La Bastille tombe le 14 juillet, les droits de l'Homme sont proclamés. Louis XVI est guillotiné le 21 janvier 1793 : fin de 800 ans de monarchie capétienne." },
  { id:182, img:"La_prise_de_la_Bastille_en_feu.webp", title:"Prise de la Bastille", date:"14 juillet 1789", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Le 14 juillet 1789, des milliers de Parisiens prennent d'assaut la Bastille — une forteresse-prison qui symbolisait le pouvoir absolu du roi. À l'intérieur : seulement 7 prisonniers. Mais le symbole est immense : le peuple s'est armé contre son roi. Cette date devient la fête nationale française." },
  { id:183, img:"Exécution_à_la_guillotine_pendant_la_Révolution.webp", title:"La Terreur — Robespierre", date:"1793 - 1794", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Le Comité de Salut Public envoie des milliers à la guillotine. 17 000 exécutions officielles. La Terreur finira par se dévorer elle-même." },
  { id:184, img:"Napoléon_se_couronnant_à_Notre-Dame.webp", title:"Napoléon Ier — Empereur des Français", date:"1804 - 1815", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Napoléon Bonaparte, général républicain, s'empare du pouvoir en 1799 et se fait sacrer Empereur en 1804. Il réforme toute la société française : Code civil (lois égales pour tous), lycées, Banque de France, Légion d'honneur. Il conquiert presque toute l'Europe mais est finalement vaincu à Waterloo en 1815." },
  { id:185, img:"revolution_industrielle.webp", title:"La Révolution Industrielle Française", date:"1815 - 1870", year:0, era:"Révolution, Empires & XIXe siècle", desc:"La France suit l'Angleterre avec une génération de retard. Chemins de fer, machines à vapeur, mines de charbon, sidérurgie. Lille, Saint-Étienne, Le Creusot deviennent des villes ouvrières." },
  { id:186, img:"victor hugo.webp", title:"Victor Hugo — Les Misérables & Notre-Dame", date:"1830 - 1885", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Victor Hugo est le monument de la littérature française du XIXe siècle : poète, romancier, dramaturge et homme politique. Les Misérables (1862) est l'un des romans les plus lus du monde." },
  { id:187, img:"epoque coloniale.webp", title:"L'Empire Colonial Français", date:"1830 - 1962", year:0, era:"Révolution, Empires & XIXe siècle", desc:"La France bâtit le deuxième empire colonial du monde : Algérie (1830), Indochine, Afrique de l'Ouest, Madagascar, Polynésie. À son apogée en 1938, l'empire couvre 12 millions de km² et 110 millions d'habitants." },
  { id:188, img:"Napoléon_III.webp", title:"Napoléon III — Le Second Empire", date:"1852 - 1870", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Louis-Napoléon Bonaparte, neveu de Napoléon Ier, est élu président de la République en 1848 — le premier président élu au suffrage universel masculin. Trois ans après, il organise un coup d'État et se fait couronner Napoléon III par référendum. Son règne voit la modernisation de Paris par Haussmann et l'industrialisation de la France." },
  { id:189, img:"haussman.webp", title:"Haussmann — La Naissance de Paris Moderne", date:"1853 - 1870", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Mandaté par Napoléon III, le baron Haussmann détruit 20 000 immeubles et trace 137 km de grands boulevards. Il dote Paris d'égouts, de gaz, de parcs et de l'eau courante." },
  { id:190, img:"3eme republique.webp", title:"3ème République", date:"1870 - 1940", year:0, era:"Révolution, Empires & XIXe siècle", desc:"70 ans de République. Jules Ferry instaure l'école laïque et gratuite (1882). Tour Eiffel (1889). Affaire Dreyfus. Deux guerres mondiales." },
  { id:191, img:"belle epoque.webp", title:"La Belle Époque", date:"1871 - 1914", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Entre la défaite de 1870 et la Grande Guerre, la France connaît une période de paix, de prospérité et d'innovations folles : électricité, automobile, cinéma, aviation." },
  { id:192, img:"zola.webp", title:"Zola — Le Naturalisme", date:"1871 - 1902", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Émile Zola crée la série des Rougon-Macquart — 20 romans sur une famille sous le Second Empire. Germinal (1885) sur les mineurs reste l'un des grands romans sociaux de la littérature mondiale. En 1898, « J'accuse !" },
  { id:193, img:"impressionnisme.webp", title:"Monet & l'Impressionnisme", date:"1874", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Claude Monet expose « Impression, Soleil Levant » — un critique la raille en disant « ce ne sont que des impressions ». Le mot reste et donne son nom au mouvement qui révolutionne la peinture." },
  { id:194, img:"tour effeil.webp", title:"La Tour Eiffel", date:"1889", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Gustave Eiffel construit cette tour de 330 m pour l'Exposition universelle de 1889. D'abord raillée comme une « vergue de fer », elle devait être démolie après 20 ans." },

/* ── STARS ── */
(function(){
  const c=document.getElementById('stars-canvas'),ctx=c.getContext('2d');let stars=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  function init(){resize();stars=Array.from({length:220},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.3+.15,a:Math.random()*.55+.08,speed:Math.random()*.0004+.00015,phase:Math.random()*Math.PI*2}));}
  let t=0;function draw(){t++;ctx.clearRect(0,0,c.width,c.height);for(const s of stars){const f=s.a*(.65+.35*Math.sin(t*s.speed*80+s.phase));ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(232,223,196,${f})`;ctx.fill();}requestAnimationFrame(draw);}
  addEventListener('resize',init);init();draw();
})();

/* ── STATE ── */
let deck=[],idx=0,flipped=false,knownSet=new Set(),reviewSet=new Set();
const fc=()=>document.getElementById('fc');
const front=()=>document.getElementById('front');
const overlay=()=>document.getElementById('overlay');

/* ── LOAD CONTENT ── */
function loadContent(){
  const card=deck[idx];
  document.getElementById('fc-img').src='../img/histoire/'+card.img;
  document.getElementById('fc-era').textContent=card.era;
  document.getElementById('fc-date').textContent=card.date;
  document.getElementById('fc-title').textContent=card.title;
  document.getElementById('fc-desc').textContent=card.desc||'';
  const pct=(idx/deck.length)*100;
  document.getElementById('p-text').textContent=`Carte ${idx+1} / ${deck.length}`;
  document.getElementById('p-fill').style.width=pct+'%';
  document.querySelectorAll('#strip .thumb').forEach((el,i)=>el.classList.toggle('cur',i===idx));
}

/* ── ADVANCE: fondu noir → iris ── */
function advance(){
  const ov=overlay(), fr=front(), wrap=fc();

  ov.classList.add('dark');

  setTimeout(()=>{
    wrap.classList.add('no-anim');
    wrap.classList.remove('flipped');
    flipped=false;
    fr.classList.remove('iris');
    loadContent();
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      wrap.classList.remove('no-anim');
      ov.classList.remove('dark');
      fr.classList.add('iris');
    }));
  }, 180);
}

/* ── FLIP ── */
function flipCard(){
  if(flipped){
    idx=(idx+1)%deck.length;
    advance();
  } else {
    flipped=true;
    fc().classList.add('flipped');
  }
}

/* ── NAVIGATION ── */
function nextCard(){idx=(idx+1)%deck.length;advance();}
function prevCard(){idx=(idx-1+deck.length)%deck.length;advance();}

function shuffleCards(){
  const eras = EPOCH_MAP[currentEpoch];
  const filtered = eras ? CARDS.filter(c => eras.includes(c.era)) : [...CARDS];
  deck=shuffle(filtered);idx=0;flipped=false;
  knownSet.clear();reviewSet.clear();
  updateCounters();buildStrip();advance();
}

function markKnown(){
  knownSet.add(deck[idx].id);reviewSet.delete(deck[idx].id);
  updateCounters();idx=(idx+1)%deck.length;advance();
}

function markReview(){
  reviewSet.add(deck[idx].id);knownSet.delete(deck[idx].id);
  const card=deck.splice(idx,1)[0];
  deck.splice(Math.min(idx+3,deck.length),0,card);
  updateCounters();if(idx>=deck.length)idx=0;advance();
}

/* ── UI ── */
function updateCounters(){
  document.getElementById('k-count').textContent=knownSet.size;
  document.getElementById('r-count').textContent=reviewSet.size;
  document.getElementById('rem-count').textContent=deck.length-knownSet.size-reviewSet.size;
}

function buildStrip(){
  const strip=document.getElementById('strip');strip.innerHTML='';
  deck.forEach((card,i)=>{
    const img=document.createElement('img');
    img.src='../img/histoire/'+card.img;img.alt=card.title;
    img.className='thumb'+(i===0?' cur':'');
    img.onclick=()=>{idx=i;advance();};
    img.title=card.title;
    strip.appendChild(img);
  });
}

/* ── UTILS ── */
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nextCard();}
  if(e.key==='ArrowLeft'){e.preventDefault();prevCard();}
  if(e.key==='Enter'){e.preventDefault();flipCard();}
  if(e.key==='k'||e.key==='K')markKnown();
  if(e.key==='r'||e.key==='R')markReview();
});

/* ── EPOCH FILTER ── */
const EPOCH_MAP = {
  all:           null, // pas de filtre
  prehistoire:   ['Ère Cosmique','Ère Biologique','Préhistoire'],
  antiquite:     ['Premières Civilisations — −3500 à −2000','Égypte, Mésopotamie & Récits Fondateurs — −2000 à −1200',
                  'Proche-Orient & Méditerranée — −1200 à −600','Grèce Antique & Monde Hellénistique — −800 à −300',
                  'Rome — République & Conquêtes — −300 à −27','Empire Romain & Naissance du Christianisme — −27 à 200',
                  'Gaule Romaine & Déclin de l\'Empire — 200 à 476'],
  moyenage:      ['Mérovingiens','Carolingiens','Haut Moyen Âge','Capétiens & Moyen Âge'],
  modernes:      ['Renaissance & Réforme','Monarchie Absolue'],
  contemporaine: ['Révolution, Empires & XIXe siècle','France Contemporaine'],
};

let currentEpoch = 'all';

function setEpoch(key) {
  currentEpoch = key;
  // Mettre à jour les pills
  document.querySelectorAll('.ep-pill').forEach(p => p.classList.remove('active'));
  document.getElementById('ep-'+key).classList.add('active');
  // Filtrer les cartes
  const eras = EPOCH_MAP[key];
  const filtered = eras ? CARDS.filter(c => eras.includes(c.era)) : [...CARDS];
  deck = shuffle(filtered);
  idx = 0; flipped = false;
  knownSet.clear(); reviewSet.clear();
  updateCounters();
  buildStrip();
  advance();
  // Mettre à jour le compteur
  const names = {
    all:'toutes les époques', prehistoire:'Préhistoire', antiquite:'Antiquité',
    moyenage:'Moyen Âge', modernes:'Temps Modernes', contemporaine:'Époque Contemporaine'
  };
  document.getElementById('epoch-count').textContent = `${deck.length} carte${deck.length>1?'s':''} — ${names[key]}`;
}

/* ── BOOT ── */
deck=shuffle([...CARDS]);
document.getElementById('epoch-count').textContent = `${deck.length} cartes — toutes les époques`;
buildStrip();
loadContent(); // première carte sans animation
</script>
