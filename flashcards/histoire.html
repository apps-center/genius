  { id:37, img:"La_construction_des_pyramides_égyptiennes.webp",title:"La Construction des Pyramides",                   date:"~2 560 av. J.-C.",          year:-2560,    era:"Antiquité",       desc:"La Grande Pyramide de Gizeh, érigée pour Khéops, mobilise 20 000 ouvriers pendant 20 ans. Chef-d'œuvre d'ingénierie antique, la plus grande structure jamais bâtie." },
  { id:38, img:"Adam_et_Ève_dans_le_jardin_d'Éden.webp",        title:"Adam et Ève — Le Récit de la Genèse",             date:"~4 000 av. J.-C. (tradition)", year:-4000, era:"Antiquité",    desc:"La Genèse, texte fondateur des religions abrahamiques, situe la création de l'humanité dans le Jardin d'Éden — un mythe structurant partagé par des milliards d'êtres humains." },
  { id:39, img:"L'arche_de_Noé_sous_l'orage.webp",              title:"L'Arche de Noé — Le Déluge Universel",            date:"~2 900 av. J.-C. (tradition)", year:-2900, era:"Antiquité",   desc:"Le mythe du Déluge, partagé par de nombreuses cultures, évoque peut-être de vraies catastrophes climatiques et fonde l'idée d'une alliance entre Dieu et l'Humanité." },
  { id:40, img:"Moïse_et_le_buisson_ardent.webp",               title:"Moïse et le Buisson Ardent",                      date:"~1 300 av. J.-C.",          year:-1300,    era:"Antiquité",       desc:"La révélation divine à Moïse fonde le monothéisme juif. L'Exode et la remise des Tables de la Loi sont au cœur des trois grandes traditions abrahamiques." },
  { id:41, img:"Babylone_antique_et_ses_merveilles.webp",        title:"Babylone et ses Jardins Suspendus",               date:"~600 av. J.-C.",            year:-600,     era:"Antiquité",       desc:"Sous Nabuchodonosor II, Babylone devient la plus grande cité du monde. Ses jardins suspendus, l'une des sept merveilles de l'Antiquité, dominent l'Euphrate." },
  { id:42, img:"David_et_Goliath_sur_le_champ_de_bataille.webp",title:"David contre Goliath",                           date:"~1 000 av. J.-C.",          year:-1000,    era:"Antiquité",       desc:"Le combat légendaire entre le jeune berger David et le géant Goliath symbolise le triomphe de la ruse sur la force brute. David fondera ensuite le royaume d'Israël." },
  { id:43, img:"Vue_panoramique_de_la_vieille_ville_de_Jérusalem.webp", title:"Jérusalem — Ville des Trois Religions",  date:"~1 000 av. J.-C.",          year:-1000,    era:"Antiquité",       desc:"Fondée par David, Jérusalem devient capitale d'Israël et siège du Temple de Salomon — la ville la plus convoitée de l'histoire, au cœur des trois monothéismes." },
  { id:44, img:"Le_cheval_de_Troie_entre_dans_la_ville.webp",   title:"Le Cheval de Troie",                             date:"~1 200 av. J.-C.",          year:-1200,    era:"Antiquité",       desc:"La ruse d'Ulysse — offrir aux Troyens un cheval dissimulant des soldats — scelle la chute de Troie après dix ans de siège. L'Iliade et l'Odyssée naîtront de cette épopée." },
  { id:45, img:"Synagogue_dans_la_prière_et_l'étude.webp",      title:"La Synagogue — Prière et Savoir",                 date:"Ier siècle apr. J.-C.",     year:50,       era:"Antiquité",       desc:"Après la destruction du Temple (70 apr. J.-C.), la synagogue devient le cœur de la vie juive en diaspora : lieu de prière, d'étude et de solidarité communautaire." },
  { id:46, img:"L'attaque_des_Gaulois_à_Rome.webp",             title:"L'Attaque des Gaulois à Rome",                    date:"390 av. J.-C.",             year:-390,     era:"Antiquité",       desc:"Les Gaulois Sénons saccagent Rome — seul le Capitole résiste, sauvé par les oies sacrées. 'Malheur aux vaincus !' Rome en tirera les leçons pour bâtir son empire." },
  { id:47, img:"Hannibal_traversant_les_Alpes_enneigées.webp",  title:"Hannibal Traverse les Alpes",                     date:"218 av. J.-C.",             year:-218,     era:"Antiquité",       desc:"Le général carthaginois franchit les Alpes avec 37 éléphants pour attaquer Rome par le nord. Cette audace reste l'une des plus grandes épopées militaires antiques." },
  { id:48, img:"alesia.webp",                                    title:"Bataille d'Alésia — Vercingétorix Capitule",      date:"52 av. J.-C.",              year:-52,      era:"Antiquité",       desc:"Jules César encercle Vercingétorix dans la forteresse d'Alésia. La reddition de la Gaule marque son entrée définitive dans la romanité." },
  { id:49, img:"La_caravane_vers_le_Trésor_de_Petra.webp",      title:"Pétra — La Cité Rose des Nabatéens",              date:"~100 av. J.-C.",            year:-100,     era:"Antiquité",       desc:"Pétra, capitale nabatéenne taillée dans le grès rose de Jordanie, contrôle les routes caravanières entre l'Arabie, l'Égypte et la Méditerranée." },
  { id:50, img:"pont_du_gard.webp",                              title:"Le Pont du Gard — Génie Romain",                  date:"~19 av. J.-C.",             year:-19,      era:"Antiquité",       desc:"Le Pont du Gard, aqueduc de 50 mètres de hauteur, achemine l'eau sur 50 km. Érigé sans mortier, il témoigne de la maîtrise exceptionnelle des ingénieurs romains." },
  { id:51, img:"Construction_du_Colisée_à_Rome.webp",           title:"Construction du Colisée de Rome",                 date:"72–80 apr. J.-C.",          year:75,       era:"Antiquité",       desc:"Le Colisée, inauguré en 80, accueille 70 000 spectateurs. Ses jeux sont l'instrument de la politique du 'pain et des jeux' impériale." },
  { id:52, img:"Vie_quotidienne_dans_une_villa_romaine.webp",    title:"Vie dans une Villa Romaine",                      date:"IIe siècle apr. J.-C.",     year:150,      era:"Antiquité",       desc:"La villa romaine est le symbole de la vie aristocratique : jardins, fresques, mosaïques et thermes privés. L'otium — le loisir cultivé — est l'idéal de l'élite romaine." },
  { id:53, img:"Bains_romains__détente_et_interactions_sociales.webp", title:"Les Thermes Romains",                     date:"IIe siècle apr. J.-C.",     year:150,      era:"Antiquité",       desc:"Ouverts à tous, les thermes sont le cœur de la vie sociale romaine. Commerce, culture, hygiène et politique s'y mêlent sous des voûtes monumentales." },
  { id:54, img:"La_division_de_l'Empire_romain.webp",           title:"La Division de l'Empire Romain",                  date:"395 apr. J.-C.",            year:395,      era:"Haut Moyen Âge",  desc:"À la mort de Théodose Ier, l'Empire est partagé en Orient et Occident. L'Occident s'effondrera en 476 sous les coups des peuples germaniques." },
  { id:55, img:"Attila.webp",                                    title:"Attila et les Huns — La Terreur de Rome",         date:"451 apr. J.-C.",            year:451,      era:"Haut Moyen Âge",  desc:"Attila, le 'Fléau de Dieu', dévaste l'Europe occidentale. Sa défaite aux Champs Catalauniques l'arrête. Les grandes migrations barbares scellent le destin de Rome." },
  { id:56, img:"Le_baptême_de_Clovis_à_Reims.webp",             title:"Le Baptême de Clovis",                            date:"496 apr. J.-C.",            year:496,      era:"Haut Moyen Âge",  desc:"Clovis Ier se convertit au christianisme et est baptisé à Reims par saint Rémi. Cette alliance du trône et de l'Église fonde la France catholique." },
  { id:57, img:"Le_roi_merovingien_et_le_maire_du_palais.webp", title:"Les Mérovingiens et les Maires du Palais",        date:"VIIe siècle",               year:650,      era:"Haut Moyen Âge",  desc:"Les derniers Mérovingiens laissent le pouvoir réel aux maires du palais. Charles Martel concentre le pouvoir et prépare l'avènement des Carolingiens." },
  { id:58, img:"La_migration_du_prophète_Muhammad.webp",        title:"L'Hégire — La Migration de Muhammad",             date:"622 apr. J.-C.",            year:622,      era:"Haut Moyen Âge",  desc:"La fuite de Muhammad vers Médine marque l'an 1 du calendrier musulman. Cet événement fondateur déclenche l'expansion fulgurante de l'Islam." },
  { id:59, img:"raids_vikings.webp",                             title:"Les Raids Vikings",                               date:"~793 apr. J.-C.",           year:793,      era:"Haut Moyen Âge",  desc:"Le raid sur Lindisfarne (793) ouvre l'ère viking. Les Normands sillonnent l'Atlantique nord, fondent des royaumes et atteignent l'Amérique avant Colomb." },
  { id:60, img:"sacre_charlemagne.webp",                         title:"Le Sacre de Charlemagne",                         date:"25 décembre 800",           year:800,      era:"Haut Moyen Âge",  desc:"Le pape Léon III couronne Charlemagne 'Empereur des Romains' à Rome. Cette alliance du pouvoir spirituel et temporel fonde l'idéal d'un empire chrétien d'Occident." },
  { id:61, img:"urbain2_croisades.webp",                         title:"Le Pape Urbain II — Appel à la Croisade",         date:"1095 apr. J.-C.",           year:1095,     era:"Moyen Âge",       desc:"Au concile de Clermont, Urbain II appelle les chrétiens à libérer Jérusalem, déclenchant deux siècles d'expéditions militaires en Terre Sainte." },
  { id:62, img:"templiers.webp",                                 title:"Les Chevaliers Templiers",                        date:"~1119 apr. J.-C.",          year:1119,     era:"Moyen Âge",       desc:"Fondé à Jérusalem, l'Ordre du Temple allie vœux monastiques et mission militaire. Premiers banquiers de l'histoire, leur puissance sera leur perte en 1307." },
  { id:63, img:"alienor.webp",                                   title:"Aliénor d'Aquitaine — Reine de Deux Royaumes",    date:"XIIe siècle (vers 1137)",   year:1137,     era:"Moyen Âge",       desc:"Reine de France puis d'Angleterre, Aliénor incarne la puissance féminine médiévale. Mécène des troubadours, elle façonne la culture courtoise." },
  { id:64, img:"arc_boutant.webp",                               title:"L'Arc-boutant — Naissance du Gothique",           date:"XIIe siècle (vers 1163)",   year:1163,     era:"Moyen Âge",       desc:"L'arc-boutant permet aux cathédrales de s'élever vers le ciel en reportant les poussées vers l'extérieur. Il révolutionne l'architecture médiévale européenne." },
  { id:65, img:"mont_saint_michel.webp",                         title:"Le Mont-Saint-Michel",                            date:"~1144 apr. J.-C.",          year:1144,     era:"Moyen Âge",       desc:"Perchée sur son rocher battu par les marées, l'abbaye du Mont-Saint-Michel est la 'merveille de l'Occident' et principal lieu de pèlerinage après Rome." },
  { id:66, img:"notre_dame_1200.webp",                           title:"Notre-Dame de Paris — La Cathédrale Gothique",    date:"~1200 apr. J.-C.",          year:1200,     era:"Moyen Âge",       desc:"Commencée en 1163, Notre-Dame incarne le gothique à son apogée. Ses arcs-boutants, ses rosaces et ses 69 mètres symbolisent la foi et le génie technique du Moyen Âge." },
  { id:67, img:"La_bataille_de_Bouvines_en_1214.webp",          title:"Bataille de Bouvines",                            date:"27 juillet 1214",           year:1214,     era:"Moyen Âge",       desc:"Philippe Auguste écrase la grande coalition européenne. Bouvines consacre la France comme puissance dominante et forge le sentiment national français." },
  { id:68, img:"Saint_Louis_dispense_la_justice_sous_le_chêne.webp", title:"Saint Louis rend Justice sous le Chêne",    date:"~1250 apr. J.-C.",          year:1250,     era:"Moyen Âge",       desc:"Louis IX rend personnellement la justice sous le chêne de Vincennes, accessible à tous. Il incarne l'alliance entre pouvoir royal et vertu chrétienne." },
  { id:69, img:"Le_seigneur_et_le_vassal_supérieur.webp",       title:"La Féodalité — Le Seigneur et son Vassal",        date:"~1000 apr. J.-C.",          year:1000,     era:"Moyen Âge",       desc:"La société féodale repose sur une pyramide de liens personnels : le vassal prête hommage au seigneur qui lui concède un fief en échange de services militaires." },
  { id:70, img:"Vie_médiévale_dans_un_paysage_rural.webp",      title:"La Vie Paysanne au Moyen Âge",                    date:"XIIIe siècle",              year:1250,     era:"Moyen Âge",       desc:"Serfs et vilains cultivent la terre en échange de la protection seigneuriale. Le rythme des saisons et les fêtes religieuses structurent la vie de 90 % des médiévaux." },
  { id:71, img:"Gengis_Khan_sur_les_steppes_mongoles.webp",     title:"Gengis Khan — L'Empire Mongol",                   date:"~1206 apr. J.-C.",          year:1206,     era:"Moyen Âge",       desc:"Gengis Khan unifie les tribus mongoles et fonde le plus grand empire terrestre de l'histoire. De la Chine à l'Europe de l'Est, ses conquêtes bouleversent les civilisations." },
  { id:72, img:"Tombuktu,_centre_du_savoir_médiéval.webp",      title:"Tombouctou — Cité du Savoir",                     date:"~1300 apr. J.-C.",          year:1300,     era:"Moyen Âge",       desc:"Au cœur de l'Empire du Mali, Tombouctou abrite des universités et des centaines de milliers de manuscrits scientifiques, théologiques et littéraires." },
  { id:73, img:"peste.webp",                                     title:"La Peste Noire",                                  date:"1347–1351",                 year:1347,     era:"Moyen Âge",       desc:"La peste bubonique ravage l'Europe et emporte un tiers de sa population en quatre ans, accélérant la fin du féodalisme et transformant les mentalités." },
  { id:74, img:"La_fin_de_la_lignée_capétienne.webp",           title:"La Fin des Capétiens Directs",                    date:"1328 apr. J.-C.",           year:1328,     era:"Moyen Âge",       desc:"La mort de Charles IV sans héritier mâle éteint la lignée capétienne fondée en 987. La succession française déclenchera la dévastatrice Guerre de Cent Ans." },
  { id:75, img:"Bataille_de_Crécy_en_1346.webp",                title:"Bataille de Crécy",                               date:"26 août 1346",              year:1346,     era:"Moyen Âge",       desc:"Les archers gallois au longbow déciment la chevalerie française. Crécy marque l'avènement d'une nouvelle manière de faire la guerre et annonce la fin de la chevalerie." },
  { id:76, img:"Bataille_d'Azincourt_sous_la_pluie.webp",       title:"Bataille d'Azincourt",                            date:"25 octobre 1415",           year:1415,     era:"Moyen Âge",       desc:"Henri V écrase la chevalerie française dans la boue normande. La fleur de la noblesse périt, replongeant le royaume dans la crise de la Guerre de Cent Ans." },
  { id:77, img:"jeanne-d-arc.webp",                              title:"Jeanne d'Arc — La Pucelle d'Orléans",             date:"1429 apr. J.-C.",           year:1429,     era:"Moyen Âge",       desc:"Jeanne d'Arc délivre Orléans et fait sacrer Charles VII à Reims. Brûlée vive en 1431, elle devient le symbole éternel de la résistance et de l'identité françaises." },
  { id:78, img:"Jacques_de_Molay_devant_Notre-Dame.webp",       title:"Jacques de Molay — La Fin des Templiers",         date:"18 mars 1314",              year:1314,     era:"Moyen Âge",       desc:"Le dernier Grand Maître des Templiers est brûlé vif à Paris. Depuis son bûcher, il aurait maudit Philippe IV et le pape — tous deux moururent dans l'année." },
  { id:79, img:"Le_siège_de_Constantinople,_1453.webp",         title:"La Chute de Constantinople",                      date:"29 mai 1453",               year:1453,     era:"Moyen Âge",       desc:"Les canons ottomans brisent les murailles millénaires de Byzance. Cette chute marque la fin du Moyen Âge et pousse les Européens vers l'ouest." },
  { id:80, img:"Gutenberg.webp",                                 title:"Gutenberg et l'Imprimerie",                       date:"~1450 apr. J.-C.",          year:1450,     era:"Renaissance",     desc:"L'imprimerie à caractères mobiles révolutionne la diffusion du savoir. En un siècle, des millions de livres circulent en Europe, démocratisant la connaissance." },
  { id:81, img:"Traversée_en_mer_au_coucher_du_soleil.webp",    title:"Les Grandes Découvertes",                         date:"~1492–1522",                year:1500,     era:"Renaissance",     desc:"De Colomb à Magellan, les navigateurs européens cartographient le monde et bouleversent les échanges commerciaux et la vision de l'humanité." },
  { id:82, img:"Premier_contact_au_lever_du_soleil.webp",       title:"Le Premier Contact — Deux Mondes se Rencontrent", date:"12 octobre 1492",           year:1492,     era:"Renaissance",     desc:"Christophe Colomb atteint les Caraïbes. Cette rencontre entre l'Ancien et le Nouveau Monde déclenche une révolution géographique, culturelle et biologique sans précédent." },
  { id:83, img:"Louis_XI_et_ses_stratégies_secrètes.webp",      title:"Louis XI — Le Roi Araignée",                      date:"~1470 apr. J.-C.",          year:1470,     era:"Renaissance",     desc:"Louis XI unifie la France par la ruse plutôt que par les armes. Il soumet les grands féodaux et pose les bases de l'État centralisé français." },
  { id:84, img:"Machiavel_en_pleine_réflexion_politique.webp",  title:"Machiavel — Le Prince",                           date:"1513 apr. J.-C.",           year:1513,     era:"Renaissance",     desc:"Machiavel rédige 'Le Prince', traité fondateur de la pensée politique moderne. Séparant éthique et politique, il conseille au souverain d'être 'lion' et 'renard'." },
  { id:85, img:"Massacre_de_la_Saint-Barthélemy_à_Paris.webp",  title:"La Saint-Barthélemy",                             date:"24 août 1572",              year:1572,     era:"Renaissance",     desc:"Le massacre de la Saint-Barthélemy fait entre 5 000 et 30 000 victimes protestantes, au paroxysme des Guerres de Religion qui déchirent la France." },
  { id:86, img:"marie_de_medecis_conspirant.webp",               title:"Marie de Médicis — Les Intrigues de la Régence",  date:"~1617 apr. J.-C.",          year:1617,     era:"Époque Moderne",  desc:"Régente après l'assassinat d'Henri IV, Marie de Médicis gouverne dans un climat d'intrigues. Sa rivalité avec Louis XIII et Richelieu marquera la monarchie absolue." },
  { id:87, img:"Cardinal_Richelieu_surveillant_le_siège_de_La_Rochelle.webp", title:"Richelieu au Siège de La Rochelle", date:"1628 apr. J.-C.",          year:1628,     era:"Époque Moderne",  desc:"Richelieu dirige le siège de La Rochelle, bastion huguenot. En construisant une digue gigantesque, il affame la cité et anéantit le pouvoir politique protestant." },
  { id:88, img:"Molière,_Racine_et_Corneille_au_théâtre.webp",  title:"Le Grand Siècle du Théâtre Français",             date:"~1660 apr. J.-C.",          year:1660,     era:"Époque Moderne",  desc:"Molière, Racine et Corneille élèvent le théâtre français à son apogée. Comédies sociales et tragédies classiques forgent l'identité littéraire française." },
  { id:89, img:"Louis_XIV_dans_la_galerie_des_Glaces.webp",     title:"Louis XIV dans la Galerie des Glaces",            date:"~1682 apr. J.-C.",          year:1682,     era:"Époque Moderne",  desc:"La Galerie des Glaces de Versailles, avec ses 357 miroirs, symbolise l'absolutisme du Roi-Soleil. Versailles devient la capitale culturelle de toute l'Europe." },
  { id:90, img:"Samouraï_noble_au_lever_du_jour.webp",          title:"Le Samouraï — L'Âme du Japon Féodal",             date:"~1600 apr. J.-C.",          year:1600,     era:"Époque Moderne",  desc:"Les samouraïs vivent selon le Bushido — la 'Voie du guerrier'. Leur code d'honneur, leur maîtrise du katana et leur culture raffinée marquent l'identité japonaise." },
  { id:91, img:"Attaque_de_pirates_dans_les_Caraïbes.webp",     title:"L'Âge d'Or de la Piraterie",                      date:"~1700 apr. J.-C.",          year:1700,     era:"Époque Moderne",  desc:"Entre 1690 et 1730, des flibustiers comme Barbe Noire terrorisent les mers et défient ouvertement les puissances coloniales dans les Caraïbes." },
  { id:92, img:"Le_commerce_triangulaire_transatlantique.webp", title:"Le Commerce Triangulaire",                        date:"XVIIe–XVIIIe siècle",      year:1700,     era:"Époque Moderne",  desc:"Le commerce triangulaire déporte 12 millions d'Africains vers les Amériques. Ce crime contre l'humanité finance en grande partie la révolution industrielle européenne." },
  { id:93, img:"Bataille_de_la_guerre_de_Sept_Ans.webp",        title:"La Guerre de Sept Ans — Premier Conflit Mondial",  date:"1756–1763",                 year:1757,     era:"Époque Moderne",  desc:"Opposant France et Angleterre sur tous les continents, la Guerre de Sept Ans est le premier conflit vraiment mondial et remodèle l'empire colonial britannique." },
  { id:94, img:"La_prise_de_la_Bastille_en_feu.webp",           title:"La Prise de la Bastille",                         date:"14 juillet 1789",           year:1789,     era:"XIXe siècle",     desc:"Le peuple de Paris s'empare de la Bastille, symbole du despotisme royal. Cet événement fondateur de la Révolution française est depuis lors célébré comme fête nationale." },
  { id:95, img:"Exécution_à_la_guillotine_pendant_la_Révolution.webp", title:"La Terreur — La Guillotine Révolutionnaire", date:"1793–1794",               year:1793,     era:"XIXe siècle",     desc:"Sous Robespierre, la Terreur fait 40 000 victimes dont Louis XVI et Marie-Antoinette. La guillotine devient le symbole sanglant de la radicalisation révolutionnaire." },
  { id:96, img:"Napoléon_se_couronnant_à_Notre-Dame.webp",      title:"Le Sacre de Napoléon",                            date:"2 décembre 1804",           year:1804,     era:"XIXe siècle",     desc:"Napoléon s'empare de la couronne des mains du pape et se couronne lui-même Empereur à Notre-Dame, illustrant sa rupture totale avec l'ordre monarchique ancien." },
  { id:97, img:"batailles_Napoléoniennes.webp",                  title:"Les Batailles Napoléoniennes",                    date:"Vers 1805",                 year:1805,     era:"XIXe siècle",     desc:"Napoléon révolutionne l'art de la guerre. À Austerlitz (1805), il remporte sa plus brillante victoire contre les coalitions autrichienne et russe." },
  { id:98, img:"Les_victoires_de_Napoléon_(1805-1809).webp",    title:"L'Apogée de l'Empire Napoléonien",                date:"1805–1809",                 year:1807,     era:"XIXe siècle",     desc:"De Iéna à Wagram, Napoléon domine l'Europe. À son apogée en 1812, son empire s'étend de l'Espagne à la Pologne, soit 70 millions d'habitants." },
  { id:99, img:"revolution_industrielle.webp",                   title:"La Révolution Industrielle",                      date:"~1760–1850",                year:1800,     era:"XIXe siècle",     desc:"La machine à vapeur, le charbon et le textile lancent la révolution industrielle. L'usine remplace l'atelier, les villes explosent et le prolétariat naît." },
  { id:100,img:"Construction_d'un_mariage_d'acier_et_de_progrès.webp", title:"L'Ère du Fer et de l'Acier",             date:"~1850–1900",                year:1870,     era:"XIXe siècle",     desc:"Le fer et l'acier deviennent les matériaux du progrès : ponts suspendus, voies ferrées et structures métalliques transforment radicalement les paysages européens." },
  { id:101,img:"La_transformation_de_Paris_par_Haussmann.webp", title:"Haussmann Transforme Paris",                     date:"~1853–1870",                year:1860,     era:"XIXe siècle",     desc:"Mandaté par Napoléon III, Haussmann perce de larges boulevards et installe l'eau courante. Paris médiéval laisse place à la capitale moderne que nous connaissons." },
  { id:102,img:"Les_victoires_de_Napoléon_III.webp",             title:"Napoléon III et le Second Empire",                date:"1852–1870",                 year:1860,     era:"XIXe siècle",     desc:"Napoléon III modernise la France par le chemin de fer et Haussmann. Sa défaite à Sedan (1870) met fin au Second Empire et provoque la Commune de Paris." },
  { id:103,img:"Construire_la_Tour_Eiffel_au_coucher_du_soleil.webp", title:"Construction de la Tour Eiffel",          date:"1887–1889",                 year:1889,     era:"XIXe siècle",     desc:"La Tour Eiffel, érigée pour l'Exposition Universelle de 1889, est la prouesse technique du siècle. Décriée à sa naissance, elle devient le symbole universel de Paris." },
  { id:104,img:"Bataille_historique_de_la_guerre_civile.webp",   title:"La Guerre de Sécession Américaine",              date:"1861–1865",                 year:1863,     era:"XIXe siècle",     desc:"La guerre la plus meurtrière de l'histoire américaine. Lincoln proclame l'abolition de l'esclavage en 1863 ; la victoire de l'Union préserve l'unité des États-Unis." },
  { id:105,img:"Prospecteurs_au_travail_pendant_la_ruée_vers_l'or.webp", title:"La Ruée vers l'Or en Californie",     date:"1848–1855",                 year:1849,     era:"XIXe siècle",     desc:"La découverte d'or à Sutter's Mill déclenche un exode massif. 300 000 aventuriers affluent en un an, transformant la Californie et accélérant l'unité des États-Unis." },
  { id:106,img:"Le_procès_de_Dreyfus_sous_tension.webp",         title:"L'Affaire Dreyfus",                              date:"1894–1906",                 year:1894,     era:"XIXe siècle",     desc:"Le capitaine Dreyfus est injustement condamné pour espionnage. L'affaire divise la France entre dreyfusards et antidreyfusards, révélant un antisémitisme d'État profond." },
  { id:107,img:"Tranchées_boueuses_à_l'aube.webp",               title:"Les Tranchées de la Grande Guerre",              date:"1914–1918",                 year:1916,     era:"XXe siècle",      desc:"La Première Guerre Mondiale invente une guerre industrielle et totale. Dans les tranchées de la Somme et de Verdun, 10 millions de soldats périssent." },
  { id:108,img:"Assaut_sur_Omaha_Beach_à_l'aube.webp",           title:"Le Débarquement d'Omaha Beach",                  date:"6 juin 1944",               year:1944,     era:"XXe siècle",      desc:"Les Alliés débarquent en Normandie. Omaha Beach voit 2 000 soldats américains tomber en quelques heures. Cette opération ouvre la voie à la libération de l'Europe." },
  { id:109,img:"Nelson_Mandela_et_la_lutte_pour_la_liberté.webp",title:"Nelson Mandela — La Fin de l'Apartheid",        date:"1994 apr. J.-C.",           year:1994,     era:"XXe siècle",      desc:"Après 27 ans de prison, Mandela devient le premier président noir d'Afrique du Sud. Sa politique de réconciliation en fait une icône mondiale de la liberté." },
  { id:110, img:"Rassemblement philosophique à Athènes.webp",     title:"Socrate — La Philosophie comme Mode de Vie",      date:"~470–399 av. J.-C.",        year:-450,     era:"Antiquité",       desc:"Socrate arpente l'agora d'Athènes et interroge ses concitoyens sur la vertu, la justice et le bonheur. Condamné à mort pour impiété, il choisit de boire la ciguë plutôt que de fuir." },
  { id:111, img:"Aristote Le philosophe et ses disciples aux étoiles.webp", title:"Aristote — Le Père des Sciences",        date:"~384–322 av. J.-C.",        year:-350,     era:"Antiquité",       desc:"Disciple de Platon et précepteur d'Alexandre le Grand, Aristote fonde la logique, la biologie et la physique. Son œuvre encyclopédique domine la pensée occidentale pendant 2 000 ans." },
  { id:112, img:"Alexandre le grand Le général au coucher du soleil.webp", title:"Alexandre le Grand — La Conquête du Monde", date:"334–323 av. J.-C.",        year:-330,     era:"Antiquité",       desc:"En moins de dix ans, Alexandre le Grand conquiert un empire s'étendant de la Grèce à l'Inde. Il répand la culture grecque (hellénisme) dans tout l'Orient et fonde 70 villes dont Alexandrie." },
  { id:113, img:"Scène de commerce phénicien au port.webp",        title:"Les Phéniciens — Inventeurs de l'Alphabet",       date:"~1 100 av. J.-C.",          year:-1100,    era:"Antiquité",       desc:"Navigateurs et commerçants hors pair, les Phéniciens sillonnent toute la Méditerranée depuis Tyr et Sidon. Leur alphabet de 22 consonnes est l'ancêtre direct de nos alphabets actuels." },
  { id:114, img:"Batailles iconiques des guerres gréco-perses.webp", title:"Les Guerres Médiques — La Grèce face à la Perse", date:"490–479 av. J.-C.",       year:-490,     era:"Antiquité",       desc:"Les cités grecques repoussent deux fois l'empire perse de Darius puis Xerxès. Marathon (490), les Thermopyles (480) et Salamine (480) entrent dans la légende de la résistance occidentale." },
  { id:115, img:"Rassemblement guerriers marchands Bronze.webp",   title:"L'Âge du Bronze — Premières Civilisations",       date:"~3 000–1 200 av. J.-C.",    year:-2000,    era:"Antiquité",       desc:"L'Âge du Bronze voit naître les premières grandes civilisations : Égypte, Mésopotamie, Mycènes, Minoen. Le commerce à longue distance et la métallurgie du bronze structurent le monde antique." },
  { id:116, img:"Pharaon Ménès et l'unification de l'Égypte.webp", title:"Ménès — L'Unification de l'Égypte",              date:"~3 100 av. J.-C.",          year:-3100,    era:"Antiquité",       desc:"Le pharaon Ménès unifie la Haute et la Basse-Égypte, fondant la première dynastie. Il instaure la double couronne et pose les bases de 3 000 ans de civilisation égyptienne." },
  { id:117, img:"Ramsès II devant ses temples majestueux.webp",    title:"Ramsès II — Le Pharaon Bâtisseur",                date:"~1 279–1 213 av. J.-C.",    year:-1250,    era:"Antiquité",       desc:"Ramsès II règne 67 ans et fait ériger des monuments colossaux : Abou Simbel, le Ramesseum. Il signe avec les Hittites le premier traité de paix connu de l'histoire." },
  { id:118, img:"Ciceron Orateur romain au coucher du soleil.webp", title:"Cicéron — L'Art de la Rhétorique Romaine",      date:"~106–43 av. J.-C.",         year:-60,      era:"Antiquité",       desc:"Avocat, sénateur et philosophe, Cicéron est le plus grand orateur de Rome. Ses discours contre Catilina sauvent la République. Ses écrits philosophiques transmettent la pensée grecque à l'Occident." },
  { id:119, img:"Jules César _ de général à empereur.webp",        title:"Jules César — De la Gaule au Pouvoir Absolu",     date:"~100–44 av. J.-C.",         year:-50,      era:"Antiquité",       desc:"César conquiert la Gaule en huit ans, franchit le Rubicon et s'empare du pouvoir à Rome. Dictateur à vie, il est assassiné aux ides de mars 44 av. J.-C. par des sénateurs républicains." },
  { id:120, img:"Auguste.webp",                                     title:"Auguste — Le Premier Empereur Romain",            date:"27 av. J.-C. – 14 apr. J.-C.", year:-20,   era:"Antiquité",       desc:"Octave, petit-neveu de César, devient Auguste et fonde l'Empire romain. Son règne de 40 ans inaugure la Pax Romana, deux siècles de paix et de prospérité dans tout le bassin méditerranéen." },
  { id:121, img:"LEmpire Trajan.webp",                              title:"Trajan — L'Empire Romain à son Apogée",           date:"98–117 apr. J.-C.",         year:110,      era:"Antiquité",       desc:"Sous Trajan, l'Empire romain atteint son extension maximale : 5 millions de km² et 70 millions d'habitants. La colonne Trajane à Rome célèbre ses victoires sur les Daces." },
  { id:122, img:"Néron contemple la ville en flammes.webp",         title:"Néron — L'Incendie de Rome",                      date:"64 apr. J.-C.",             year:64,       era:"Antiquité",       desc:"Un incendie dévaste Rome pendant six jours. Néron, accusé d'en être l'auteur, rejette la faute sur les chrétiens, déclenchant la première grande persécution. Il finance la reconstruction et bâtit sa Maison Dorée." },
  { id:123, img:"Persecution des chrétiens dans l'arène.webp",      title:"Les Persécutions Chrétiennes",                    date:"Ier–IVe siècle apr. J.-C.", year:200,      era:"Antiquité",       desc:"Pendant trois siècles, les chrétiens sont persécutés dans l'Empire romain : refus du culte impérial, martyrs dans les arènes. Ces persécutions forgent l'identité et la cohésion de l'Église naissante." },
  { id:124, img:"L'édiction de l'Édit de Milan.webp",               title:"L'Édit de Milan — La Liberté Religieuse",         date:"313 apr. J.-C.",            year:313,      era:"Antiquité",       desc:"Constantin et Licinius proclament l'Édit de Milan qui accorde la liberté de culte à tous les habitants de l'Empire. Le christianisme sort de la clandestinité et devient bientôt religion d'État." },
  { id:125, img:"Diogène et l'agora d'Athènes.webp",                title:"Diogène — Le Philosophe du Tonneau",               date:"~412–323 av. J.-C.",        year:-350,     era:"Antiquité",       desc:"Diogène de Sinope, fondateur du cynisme, vit dans un tonneau et rejette toute convention sociale. Il répond à Alexandre le Grand qui lui demande ce qu'il désire : 'Que tu t'ôtes de mon soleil.'" },
  { id:126, img:"Cleopâtre surplombant Alexandrie au crépuscule.webp", title:"Cléopâtre VII — La Dernière Reine d'Égypte", date:"51–30 av. J.-C.",           year:-45,      era:"Antiquité",       desc:"Cléopâtre VII, reine d'Égypte, séduit César puis Marc Antoine pour préserver son royaume face à Rome. Sa défaite à Actium (31 av. J.-C.) et sa mort marquent la fin de l'Égypte ptolémaïque." },
  { id:127, img:"Jérusalem ancienne sous la lumière dorée.webp",    title:"La Destruction du Temple de Jérusalem",           date:"70 apr. J.-C.",             year:70,       era:"Antiquité",       desc:"Le général romain Titus détruit le Second Temple de Jérusalem et disperse le peuple juif. La Diaspora commence. Le Mur des Lamentations, seul vestige du Temple, est toujours lieu de prière." },
  { id:128, img:"Qin Shi Huang & la Grande Muraille.webp",          title:"Qin Shi Huang — Premier Empereur de Chine",       date:"221 av. J.-C.",             year:-221,     era:"Antiquité",       desc:"Qin Shi Huang unifie la Chine et impose une seule écriture, monnaie et mesure. Il lance la construction de la Grande Muraille et fait ériger une armée de 8 000 soldats en terre cuite pour l'éternité." },
  { id:129, img:"Lao-Tzu.webp",                                     title:"Lao-Tseu — Le Taoïsme et la Voie",                date:"~VIe siècle av. J.-C.",     year:-550,     era:"Antiquité",       desc:"Lao-Tseu, sage légendaire de la Chine ancienne, rédige le Tao Te Ching — 81 courts chapitres sur la Voie. Le taoïsme enseigne l'harmonie avec la nature et le wu wei, l'action sans effort." },
  { id:130, img:"Thales.webp",                                      title:"Thalès — La Naissance de la Pensée Rationnelle",  date:"~625–546 av. J.-C.",        year:-600,     era:"Antiquité",       desc:"Thalès de Milet est le premier à expliquer le monde par des causes naturelles plutôt que divines. Il prédit une éclipse solaire et affirme que tout est fait d'eau. La philosophie occidentale est née." },
    { id:131, img:"raids_vikings.webp",                              title:"Rollon — Les Vikings s'installent en Normandie",   date:"911",                       year:911,      era:"Moyen Âge",       desc:"Le chef viking Rollon reçoit un vaste territoire de Charles le Simple — la future Normandie — en échange de sa conversion et d'un hommage au roi. Les pillards deviennent des seigneurs féodaux." },
  { id:132, img:"collier épaule etrier.webp",                      title:"L'An Mil — La Peur et le Renouveau",              date:"~1000",                     year:1000,     era:"Moyen Âge",       desc:"Contrairement à la légende, l'an mil ne fut pas une apocalypse. Ce fut au contraire une période de renouveau : la population croît, les défrichements s'accélèrent, les villages se multiplient." },
  { id:133, img:"guillaume le conquerant.webp",                    title:"Guillaume le Conquérant — Bataille d'Hastings",   date:"1066",                      year:1066,     era:"Moyen Âge",       desc:"Le duc de Normandie, descendant du viking Rollon, conquiert l'Angleterre à Hastings. La Tapisserie de Bayeux raconte cette épopée en 70 mètres de broderie. Le français devient langue officielle d'Angleterre." },
  { id:134, img:"basilique saint denis gothique.webp",             title:"Saint-Denis — Naissance de l'Art Gothique",       date:"1144",                      year:1144,     era:"Moyen Âge",       desc:"L'abbé Suger fait reconstruire la basilique de Saint-Denis avec des arcs en ogive et de grandes baies vitrées. La lumière envahit l'église. Le style gothique, qui régnera trois siècles, est né." },
  { id:135, img:"universités.webp",                                title:"La Naissance des Universités",                    date:"XIIe – XIIIe siècle",       year:1200,     era:"Moyen Âge",       desc:"Paris, Bologne, Oxford : les premières universités naissent autour des cathédrales. Des milliers d'étudiants de toute l'Europe viennent étudier la théologie, le droit et la médecine." },
  { id:136, img:"La_bataille_de_Bouvines_en_1214.webp",           title:"Philippe Auguste — Le Bâtisseur du Royaume",      date:"1180 – 1223",               year:1200,     era:"Moyen Âge",       desc:"Philippe II triple le territoire royal en récupérant la Normandie et l'Anjou des rois d'Angleterre. Sa victoire à Bouvines (1214) contre une coalition européenne est un grand tournant de l'histoire de France." },
  { id:137, img:"urbain2_croisades.webp",                          title:"La Première Croisade — Prise de Jérusalem",       date:"1095 – 1099",               year:1099,     era:"Moyen Âge",       desc:"Répondant à l'appel du pape Urbain II, des dizaines de milliers de chevaliers traversent l'Europe et le Proche-Orient. En juillet 1099, ils s'emparent de Jérusalem après un siège brutal." },
  { id:138, img:"1ers etats generaux.webp",                        title:"La Magna Carta — Naissance des Droits",           date:"1215",                      year:1215,     era:"Moyen Âge",       desc:"Les barons anglais forcent le roi Jean sans Terre à signer la Grande Charte. Pour la première fois, un roi reconnaît que son pouvoir n'est pas absolu. Ce texte fondateur pose les bases de la démocratie moderne." },
  { id:139, img:"La flotte de trésor de Zheng He.webp",           title:"Marco Polo — La Route de la Soie",                date:"1271 – 1295",               year:1280,     era:"Moyen Âge",       desc:"Le jeune Vénitien Marco Polo parcourt 24 000 km jusqu'en Chine, séjourne 17 ans à la cour de Kubilai Khan. Son livre 'Le Devisement du monde' ouvre les yeux de l'Europe sur l'Orient." },
  { id:140, img:"Louis IX.webp",                                   title:"Saint Louis — Le Roi Idéal",                      date:"1226 – 1270",               year:1250,     era:"Moyen Âge",       desc:"Louis IX incarne l'idéal du roi chrétien : il rend la justice sous un chêne à Vincennes, laisse les pauvres lui parler directement. Il mène deux croisades et meurt de la peste à Tunis. Canonisé en 1297." },
  { id:141, img:"philippe le bel.webp",                            title:"Philippe le Bel — Le Roi de Fer",                 date:"1285 – 1314",               year:1300,     era:"Moyen Âge",       desc:"Philippe IV crée les premiers États Généraux (1302), expulse les Juifs et brise l'ordre des Templiers. Son règne marque la montée en puissance de la monarchie face à l'Église." },
  { id:142, img:"pape avignon.webp",                               title:"La Papauté d'Avignon",                            date:"1309 – 1377",               year:1340,     era:"Moyen Âge",       desc:"Sous la pression du roi de France, le pape Clément V transfère la cour pontificale de Rome à Avignon. Pendant 68 ans, sept papes successifs — tous français — résident en Avignon. Rome est abandonnée." },
  { id:143, img:"peste marseille.webp",                            title:"La Peste Noire à Marseille",                      date:"1347 – 1351",               year:1347,     era:"Moyen Âge",       desc:"En octobre 1347, des galères génoises arrivent à Marseille avec des marins mourants couverts de bubons noirs. La peste bubonique se répand dans toute la France. Un tiers de la population européenne meurt." },
  { id:144, img:"crecy.webp",                                      title:"Crécy — La Chevalerie Décimée",                   date:"26 août 1346",              year:1346,     era:"Moyen Âge",       desc:"Les archers anglais au longbow massacrent la chevalerie française qui charge sans ordre. 1 500 chevaliers tombent. C'est l'une des premières victoires de l'infanterie sur la cavalerie — une révolution militaire." },
  { id:145, img:"guerre de 100 ans.webp",                          title:"Du Guesclin — Le Vengeur de la Chevalerie",       date:"1320 – 1380",               year:1360,     era:"Moyen Âge",       desc:"Breton roturier et laid, Bertrand Du Guesclin devient connétable de France. Il invente la guérilla médiévale : éviter les grandes batailles, harceler l'ennemi, reprendre les châteaux un par un." },
  { id:146, img:"charles V.webp",                                  title:"Charles V le Sage — Le Roi Bibliothécaire",       date:"1364 – 1380",               year:1370,     era:"Moyen Âge",       desc:"Charles V redresse la France après les désastres de Jean le Bon. Il constitue la première grande bibliothèque royale — 1 200 volumes, ancêtre de la Bibliothèque nationale — et impose la première heure officielle à Paris." },
  { id:147, img:"roi prisonnier.webp",                             title:"La Jacquerie — La Révolte des Paysans",           date:"1358",                      year:1358,     era:"Moyen Âge",       desc:"Ruinés par la guerre, la peste et les pillages, les paysans français se soulèvent. La Jacquerie est réprimée dans le sang par la noblesse. 20 000 paysans sont massacrés en quelques semaines." },
  { id:148, img:"charles VI.webp",                                 title:"Charles VI — Le Roi Fou",                         date:"1380 – 1422",               year:1400,     era:"Moyen Âge",       desc:"Charles VI sombre dans la folie à partir de 1392. La France sombre dans la guerre civile entre Armagnacs et Bourguignons que les Anglais exploitent. La monarchie française est au bord de l'effacement." },
  { id:149, img:"bourguignon armagnac.webp",                       title:"Armagnacs contre Bourguignons",                   date:"1407 – 1435",               year:1415,     era:"Moyen Âge",       desc:"L'assassinat du duc d'Orléans par Jean sans Peur déclenche une guerre civile féroce. Armagnacs et Bourguignons déchirent la France pendant 28 ans, permettant aux Anglais d'envahir et de dicter le traité de Troyes." },
  { id:150, img:"charles VII.webp",                                title:"Charles VII — Le Roi Victorieux",                 date:"1422 – 1461",               year:1440,     era:"Moyen Âge",       desc:"Surnommé 'le Roi de Bourges', Charles VII est relancé par Jeanne d'Arc. Il crée la première armée permanente française, les Francs-Archers, et chasse définitivement les Anglais du territoire." },
  { id:151, img:"Bataille_d'Azincourt_sous_la_pluie.webp",        title:"Azincourt — La Chevalerie Française Anéantie",    date:"25 octobre 1415",           year:1415,     era:"Moyen Âge",       desc:"Henri V et 6 000 soldats épuisés écrasent 20 000 chevaliers français. La noblesse française — ducs, comtes, maréchaux — est décimée en quelques heures. Shakespeare en fera son chef-d'œuvre : Henry V." },
  { id:152, img:"byzance.webp",                                    title:"La 4e Croisade — Le Sac de Constantinople",       date:"1202 – 1204",               year:1203,     era:"Moyen Âge",       desc:"Partis libérer Jérusalem, les croisés dévient vers Constantinople — ville chrétienne — et la pillent sauvagement. L'Empire byzantin ne se relèvera jamais. Les Croisades se retournent contre la chrétienté." },
  { id:153, img:"Jacques_de_Molay_devant_Notre-Dame.webp",        title:"Le Grand Schisme d'Occident",                     date:"1378 – 1417",               year:1400,     era:"Moyen Âge",       desc:"L'Église se déchire : deux papes, puis trois, se disputent le trône de saint Pierre. Pendant 39 ans, les chrétiens ne savent plus qui obéir. Le concile de Constance (1417) met fin au scandale." },
  { id:154, img:"expulsion juifs.webp",                            title:"La Reconquista — L'Espagne Reprend ses Terres",   date:"1250 – 1492",               year:1400,     era:"Moyen Âge",       desc:"Pendant huit siècles, les royaumes chrétiens du nord repoussent les royaumes musulmans vers le sud. En 1492, Grenade — dernier bastion islamique — tombe. Ferdinand et Isabelle réunifient l'Espagne." },
  { id:155, img:"sacre_charlemagne.webp",                          title:"Le Saint Empire Romain Germanique",               date:"962 – 1250",                year:1100,     era:"Moyen Âge",       desc:"Otton Ier est couronné empereur à Rome en 962, ressuscitant l'idée carolingienne. Ce patchwork de principautés dispute pendant des siècles la suprématie avec la papauté dans la querelle des Investitures." },
  { id:156, img:"christine de pisan.webp",                         title:"Christine de Pisan — La Première Féministe",      date:"XIVe – XVe siècle",        year:1400,     era:"Moyen Âge",       desc:"Veuve à 25 ans avec trois enfants, Christine de Pisan devient la première femme à vivre de sa plume en Europe. Elle défend l'égalité intellectuelle des femmes et critique la misogynie littéraire de son temps." },
  { id:157, img:"bacon.webp",                                      title:"Roger Bacon & la Méthode Scientifique",           date:"XIIIe siècle",              year:1250,     era:"Moyen Âge",       desc:"Moine franciscain, Roger Bacon préconise l'observation et l'expérimentation contre la simple autorité des textes. Il décrit la poudre à canon et prédit lunettes et bateaux à vapeur. Emprisonné 14 ans pour ses idées." },
  { id:158, img:"ars nova.webp",                                   title:"L'Ars Nova — La Révolution Musicale",             date:"XIVe siècle",               year:1320,     era:"Moyen Âge",       desc:"Guillaume de Machaut et les compositeurs du XIVe siècle inventent l'Ars Nova : polyphonie complexe, rythmes nouveaux, notation musicale moderne. La musique médiévale tardive préfigure la Renaissance." },
  { id:159, img:"l'horloge médiévale.webp",                        title:"L'Horloge Mécanique — La Naissance du Temps",     date:"XIVe siècle",               year:1350,     era:"Moyen Âge",       desc:"Les premières horloges mécaniques apparaissent dans les clochers européens. Pour la première fois, le temps est mesuré indépendamment du soleil. Le retard et la ponctualité sont des inventions médiévales." },
  { id:160, img:"Le_siège_de_Constantinople,_1453.webp",          title:"Byzance — L'Empire qui Dura 1 000 Ans",           date:"330 – 1453",                year:800,      era:"Moyen Âge",       desc:"L'Empire romain d'Orient, fondé par Constantin à Constantinople, survit aux invasions barbares et préserve la culture grecque et romaine. Il résiste 1 000 ans avant de tomber face aux canons ottomans en 1453." },
  { id:161, img:"decouverte amerique.webp",                        title:"Christophe Colomb — La Découverte de l'Amérique",  date:"12 octobre 1492",           year:1492,     era:"Renaissance",     desc:"Christophe Colomb atteint les Caraïbes en cherchant la route des Indes. Cette rencontre entre l'Ancien et le Nouveau Monde déclenche une révolution géographique, biologique et culturelle sans précédent." },
  { id:162, img:"luther.webp",                                     title:"Luther — La Réforme Protestante",                  date:"1517",                      year:1517,     era:"Renaissance",     desc:"Martin Luther affiche ses 95 thèses à Wittenberg, contestant la vente des indulgences par l'Église. La chrétienté se divise pour toujours entre catholiques et protestants. L'Europe entre dans un siècle de guerres de religion." },
  { id:163, img:"copernic.webp",                                   title:"Copernic — La Terre Tourne autour du Soleil",      date:"1543",                      year:1543,     era:"Renaissance",     desc:"Nicolas Copernic publie sa théorie héliocentrique : la Terre tourne autour du Soleil, et non l'inverse. Cette révolution copernicienne brise le dogme de l'Église et ouvre l'ère de la science moderne." },
  { id:164, img:"Machiavel à son bureau à Florence.webp",          title:"Machiavel — Le Prince",                            date:"1513",                      year:1513,     era:"Renaissance",     desc:"Machiavel rédige Le Prince, traité fondateur de la pensée politique moderne. Séparant éthique et politique, il conseille au souverain d'être à la fois lion et renard. La fin justifie les moyens." },
  { id:165, img:"Leonard et Michel-Ange.webp",                     title:"Léonard de Vinci — Le Génie Universel",            date:"1452 – 1519",               year:1500,     era:"Renaissance",     desc:"Peintre, sculpteur, architecte, ingénieur et scientifique, Léonard de Vinci incarne l'idéal de la Renaissance. La Joconde, La Cène et ses milliers de carnets de notes témoignent d'un génie sans équivalent." },
  { id:166, img:"Tenochtitlan.webp",                               title:"Cortés — La Conquête de Tenochtitlan",             date:"1519 – 1521",               year:1520,     era:"Renaissance",     desc:"Hernán Cortés et 600 soldats espagnols renversent l'Empire aztèque de Moctezuma. Tenochtitlan, capitale de 200 000 habitants, est rasée. La conquête de l'Amérique centrale commence." },
  { id:167, img:"Mayas.webp",                                      title:"L'Empire Maya — Cité des Étoiles",                 date:"~300 – 900 apr. J.-C.",     year:600,      era:"Antiquité",       desc:"Les Mayas bâtissent une civilisation remarquable : pyramides, écriture hiéroglyphique, calendrier précis et astronomie avancée. Leurs cités de Chichén Itzá et Tikal comptent des centaines de milliers d'habitants." },
  { id:168, img:"machu pitchu.webp",                               title:"L'Empire Inca — Machu Picchu",                     date:"~1438 – 1533",              year:1500,     era:"Renaissance",     desc:"L'Empire inca est le plus grand d'Amérique : 12 millions d'habitants, 4 000 km de routes, sans roue ni écriture. Machu Picchu, cité perchée à 2 400 mètres, est découverte par les Occidentaux en 1911 seulement." },
  { id:169, img:"shakespeare.webp",                                title:"Shakespeare — Le Plus Grand Dramaturge",           date:"1564 – 1616",               year:1600,     era:"Renaissance",     desc:"William Shakespeare écrit 37 pièces de théâtre et 154 sonnets. Hamlet, Macbeth, Roméo et Juliette, Othello : son œuvre explore toutes les passions humaines et reste la plus jouée au monde 400 ans plus tard." },
  { id:170, img:"newton.webp",                                     title:"Newton — La Loi de la Gravitation",                date:"1687",                      year:1687,     era:"Époque Moderne",  desc:"Isaac Newton publie les Principia Mathematica : la loi de la gravitation universelle explique pourquoi les planètes orbitent et les pommes tombent. Il invente aussi le calcul infinitésimal. La physique classique est née." },
  { id:171, img:"colbert.webp",                                    title:"Colbert — L'Architecte de l'État Français",        date:"1661 – 1683",               year:1670,     era:"Époque Moderne",  desc:"Ministre de Louis XIV, Jean-Baptiste Colbert réorganise les finances, fonde la marine royale, crée les manufactures royales et développe le canal du Midi. Son mercantilisme fait de la France la première puissance économique d'Europe." },
  { id:172, img:"moliere.webp",                                    title:"Molière — Le Maître de la Comédie",                date:"1622 – 1673",               year:1660,     era:"Époque Moderne",  desc:"Jean-Baptiste Poquelin, dit Molière, révolutionne la comédie avec Tartuffe, Dom Juan et Le Misanthrope. Il rit des hypocrites, des médecins et des bourgeois. Il mourut sur scène en jouant Le Malade Imaginaire." },
  { id:173, img:"la fontaine.webp",                                title:"La Fontaine — Les Fables",                         date:"1668 – 1694",               year:1668,     era:"Époque Moderne",  desc:"Jean de La Fontaine publie ses Fables en douze livres. Le Corbeau et le Renard, La Cigale et la Fourmi : ces récits animaliers cachent une critique subtile de la société et des puissants sous Louis XIV." },
  { id:174, img:"racine andromaque.webp",                          title:"Racine — La Tragédie Classique",                   date:"1667 – 1677",               year:1670,     era:"Époque Moderne",  desc:"Jean Racine porte la tragédie française à son apogée avec Andromaque, Britannicus et Phèdre. Ses héros sont dévorés par des passions fatales qu'ils ne peuvent maîtriser. Le classicisme français atteint sa perfection." },
  { id:175, img:"versailles.webp",                                 title:"Versailles — Le Palais du Roi-Soleil",             date:"1661 – 1710",               year:1680,     era:"Époque Moderne",  desc:"Louis XIV transforme le pavillon de chasse de son père en le plus grand palais du monde : 700 pièces, 2 000 fenêtres, 83 km de routes, 1 400 fontaines. Versailles devient le modèle de toutes les cours européennes." },
  { id:176, img:"rembrant.webp",                                   title:"Rembrandt — L'Âge d'Or Néerlandais",               date:"1606 – 1669",               year:1640,     era:"Époque Moderne",  desc:"Rembrandt van Rijn incarne le Siècle d'Or hollandais. La Ronde de Nuit, ses centaines d'autoportraits et ses gravures révolutionnent la peinture par leur maîtrise de la lumière et de l'ombre (clair-obscur)." },
  { id:177, img:"bach.webp",                                       title:"Bach — Le Sommet de la Musique Baroque",           date:"1685 – 1750",               year:1720,     era:"Époque Moderne",  desc:"Johann Sebastian Bach compose plus de 1 000 œuvres : fugues, cantates, passions. Méconnu de son vivant, il est redécouvert au XIXe siècle par Mendelssohn. Il est aujourd'hui considéré comme le plus grand compositeur de l'histoire." },
  { id:178, img:"mozart.webp",                                     title:"Mozart — L'Enfant Prodige",                        date:"1756 – 1791",               year:1780,     era:"Époque Moderne",  desc:"Wolfgang Amadeus Mozart compose ses premières symphonies à 8 ans. Don Giovanni, La Flûte Enchantée, le Requiem : son génie inépuisable produit 626 œuvres en 35 ans de vie. Il mourut pauvre et fut enterré dans une fosse commune." },
  { id:179, img:"Japon Tokugawa — 250 Ans de Paix.webp",          title:"Le Japon des Tokugawa — 250 Ans de Paix",          date:"1603 – 1868",               year:1650,     era:"Époque Moderne",  desc:"Le shogun Tokugawa Ieyasu unifie le Japon et instaure une paix de 250 ans. Le pays se ferme aux étrangers (sakoku), développe une culture unique — théâtre Nô, geishas, estampes — avant l'irruption américaine en 1853." },
  { id:180, img:"lunettes.webp",                                   title:"Galilée — Le Premier Scientifique Moderne",        date:"1609 – 1642",               year:1620,     era:"Renaissance",     desc:"Galilée pointe sa lunette vers le ciel et observe les lunes de Jupiter, confirmant Copernic. Condamné par l'Inquisition, il aurait murmuré : 'Et pourtant elle tourne.' Il est le père de la méthode expérimentale." },
  { id:181, img:"corsaires.webp",                                  title:"Les Corsaires — Guerre sur Mer",                   date:"XVIe – XVIIIe siècle",     year:1680,     era:"Époque Moderne",  desc:"Les corsaires français — Jean Bart, Surcouf, Duguay-Trouin — combattent au nom du roi. Contrairement aux pirates, ils ont une lettre de marque royale. Dunkerque et Saint-Malo vivent de cette guerre maritime contre l'Angleterre." },
  { id:182, img:"Schéma et histoire du compas.webp",               title:"La Boussole — La Révolution de la Navigation",     date:"XIIe – XVe siècle",        year:1400,     era:"Moyen Âge",       desc:"Venue de Chine, la boussole atteint l'Europe au XIIe siècle et révolutionne la navigation. Combinée au gouvernail d'étambot et aux progrès cartographiques, elle rend possible les Grandes Découvertes du XVe siècle." },
  { id:183, img:"Empire Songhaï — Tombouctou.webp",                title:"L'Empire Songhaï — L'Afrique des Lumières",        date:"1464 – 1591",               year:1500,     era:"Renaissance",     desc:"L'Empire Songhaï, avec sa capitale Gao, est le plus grand empire d'Afrique de l'Ouest. Tombouctou abrite une université islamique réputée dans tout le monde musulman. Sa chute face aux Saadiens marocains en 1591 est un tournant majeur." },
  { id:184, img:"Giotto peint les fresques à Padoue.webp",         title:"Giotto — Le Père de la Peinture Occidentale",      date:"~1267 – 1337",              year:1300,     era:"Moyen Âge",       desc:"Giotto di Bondone révolutionne la peinture en représentant des personnages avec volume, émotion et humanité. Ses fresques de la chapelle des Scrovegni à Padoue rompent avec le style byzantin figé et annoncent la Renaissance." },
  { id:185, img:"epoque coloniale.webp",                           title:"L'Époque Coloniale — L'Europe Conquiert le Monde", date:"XVIe – XIXe siècle",       year:1600,     era:"Époque Moderne",  desc:"Portugal, Espagne, France, Angleterre et Pays-Bas se partagent le monde. Des millions d'Amérindiens périssent de maladies importées. Les empires coloniaux transforment l'économie mondiale et posent les bases du monde contemporain." },
  { id:186, img:"haut fourneau.webp",                              title:"Le Haut Fourneau — La Métallurgie Moderne",        date:"XVe – XVIIIe siècle",      year:1600,     era:"Époque Moderne",  desc:"Le développement du haut fourneau permet de produire de la fonte en grandes quantités. Cette révolution métallurgique fournit canons, outils et ponts. Elle préfigure directement la révolution industrielle du XVIIIe siècle." },
  { id:187, img:"moulins a vent.webp",                             title:"Les Moulins à Vent — L'Énergie du Vent",           date:"XIIe – XVIIe siècle",      year:1500,     era:"Renaissance",     desc:"Les Pays-Bas perfectionnent le moulin à vent pour pomper l'eau et assécher les polders. Ces moulins permettent de conquérir des terres sur la mer et de moudre le grain. La maîtrise de l'énergie naturelle préfigure l'industrie." },
  { id:188, img:"papier.webp",                                     title:"Le Papier — De la Chine à l'Europe",               date:"IIe siècle – XIIIe siècle", year:1200,     era:"Moyen Âge",       desc:"Inventé en Chine au IIe siècle, le papier atteint l'Europe via le monde arabe au XIIIe siècle. Il remplace progressivement le parchemin, coûteux et rare. Sans papier, ni Gutenberg ni la Renaissance n'auraient été possibles." },
  { id:189, img:"Prêtre shintoïste.webp",                          title:"Le Shintoïsme — L'Âme du Japon",                   date:"Origines – Époque Moderne", year:700,      era:"Moyen Âge",       desc:"Le shintoïsme, religion originelle du Japon, vénère les kami — esprits de la nature. Associé au bouddhisme importé au VIe siècle, il structure l'identité japonaise. L'Empereur est lui-même considéré comme descendant de la déesse Amaterasu." },
  { id:190, img:"confucius.webp",                                  title:"Confucius — La Pensée qui Façonna l'Asie",         date:"~551–479 av. J.-C.",        year:-500,     era:"Antiquité",       desc:"Confucius enseigne le respect de la hiérarchie, la piété filiale et la vertu du gouvernant. Son œuvre, les Entretiens, structure la société chinoise, coréenne, japonaise et vietnamienne pendant 2 500 ans." },
  { id:191, img:"napoleon.webp",                                   title:"Waterloo — La Fin de l'Empire",                    date:"18 juin 1815",              year:1815,     era:"XIXe siècle",     desc:"Napoléon est défait par Wellington et Blücher dans les plaines belges. Cent jours après son retour de l'île d'Elbe, l'aventure napoléonienne s'achève. Exilé à Sainte-Hélène, il y mourra six ans plus tard." },
  { id:192, img:"robespierre.webp",                                title:"La Déclaration des Droits de l'Homme (1789)",      date:"26 août 1789",              year:1789,     era:"XIXe siècle",     desc:"L'Assemblée nationale adopte la Déclaration des droits de l'Homme et du Citoyen. 'Les hommes naissent et demeurent libres et égaux en droits.' Ce texte fondateur inspire encore les constitutions du monde entier." },
  { id:193, img:"terreur.webp",                                    title:"La Commune de Paris — La République Insurgée",     date:"18 mars – 28 mai 1871",     year:1871,     era:"XIXe siècle",     desc:"Après la défaite contre la Prusse, les Parisiens se soulèvent et proclament la Commune. 72 jours de gouvernement révolutionnaire avant la Semaine Sanglante : 10 000 à 30 000 communards tués par l'armée versaillaise." },
  { id:194, img:"bastille.webp",                                   title:"Les Trois Glorieuses — Révolution de 1830",        date:"27 – 29 juillet 1830",      year:1830,     era:"XIXe siècle",     desc:"En trois jours, le peuple de Paris chasse Charles X qui voulait restaurer l'Ancien Régime. Louis-Philippe, roi des Français et non plus roi de France, instaure la Monarchie de Juillet. La Liberté guidant le Peuple de Delacroix immortalise ces journées." },
  { id:195, img:"victor hugo.webp",                                title:"Jules Ferry — L'École Gratuite et Laïque",         date:"1881 – 1882",               year:1882,     era:"XIXe siècle",     desc:"Le ministre Jules Ferry rend l'école primaire gratuite (1881) puis laïque et obligatoire (1882). Les crucifix quittent les classes, les hussards noirs de la République remplacent les frères et sœurs. Une révolution silencieuse qui forge la nation française." },
  { id:196, img:"dreyfus.webp",                                    title:"La Séparation de l'Église et de l'État (1905)",    date:"9 décembre 1905",           year:1905,     era:"XIXe siècle",     desc:"La loi de séparation met fin au Concordat de 1801. L'État ne reconnaît plus aucun culte ni ne le finance. Les biens de l'Église sont inventoriés — les 'inventaires' déclenchent des émeutes. La laïcité à la française est née." },
  { id:197, img:"premiere guerre.webp",                           title:"Clemenceau — Le Père de la Victoire",              date:"1917 – 1919",               year:1918,     era:"XXe siècle",      desc:"Nommé président du Conseil en novembre 1917, Clemenceau redresse une France épuisée et au bord de la mutinerie. Son énergie farouche ('Je fais la guerre !') porte la France jusqu'à l'armistice du 11 novembre 1918." },
  { id:198, img:"annees folles.webp",                              title:"Le Front Populaire — Léon Blum (1936)",            date:"juin 1936",                 year:1936,     era:"XXe siècle",      desc:"Le gouvernement Léon Blum accorde les congés payés, la semaine de 40 heures et les conventions collectives. Des millions d'ouvriers partent en vacances pour la première fois. La France découvre le droit au repos." },
  { id:199, img:"occupation.webp",                                 title:"Jean Moulin et la Résistance Française",           date:"1940 – 1943",               year:1942,     era:"XXe siècle",      desc:"Préfet révoqué par Vichy, Jean Moulin rallie Londres puis unifie les mouvements de résistance en zone libre. Arrêté par Klaus Barbie en juin 1943, il meurt sous la torture sans avoir parlé. De Gaulle le transfère au Panthéon en 1964." },
  { id:200, img:"de gaulle.webp",                                  title:"L'Appel du 18 Juin 1940",                          date:"18 juin 1940",              year:1940,     era:"XXe siècle",      desc:"Le général de Gaulle, depuis Londres, lance sur les ondes de la BBC son appel à la résistance. Presque personne ne l'entend en direct. Mais cet acte de désobéissance historique fonde la France Libre et change le cours de la guerre." },
  { id:201, img:"debarquement.webp",                               title:"La Libération de Paris (août 1944)",               date:"25 août 1944",              year:1944,     era:"XXe siècle",      desc:"Après cinq ans d'occupation, Paris se libère. La 2e Division Blindée du général Leclerc entre dans la capitale. De Gaulle descend les Champs-Élysées sous les acclamations d'une foule immense. La France renaît." },
  { id:202, img:"mur de berlin.webp",                              title:"La Construction Européenne — Traité de Rome",      date:"25 mars 1957",              year:1957,     era:"XXe siècle",      desc:"Six pays — France, Allemagne, Italie, Belgique, Pays-Bas, Luxembourg — signent le Traité de Rome et créent la CEE. Après deux guerres mondiales, l'Europe choisit la paix par l'intégration économique. Le rêve de Jean Monnet prend forme." },
  { id:203, img:"mitterand.webp",                                  title:"Mitterrand — L'Alternance de 1981",                date:"10 mai 1981",               year:1981,     era:"XXe siècle",      desc:"Pour la première fois sous la Ve République, la gauche gagne l'Élysée. François Mitterrand abolit la peine de mort, nationalise les banques et décentralise la France. Une alternance historique après 23 ans de droite au pouvoir." },
  { id:204, img:"crise 1929.webp",                                 title:"La Révolution Russe — Lénine et les Bolchéviks",   date:"octobre 1917",              year:1917,     era:"XXe siècle",      desc:"Les bolchéviks de Lénine renversent le gouvernement provisoire et s'emparent du pouvoir. Première révolution socialiste de l'histoire, elle donne naissance à l'URSS et divise le monde en deux blocs pour 70 ans." },
  { id:205, img:"guerre d indochine.webp",                         title:"Gandhi — L'Indépendance de l'Inde (1947)",         date:"15 août 1947",              year:1947,     era:"XXe siècle",      desc:"Après des décennies de résistance non-violente menée par Gandhi, l'Inde obtient son indépendance du Royaume-Uni. La partition entre Inde et Pakistan provoque l'un des plus grands exodes de l'histoire : 14 millions de personnes déplacées." },
  { id:206, img:"guerre d algerie.webp",                           title:"La Décolonisation Africaine — L'Année 1960",       date:"1960",                      year:1960,     era:"XXe siècle",      desc:"En une seule année, 17 pays africains accèdent à l'indépendance. La décolonisation bouleverse la carte du monde. Les nouveaux États, aux frontières héritées de la colonisation, affrontent des défis colossaux." },
  { id:207, img:"mai 68.webp",                                     title:"Martin Luther King — I Have a Dream (1963)",       date:"28 août 1963",              year:1963,     era:"XXe siècle",      desc:"Devant 250 000 personnes à Washington, Martin Luther King prononce son discours historique. Ses combats non-violents pour les droits civiques aboutissent au Civil Rights Act (1964) et au Voting Rights Act (1965). Il est assassiné en 1968." },
  { id:208, img:"impressionnisme.webp",                            title:"L'Impressionnisme — Révolution Artistique",        date:"1874",                      year:1874,     era:"XIXe siècle",     desc:"La première exposition impressionniste à Paris est moquée par la critique. Monet, Renoir, Degas et Pissarro brisent les codes académiques : touche libre, lumière naturelle, instants fugitifs. Ils révolutionnent l'histoire de l'art." },
  { id:209, img:"zola.webp",                                       title:"Zola — J'Accuse et le Combat pour la Vérité",      date:"13 janvier 1898",           year:1898,     era:"XIXe siècle",     desc:"Émile Zola publie 'J'Accuse !' en une du journal L'Aurore, accusant l'état-major d'avoir condamné Dreyfus en sachant qu'il était innocent. Jugé pour diffamation, exilé en Angleterre, il reste le symbole de l'intellectuel engagé." },
  { id:210, img:"belle epoque.webp",                               title:"La Belle Époque — Paris Capitale du Monde",        date:"1890 – 1914",               year:1900,     era:"XIXe siècle",     desc:"Entre 1890 et 1914, Paris rayonne sur le monde entier : métro, cinéma, Moulin Rouge, expositions universelles. L'automobile et l'électricité transforment la vie quotidienne. Cette parenthèse enchantée s'achève dans les tranchées." },
  { id:211, img:"3eme republique.webp",                            title:"La IIIe République — La France Républicaine",      date:"1870 – 1940",               year:1900,     era:"XIXe siècle",     desc:"La IIIe République dure 70 ans — la plus longue des régimes français. Elle ancre les valeurs républicaines, laïcise la société, bâtit l'empire colonial. Elle survit à la Grande Guerre avant de sombrer dans la défaite de 1940." },
  { id:212, img:"tour effeil.webp",                                title:"L'Exposition Universelle de 1889",                 date:"1889",                      year:1889,     era:"XIXe siècle",     desc:"Paris accueille 32 millions de visiteurs pour célébrer le centenaire de la Révolution. La Tour Eiffel, clou du spectacle, est le symbole de la puissance industrielle française. La lumière électrique illumine la nuit pour la première fois." },
  { id:213, img:"Assaut sur les plages de Normandie.webp",         title:"Le Débarquement de Provence — Anvil-Dragoon",      date:"15 août 1944",              year:1944,     era:"XXe siècle",      desc:"Deux mois après le Débarquement de Normandie, 450 000 soldats alliés — dont de nombreux Français — débarquent en Provence. Toulon et Marseille sont libérées en dix jours. Cette opération souvent oubliée libère le sud de la France en six semaines." },
  { id:214, img:"Les freres grimm conte de village.webp",          title:"Le Romantisme — Hugo, Delacroix, Chopin",          date:"1820 – 1850",               year:1835,     era:"XIXe siècle",     desc:"En réaction aux Lumières, le Romantisme exalte la nature, le rêve et les émotions. Hugo écrit Notre-Dame de Paris, Delacroix peint La Liberté guidant le Peuple, Chopin compose ses nocturnes. L'artiste romantique est un génie solitaire et tourmenté." },
  { id:215, img:"Les deux souverains face à face.webp",            title:"Le Congrès de Vienne — L'Europe Redessinée",       date:"1814 – 1815",               year:1815,     era:"XIXe siècle",     desc:"Après la chute de Napoléon, les grands souverains d'Europe se réunissent à Vienne pour redessiner le continent. Metternich orchestre une Europe de la réaction. Mais les idées révolutionnaires françaises ne peuvent être effacées." },
  { id:216, img:"Atelier_de_charpentier_ancien.webp",              title:"Les Manufactures Royales — Naissance de l'Industrie", date:"XVIIe – XVIIIe siècle",  year:1680,     era:"Époque Moderne",  desc:"Colbert crée les manufactures royales : tapisseries des Gobelins, cristal de Saint-Louis, porcelaine de Sèvres. Ces ateliers d'État concentrent des centaines d'artisans et introduisent la division du travail avant la révolution industrielle." },
  { id:217, img:"Traversée_en_mer_au_coucher_du_soleil.webp",      title:"La Révolution Maritime — La Vapeur en Mer",        date:"1807 – 1850",               year:1830,     era:"XIXe siècle",     desc:"Le premier bateau à vapeur traverse l'Atlantique en 1819. La navigation à vapeur remplace progressivement la voile : les traversées durent des semaines au lieu de mois. Le monde se rétrécit et le commerce mondial explose." },
  { id:218, img:"Les jeux olympiques antiques à Olympie.webp",     title:"Les Jeux Olympiques Modernes — Pierre de Coubertin", date:"1896",                    year:1896,     era:"XIXe siècle",     desc:"Le Français Pierre de Coubertin ressuscite les Jeux Olympiques en 1896 à Athènes. 14 nations et 241 athlètes participent. Inspirés des jeux de l'Antiquité grecque, les JO modernes deviennent le plus grand événement sportif mondial." },
  { id:219, img:"Les sept merveilles du monde antique.webp",       title:"L'Archéologie Moderne — Champollion et Schliemann", date:"XIXe siècle",             year:1850,     era:"XIXe siècle",     desc:"Champollion déchiffre les hiéroglyphes en 1822 grâce à la Pierre de Rosette. Schliemann retrouve Troie en 1873. L'archéologie naît comme science. L'humanité redécouvre ses propres origines dans un élan de curiosité sans précédent." },
  { id:220, img:"boudha.webp",                                     title:"Le Bouddhisme Découvert par l'Occident",           date:"XIXe siècle",               year:1860,     era:"XIXe siècle",     desc:"Les orientalistes européens traduisent les textes bouddhistes au XIXe siècle. Schopenhauer, Nietzsche et Tolstoï sont fascinés par cette sagesse venue d'Asie. Le bouddhisme influence profondément la philosophie et la littérature occidentales." },
  { id:221, img:"archimede.webp",                                  title:"Archimède — Génie de Syracuse",                    date:"~287–212 av. J.-C.",        year:-250,     era:"Antiquité",       desc:"Archimède invente la vis sans fin, calcule le nombre Pi, découvre le principe de la poussée hydrostatique dans son bain ('Eurêka !') et conçoit des machines de guerre qui retardent la conquête romaine de Syracuse pendant deux ans." },
  { id:222, img:"eratosthene.webp",                                title:"Ératosthène — Il Mesure la Terre",                 date:"~276–194 av. J.-C.",        year:-240,     era:"Antiquité",       desc:"Directeur de la Bibliothèque d'Alexandrie, Ératosthène calcule la circonférence de la Terre en mesurant l'ombre d'un bâton à Alexandrie et à Syène. Son résultat — 40 000 km — est exact à 2 % près. Il y a 2 200 ans, sans satellite." },
  { id:223, img:"fibonacci.webp",                                  title:"Fibonacci — Les Chiffres Arabes en Europe",        date:"~1175–1250",                year:1202,     era:"Moyen Âge",       desc:"Leonardo Fibonacci ramène d'Afrique du Nord le système de numération arabe — incluant le zéro — et le vulgarise en Europe dans son Liber Abaci (1202). Nos chiffres modernes lui doivent tout. Sa suite de nombres gouverne les spirales de la nature." },

/* ── STARS ── */
(function(){
  const c=document.getElementById('stars-canvas'),ctx=c.getContext('2d');let stars=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  function init(){resize();stars=Array.from({length:220},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.3+.15,a:Math.random()*.55+.08,speed:Math.random()*.0004+.00015,phase:Math.random()*Math.PI*2}));}
  let t=0;function draw(){t++;ctx.clearRect(0,0,c.width,c.height);for(const s of stars){const f=s.a*(.65+.35*Math.sin(t*s.speed*80+s.phase));ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(232,223,196,${f})`;ctx.fill();}requestAnimationFrame(draw);}
  addEventListener('resize',init);init();draw();
})();

/* ── STATE ── */
let deck=[],idx=0,flipped=false,knownSet=new Set(),reviewSet=new Set();
const fc=()=>document.getElementById('fc');
const front=()=>document.getElementById('front');
const overlay=()=>document.getElementById('overlay');

/* ── LOAD CONTENT ── */
function loadContent(){
  const card=deck[idx];
  document.getElementById('fc-img').src='../img/histoire/'+card.img;
  document.getElementById('fc-era').textContent=card.era;
  document.getElementById('fc-date').textContent=card.date;
  document.getElementById('fc-title').textContent=card.title;
  document.getElementById('fc-desc').textContent=card.desc||'';
  const pct=(idx/deck.length)*100;
  document.getElementById('p-text').textContent=`Carte ${idx+1} / ${deck.length}`;
  document.getElementById('p-fill').style.width=pct+'%';
  document.querySelectorAll('#strip .thumb').forEach((el,i)=>el.classList.toggle('cur',i===idx));
}

/* ── ADVANCE: fondu noir → iris ── */
function advance(){
  const ov=overlay(), fr=front(), wrap=fc();

  // 1. Fondu NOIR
  ov.classList.add('dark');

  setTimeout(()=>{
    // 2. Snap verso→recto SANS animation (bloqué par no-anim)
    wrap.classList.add('no-anim');
    wrap.classList.remove('flipped');
    flipped=false;
    fr.classList.remove('iris');

    // 3. Charger le contenu sous le noir
    loadContent();

    // 4. Deux frames = snap peint avant de retirer le verrou
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      wrap.classList.remove('no-anim');
      ov.classList.remove('dark');   // dissoudre le noir
      fr.classList.add('iris');      // ouvrir l'iris
    }));

  }, 280);
}

/* ── FLIP ── */
function flipCard(){
  if(flipped){
    idx=(idx+1)%deck.length;
    advance();
  } else {
    flipped=true;
    fc().classList.add('flipped');
  }
}

/* ── NAVIGATION ── */
function nextCard(){idx=(idx+1)%deck.length;advance();}
function prevCard(){idx=(idx-1+deck.length)%deck.length;advance();}

function shuffleCards(){
  deck=shuffle([...CARDS]);idx=0;flipped=false;
  knownSet.clear();reviewSet.clear();
  updateCounters();buildStrip();advance();
}

function markKnown(){
  knownSet.add(deck[idx].id);reviewSet.delete(deck[idx].id);
  updateCounters();idx=(idx+1)%deck.length;advance();
}

function markReview(){
  reviewSet.add(deck[idx].id);knownSet.delete(deck[idx].id);
  const card=deck.splice(idx,1)[0];
  deck.splice(Math.min(idx+3,deck.length),0,card);
  updateCounters();if(idx>=deck.length)idx=0;advance();
}

/* ── UI ── */
function updateCounters(){
  document.getElementById('k-count').textContent=knownSet.size;
  document.getElementById('r-count').textContent=reviewSet.size;
  document.getElementById('rem-count').textContent=deck.length-knownSet.size-reviewSet.size;
}

function buildStrip(){
  const strip=document.getElementById('strip');strip.innerHTML='';
  deck.forEach((card,i)=>{
    const img=document.createElement('img');
    img.src='../img/histoire/'+card.img;img.alt=card.title;
    img.className='thumb'+(i===0?' cur':'');
    img.onclick=()=>{idx=i;advance();};
    img.title=card.title;
    strip.appendChild(img);
  });
}

/* ── UTILS ── */
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nextCard();}
  if(e.key==='ArrowLeft'){e.preventDefault();prevCard();}
  if(e.key==='Enter'){e.preventDefault();flipCard();}
  if(e.key==='k'||e.key==='K')markKnown();
  if(e.key==='r'||e.key==='R')markReview();
});

/* ── BOOT ── */
deck=shuffle([...CARDS]);
buildStrip();
loadContent(); // première carte sans animation
</script>
