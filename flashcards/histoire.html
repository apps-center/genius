  { id:216, img:"Atelier_de_charpentier_ancien.webp",              title:"Les Manufactures Royales — Naissance de l'Industrie", date:"XVIIe – XVIIIe siècle",  year:1680,     era:"Époque Moderne",  desc:"Colbert crée les manufactures royales : tapisseries des Gobelins, cristal de Saint-Louis, porcelaine de Sèvres. Ces ateliers d'État concentrent des centaines d'artisans et introduisent la division du travail avant la révolution industrielle." },
  { id:217, img:"Traversée_en_mer_au_coucher_du_soleil.webp",      title:"La Révolution Maritime — La Vapeur en Mer",        date:"1807 – 1850",               year:1830,     era:"XIXe siècle",     desc:"Le premier bateau à vapeur traverse l'Atlantique en 1819. La navigation à vapeur remplace progressivement la voile : les traversées durent des semaines au lieu de mois. Le monde se rétrécit et le commerce mondial explose." },
  { id:218, img:"Les jeux olympiques antiques à Olympie.webp",     title:"Les Jeux Olympiques Modernes — Pierre de Coubertin", date:"1896",                    year:1896,     era:"XIXe siècle",     desc:"Le Français Pierre de Coubertin ressuscite les Jeux Olympiques en 1896 à Athènes. 14 nations et 241 athlètes participent. Inspirés des jeux de l'Antiquité grecque, les JO modernes deviennent le plus grand événement sportif mondial." },
  { id:219, img:"Les sept merveilles du monde antique.webp",       title:"L'Archéologie Moderne — Champollion et Schliemann", date:"XIXe siècle",             year:1850,     era:"XIXe siècle",     desc:"Champollion déchiffre les hiéroglyphes en 1822 grâce à la Pierre de Rosette. Schliemann retrouve Troie en 1873. L'archéologie naît comme science. L'humanité redécouvre ses propres origines dans un élan de curiosité sans précédent." },
  { id:220, img:"boudha.webp",                                     title:"Le Bouddhisme Découvert par l'Occident",           date:"XIXe siècle",               year:1860,     era:"XIXe siècle",     desc:"Les orientalistes européens traduisent les textes bouddhistes au XIXe siècle. Schopenhauer, Nietzsche et Tolstoï sont fascinés par cette sagesse venue d'Asie. Le bouddhisme influence profondément la philosophie et la littérature occidentales." },
  { id:221, img:"archimede.webp",                                  title:"Archimède — Génie de Syracuse",                    date:"~287–212 av. J.-C.",        year:-250,     era:"Antiquité",       desc:"Archimède invente la vis sans fin, calcule le nombre Pi, découvre le principe de la poussée hydrostatique dans son bain ('Eurêka !') et conçoit des machines de guerre qui retardent la conquête romaine de Syracuse pendant deux ans." },
  { id:222, img:"eratosthene.webp",                                title:"Ératosthène — Il Mesure la Terre",                 date:"~276–194 av. J.-C.",        year:-240,     era:"Antiquité",       desc:"Directeur de la Bibliothèque d'Alexandrie, Ératosthène calcule la circonférence de la Terre en mesurant l'ombre d'un bâton à Alexandrie et à Syène. Son résultat — 40 000 km — est exact à 2 % près. Il y a 2 200 ans, sans satellite." },
  { id:223, img:"fibonacci.webp",                                  title:"Fibonacci — Les Chiffres Arabes en Europe",        date:"~1175–1250",                year:1202,     era:"Moyen Âge",       desc:"Leonardo Fibonacci ramène d'Afrique du Nord le système de numération arabe — incluant le zéro — et le vulgarise en Europe dans son Liber Abaci (1202). Nos chiffres modernes lui doivent tout. Sa suite de nombres gouverne les spirales de la nature." },
  { id:224, img:"pythagore.webp",                                  title:"Pythagore — Le Théorème Éternel",                  date:"~580–495 av. J.-C.",        year:-530,     era:"Antiquité",       desc:"Pythagore et son école établissent que dans un triangle rectangle, le carré de l'hypoténuse est égal à la somme des carrés des deux autres côtés. Ce théorème, connu des Babyloniens, est posé comme vérité universelle pour la première fois." },
  { id:225, img:"blanche castille.webp",                           title:"Blanche de Castille — La Reine qui Sauva la France", date:"1188 – 1252",             year:1226,     era:"Moyen Âge",       desc:"Épouse de Louis VIII et mère de Saint Louis, Blanche de Castille assure deux régences successives avec une poigne de fer. Elle écrase la révolte des grands barons, protège son fils contre les complots et gouverne seule une France instable." },
  { id:226, img:"Cyrus libère les captifs juifs.webp",             title:"Cyrus le Grand — L'Édit de Libération",            date:"539 av. J.-C.",             year:-539,     era:"Antiquité",       desc:"Le roi perse Cyrus conquiert Babylone et libère tous les peuples captifs — dont les Juifs déportés depuis 586. Son édit de libération est considéré comme la première déclaration des droits de l'Homme. La Bible le désigne comme messie." },
  { id:227, img:"La fondation de Carthage par Didon.webp",         title:"Didon — La Fondation de Carthage",                 date:"~814 av. J.-C.",            year:-814,     era:"Antiquité",       desc:"La princesse phénicienne Didon fuit son frère meurtrier et fonde Carthage sur les côtes de l'actuelle Tunisie. La légende dit qu'elle obtint autant de terrain qu'une peau de bœuf pouvait en couvrir — qu'elle découpa en lanières pour entourer une colline entière." },
  { id:228, img:"La Maison de la Sagesse à Bagdad.webp",           title:"La Maison de la Sagesse — L'Âge d'Or Islamique",   date:"830 – 1258",                year:900,      era:"Moyen Âge",       desc:"À Bagdad, les califes abbassides créent la Maison de la Sagesse : centre de traduction et de recherche où des savants de toutes religions traduisent Aristote et Platon, inventent l'algèbre (Al-Khwarizmi) et font progresser la médecine et l'astronomie." },
  { id:229, img:"La Nativité sous l'étoile brillante.webp",        title:"Jésus de Nazareth — La Nativité",                  date:"~4 av. J.-C.",              year:-4,       era:"Antiquité",       desc:"Selon les Évangiles, Jésus naît à Bethléem d'une vierge, dans une étable, sous une étoile. Ce récit fondateur du christianisme structure le calendrier mondial : notre ère commence avec sa naissance. Deux milliards de chrétiens célèbrent cet événement chaque année." },
  { id:230, img:"Lady Murasaki écrivant sous la lueur de la bougie.webp", title:"Lady Murasaki — Le Premier Roman du Monde", date:"~1007 – 1021",          year:1010,     era:"Moyen Âge",       desc:"Dame de compagnie à la cour impériale du Japon, Murasaki Shikibu rédige le Dit du Genji — 54 chapitres, plus de 1 000 personnages, une psychologie des émotions d'une modernité stupéfiante. Composé à l'encre et au pinceau il y a 1 000 ans, c'est le premier grand roman de l'humanité." },
  { id:231, img:"Les savants grecs en pleine étude.webp",           title:"L'École d'Athènes — La Philosophie Grecque",       date:"Ve – IVe siècle av. J.-C.", year:-400,     era:"Antiquité",       desc:"Socrate, Platon et Aristote fondent à Athènes la philosophie occidentale. L'Académie de Platon et le Lycée d'Aristote accueillent les esprits les plus brillants du monde grec. Leurs questions — Qu'est-ce que la justice ? Qu'est-ce que la vérité ? — restent les nôtres." },
  { id:232, img:"Lutetia au crépuscule du Ier siècle.webp",        title:"Lutetia — Paris sous les Romains",                  date:"Ier–IVe siècle",            year:100,      era:"Antiquité",       desc:"Lutetia Parisiorum, bourgade gauloise sur une île de la Seine, devient une cité gallo-romaine dotée d'arènes, de thermes et d'un forum. Les vestiges des arènes de Lutèce et des thermes de Cluny témoignent encore de cette ville romaine enfouie sous Paris." },
  { id:233, img:"Lugdunum à son apogée.webp",                      title:"Lugdunum — Lyon, Capitale des Gaules",             date:"Ier–IIe siècle",            year:100,      era:"Antiquité",       desc:"Fondée en 43 av. J.-C., Lugdunum (Lyon) devient la capitale de la Gaule romaine. Deux empereurs — Claudius et Caracalla — y sont nés. Ses aqueducs, son théâtre et son amphithéâtre en font une des plus grandes cités de l'Empire." },
  { id:234, img:"Masalia vue sur la cité antique au coucher du soleil.webp", title:"Marseille — Massalia, 2 600 Ans d'Histoire",  date:"600 av. J.-C.",         year:-600,     era:"Antiquité",       desc:"Fondée vers 600 av. J.-C. par des marins grecs de Phocée, Massalia est la plus ancienne ville de France. Port commercial prospère, elle introduit la vigne et l'olivier en Gaule. Sa longue résistance à César renforce sa réputation d'indépendance jalousement gardée." },
  { id:235, img:"L'odyssée d'Ulysse et les créatures mythologiques.webp", title:"L'Odyssée d'Ulysse — Dix Ans d'Errance",     date:"~VIIIe siècle av. J.-C.",  year:-800,     era:"Antiquité",       desc:"Après la chute de Troie, Ulysse erre dix ans sur les mers avant de retrouver Ithaque. Cyclopes, sirènes, Circé, Charybde et Scylla : l'Odyssée d'Homère est la première grande épopée d'aventure de la littérature mondiale." },
  { id:236, img:"L'expansion du christianisme au Ier siècle.webp", title:"L'Expansion du Christianisme — Paul de Tarse",    date:"Ier siècle apr. J.-C.",     year:50,       era:"Antiquité",       desc:"Saint Paul parcourt 20 000 km autour du bassin méditerranéen pour répandre le message de Jésus. Ses épîtres, les premières lettres chrétiennes, fondent la théologie. En 300 ans, le christianisme passe de secte persécutée à religion officielle de l'Empire." },
  { id:237, img:"Tombuctu le marché animé d'une cité ancienne.webp", title:"Tombouctou — Le Marché des Savoirs",            date:"XIIIe – XVIe siècle",       year:1400,     era:"Moyen Âge",       desc:"Carrefour des caravanes sahariennes, Tombouctou est au Moyen Âge une ville de 100 000 habitants et un centre intellectuel majeur. Sa mosquée de Djingareyber et son université Sankore attirent des savants de tout le monde islamique." },
  { id:238, img:"Transition historique entre Étrusques et Romains.webp", title:"Les Étrusques — Le Peuple qui Précéda Rome", date:"~800–100 av. J.-C.",       year:-600,     era:"Antiquité",       desc:"Civilisation mystérieuse d'Italie centrale, les Étrusques transmettent à Rome l'alphabet, les techniques d'ingénierie, l'art du combat en formation et les symboles du pouvoir (la toge, les faisceaux). Rome est d'abord une création étrusque." },
  { id:239, img:"Village néolithique au coucher du soleil.webp",    title:"Le Village Néolithique — Les Premières Maisons",  date:"~7 000–3 000 av. J.-C.",    year:-5000,    era:"Préhistoire",     desc:"Le passage à la sédentarisation transforme l'habitat : des maisons en pierre ou en torchis remplacent les abris temporaires. Çatalhöyük en Anatolie (7 500 av. J.-C.) est l'un des premiers villages — 8 000 habitants, sans rues ni portes au niveau du sol." },
  { id:240, img:"Village néolithique en fin d'après-midi.webp",     title:"La Révolution Néolithique — De la Chasse au Blé",  date:"~9 000–4 000 av. J.-C.",   year:-7000,    era:"Préhistoire",     desc:"En quelques millénaires, l'humanité passe de la cueillette à l'agriculture. Le blé, l'orge, les lentilles sont cultivés dans le Croissant Fertile. La sédentarisation crée les surplus alimentaires, les classes sociales et les premières inégalités." },
  { id:241, img:"Ville antique de Sumer en soirée.webp",            title:"Sumer — La Nuit des Premiers Rois",                date:"~3 500–2 000 av. J.-C.",    year:-3000,    era:"Antiquité",       desc:"À la nuit tombée, les cités sumériennes de Nippur, Lagash et Eridu brillent de mille feux. Les premiers rois — lugal — gouvernent de grandes agglomérations de 50 000 habitants avec des lois écrites, des impôts et des armées permanentes." },
  { id:242, img:"Sainte Geneviève défendant Paris en 451.webp",     title:"Sainte Geneviève — La Patronne de Paris",          date:"~422–512",                  year:451,      era:"Haut Moyen Âge",  desc:"En 451, alors qu'Attila et ses Huns marchent sur Paris, la jeune bergère Geneviève convainc les habitants de ne pas fuir. Les Huns dévient vers Orléans. Patronne de Paris, elle est honorée chaque année le 3 janvier. Sa biographie mêle légende et réalité." },
  { id:243, img:"Saint Denis marchant sur la voie ancienne.webp",   title:"Saint Denis — Premier Évêque de Paris",            date:"IIIe siècle",               year:250,      era:"Antiquité",       desc:"Évêque missionnaire envoyé de Rome, Denis est décapité sur la colline de Montmartre (Mons Martyrum — la colline des martyrs) vers 250. Selon la légende, il ramasse sa tête et marche jusqu'à l'emplacement de la future basilique qui porte son nom." },
  { id:244, img:"La promesse divine sous les étoiles.webp",         title:"Abraham — L'Alliance et la Promesse Divine",       date:"~2 000 av. J.-C. (tradition)", year:-2000, era:"Antiquité",       desc:"Selon la tradition abrahamique, Dieu promet à Abraham une descendance aussi nombreuse que les étoiles et une terre promise. Ce pacte fondateur est partagé par les trois religions monothéistes. Abraham est le père spirituel de trois milliards d'êtres humains." },
  { id:245, img:"La ville de Babylone animée.webp",                 title:"Babylone — Hammurabi et le Premier Code de Lois",  date:"~1 792 av. J.-C.",          year:-1792,    era:"Antiquité",       desc:"Le roi Hammurabi fait graver sur une stèle de basalte 282 lois régissant la vie babylonienne : contrats, mariages, salaires, punitions. 'Œil pour œil, dent pour dent.' C'est le premier code de lois écrit et conservé de l'histoire humaine." },
  { id:246, img:"La chute de Jérusalem sous siège.webp",            title:"La Chute de Jérusalem — Nabuchodonosor (586)",     date:"586 av. J.-C.",             year:-586,     era:"Antiquité",       desc:"Le roi babylonien Nabuchodonosor détruit le Temple de Salomon et déporte l'élite juive à Babylone. L'Exil babylonien est un traumatisme fondateur : c'est pendant cette captivité que les textes bibliques sont rassemblés et rédigés dans leur forme définitive." },
  { id:247, img:"La Gaule et ses peuples anciens.webp",             title:"Les Gaulois — Peuple de la Gaule",                 date:"Ve–Ier siècle av. J.-C.",   year:-300,     era:"Antiquité",       desc:"Loin du cliché d'Astérix, les Gaulois sont des agriculteurs, artisans et commerçants organisés en cités. Experts en métallurgie, ils exportent fer et vin dans tout le monde méditerranéen. Leur culture, longtemps méprisée, est aujourd'hui redécouverte." },
  { id:248, img:"Bains romains sous les voûtes majestueuses.webp",  title:"Les Thermes Romains — L'Art de Vivre en Commun",   date:"IIe–IVe siècle apr. J.-C.", year:200,      era:"Antiquité",       desc:"Les thermes romains accueillent chaque jour des milliers de citoyens : bains froids, tièdes et chauds, salle de sport, bibliothèque, boutiques. Ouverts à tous pour quelques pièces, ils sont le cœur de la vie sociale romaine bien au-delà de l'hygiène." },
  { id:249, img:"Merveilles antiques au coucher du soleil.webp",    title:"Les Sept Merveilles du Monde Antique",             date:"~280 av. J.-C.",            year:-280,     era:"Antiquité",       desc:"Pyramides de Gizeh, jardins de Babylone, colosse de Rhodes, phare d'Alexandrie, mausolée d'Halicarnasse, statue de Zeus, temple d'Artémis : les sept merveilles recensées par les Grecs témoignent du génie de l'Antiquité. Une seule subsiste — les Pyramides." },
  { id:250, img:"Marché de l'Âge du Fer.webp",                     title:"L'Âge du Fer — L'Europe des Marchands",            date:"~1 200–50 av. J.-C.",       year:-800,     era:"Antiquité",       desc:"Le fer, plus dur que le bronze et abondant, révolutionne l'artisanat et la guerre. Les marchés de l'Âge du Fer voient s'échanger des poteries, des armes et des textiles sur des milliers de kilomètres. L'Europe se couvre de routes commerciales avant Rome." },
  { id:251, img:"Naissance_de_l'univers_lumineux.webp", title:"Naissance de l'Univers", date:"–13,8 milliards d'années", year:0, era:"Ère Cosmique", desc:"Avant le Big Bang : rien. Pas le vide — le vide, c'est quelque chose. Rien. Pas d'espace, pas de temps, pas de matière. Puis, en moins d'une fraction de seconde, tout ce qui existe jaillit d'un point plus petit qu'un atome. L'espace lui-même se met à gonfler à une vitesse vertigineuse. En 3 minutes, les premiers atomes se forment. L'univers vient de naître." },
  { id:252, img:"creation_syst_solaire.webp", title:"Naissance du Système Solaire", date:"–4,6 milliards d'années", year:0, era:"Ère Cosmique", desc:"Un immense nuage de gaz et de poussières — restes d'étoiles mortes depuis longtemps — commence à s'effondrer sur lui-même sous l'effet de sa propre gravité. Au centre, la pression monte, la température grimpe jusqu'à déclencher la fusion nucléaire : le Soleil s'allume. Autour de lui, les restes du nuage s'agglomèrent en petits cailloux, puis en rochers, puis en planètes. Notre maison vient de se construire." },
  { id:253, img:"La formation de la Terre primordiale.webp", title:"Naissance de la Terre", date:"–4,5 milliards d'années", year:0, era:"Ère Cosmique", desc:"La Terre se forme en agglomérant des millions de rochers en orbite. Mais à peine née, elle reçoit un impact catastrophique : une planète de la taille de Mars, baptisée Théia, la percute de plein fouet. L'explosion est si violente qu'une partie de la Terre et de Théia est projetée dans l'espace. Ces débris s'agglomèrent en orbite et forment la Lune. Pendant des millions d'années encore, des comètes bombardent la Terre — et lui apportent de l'eau." },
  { id:254, img:"Vents_hydrothermaux_et_vie_abyssale.webp", title:"Naissance de la Vie", date:"–3,8 milliards d'années", year:0, era:"Ère Biologique", desc:"Dans les océans primitifs brûlants, autour de cheminées hydrothermales crachant des minéraux à 300°C, quelque chose d'extraordinaire se produit : des molécules chimiques commencent à se copier elles-mêmes. Une membrane se forme pour les envelopper. La première cellule vient de naître — et avec elle, la vie. Ce minuscule événement va transformer toute la planète." },
  { id:255, img:"Vue_préhistorique_sur_une_mer_d'algues.webp", title:"Premières Algues", date:"–1,2 milliards d'années", year:0, era:"Ère Biologique", desc:"Une cellule avale une bactérie photosynthétique — et au lieu de la digérer, elle la garde prisonnière. Cette bactérie devient un chloroplaste, une mini-usine à capter la lumière du Soleil. Née de cet accident extraordinaire, l'algue pluricellulaire est l'ancêtre de toutes les plantes de la planète. Sans cet événement improbable, il n'y aurait ni forêts, ni fleurs, ni fruits — et probablement pas d'humains." },
  { id:256, img:"Écosystème_préhistorique_sous-marin_du_Cambrien.webp", title:"Explosion Cambrienne — Premiers Animaux", date:"–538,8 millions d'années", year:0, era:"Ère Biologique", desc:"Pendant des milliards d'années, la vie est restée microscopique et molle. Puis, en quelques millions d'années — un claquement de doigts à l'échelle géologique — une explosion de formes de vie nouvelles envahit les océans. Des yeux, des pinces, des carapaces, des bouches, des nageoires apparaissent. La plupart des grandes familles d'animaux que l'on connaît aujourd'hui inventent leur plan de construction en même temps. Pourquoi ? On ne sait pas encore vraiment." },
  { id:257, img:"Premiers_pas_de_la_vie_végétale.webp", title:"Les Plantes Conquièrent la Terre", date:"–470 millions d'années", year:0, era:"Ère Biologique", desc:"Pendant des milliards d'années, les continents sont des déserts de roche nue, battus par le vent et les pluies acides. Aucune plante, aucun animal. Puis des algues vertes s'aventurent hors de l'eau et s'y adaptent — progressivement, leurs descendants inventent les racines, les tiges, les feuilles, les graines. En quelques dizaines de millions d'années, les continents se couvrent de vert. La vie terrestre peut enfin commencer." },
  { id:258, img:"Dinosaures au bord de l'eau.webp", title:"Premiers Dinosaures", date:"–230 millions d'années", year:0, era:"Ère Biologique", desc:"Après une extinction massive qui a failli effacer toute la vie complexe (la Grande Extinction du Permien, –252 Ma, qui a tué 96 % des espèces marines), la vie repart de zéro. Parmi les survivants qui se disputent la Terre vide, un groupe se distingue : les dinosaures. Petits et discrets au départ, ils vont dominer chaque centimètre de la planète pendant 165 millions d'années — soit 40 fois la durée d'existence de notre espèce." },
  { id:259, img:"Chute_d'astéroïde_et_fuite_des_dinosaures.webp", title:"Extinction des Dinosaures", date:"–66 millions d'années", year:0, era:"Ère Biologique", desc:"Un mardi ordinaire, il y a 66 millions d'années. Un rocher de 10 km de diamètre — gros comme le Mont Blanc — pénètre l'atmosphère à 72 000 km/h. En quelques secondes, il percute le Yucatán (Mexique). L'énergie libérée est un milliard de fois celle de la bombe atomique d'Hiroshima. Les roches fondues retombent comme une pluie de feu. Un hiver de plusieurs années s'installe. 75 % des espèces disparaissent. Mais dans les terriers, de petits mammifères survivent." },
  { id:260, img:"bipedie.webp", title:"Premiers Hominidés", date:"–7 millions d'années", year:0, era:"Préhistoire", desc:"Sahelanthropus tchadensis (Tchad) — le plus ancien fossile de notre lignée, juste après la séparation évolutive avec les chimpanzés. Ce n'est pas encore un bipède à part entière, mais la position de son foramen magnum (le trou où la colonne vertébrale rejoint le crâne) suggère une posture plus verticale que celle des grands singes. La bipédie est un processus graduel, pas un événement unique." },
  { id:261, img:"L'artisanat_préhistorique_à_l'ère_de_la_pierre.webp", title:"Le Biface — Premier Chef-d'Œuvre Humain", date:"–1,7 million d'années", year:0, era:"Préhistoire", desc:"Homo erectus ramasse un bloc de silex brut et, à force de coups précis avec un percuteur en pierre, en fait émerger une lame symétrique, pointue, tranchante des deux côtés. Le biface acheuléen est à la fois couteau, hache, grattoir et racloir. Il peut trancher de la viande, briser un os pour en extraire la moelle, racler une peau, creuser la terre. Cet outil universel sera utilisé sur trois continents, quasiment sans modification, pendant 1,5 million d'années." },
  { id:262, img:"feu_prehistoire.webp", title:"Maîtrise du Feu", date:"–1 million à –400 000 ans", year:0, era:"Préhistoire", desc:"Homo erectus apprivoise le feu — mais à quelle date exacte ? Les sources se contredisent légitimement, car il y a deux seuils distincts. Vers –1 million d'années : premières traces de feu dans une grotte (os brûlés à Wonderwerk, Afrique du Sud), probablement feux récupérés dans la nature. Vers –400 000 à –500 000 ans : foyers intentionnels répétés et maîtrisés, confirmés sur de nombreux sites en Europe et au Proche-Orient. C'est cette seconde date qui marque la vraie domestication du feu." },
  { id:263, img:"Chasseur préhistorique prêt à lancer sa lance.webp", title:"La Lance en Bois — Première Arme à Distance", date:"–400 000 ans", year:0, era:"Préhistoire", desc:"À Schöningen (Allemagne), huit épieux en bois d'épicéa sont retrouvés intacts, vieux de 400 000 ans. Taillés en pointe, équilibrés comme des javelots modernes, ils sont l'œuvre d'Homo heidelbergensis. C'est la première arme conçue pour tuer à distance — et la preuve que nos ancêtres organisaient déjà des chasses collectives planifiées, et non de simples attaques au corps à corps." },
  { id:264, img:"Premiers regards sur l'horizon préhistorique.webp", title:"Homo Sapiens — Notre Espèce Apparaît", date:"–300 000 ans", year:0, era:"Préhistoire", desc:"Au Maroc, dans les rochers de Jebel Irhoud, des fossiles vieux de 300 000 ans révèlent les premiers visages reconnaissables comme les nôtres. Homo sapiens n'est pas apparu d'un coup, en un endroit unique : il a émergé progressivement, sur tout le continent africain, à partir de populations d'Homo heidelbergensis qui échangeaient gènes et innovations sur des millénaires. Ce qui nous distingue des autres humains n'est pas tant la taille du cerveau — Néandertal avait un cerveau aussi gros — que la façon dont nous nous en servons : imagination, symboles, réseaux sociaux étendus, et une capacité unique à coopérer avec des inconnus." },
  { id:265, img:"Confrontation_préhistorique_dans_la_nuit.webp", title:"La Lance à Pointe de Silex — L'Arme de Néandertal", date:"–250 000 ans", year:0, era:"Préhistoire", desc:"Une révolution dans l'armement : on fixe une pointe de silex taillée sur une hampe en bois grâce à de la résine de bouleau chauffée et des ligatures en tendon. Cette technique — l'emmanchement — multiplie la puissance de pénétration et permet de remplacer la pointe seule sans refaire toute l'arme. C'est Homo heidelbergensis puis Néandertal qui perfectionnent ce système, pendant plus de 200 000 ans." },
  { id:266, img:"Mains_préhistoriques_tissant_des_coquillages.webp", title:"Premières Parures & Sépultures", date:"–100 000 ans", year:0, era:"Préhistoire", desc:"À Blombos Cave (Afrique du Sud), des coquillages percés sont enfilés en colliers — les plus anciens bijoux connus. Les morts commencent à être enterrés avec intention, parfois saupoudrés d'ocre rouge. C'est la naissance du symbolisme : l'humain ne vit plus seulement dans le présent, il imagine un passé (les ancêtres) et un futur (une vie après la mort)." },
  { id:267, img:"Chasseurs_sur_la_savane_au_lever_du_soleil.webp", title:"Premiers Vêtements en Peaux", date:"–80 000 ans", year:0, era:"Préhistoire", desc:"Des grattoirs spécialisés pour le travail des peaux apparaissent dans les sites préhistoriques d'Afrique et d'Europe. La preuve la plus inattendue vient de la génétique : les poux de corps divergent génétiquement des poux de tête il y a environ 83 000 ans — précisément quand les humains ont commencé à se couvrir de façon permanente." },
  { id:268, img:"sortie_afrique.webp", title:"La Grande Sortie d'Afrique", date:"–70 000 ans", year:0, era:"Préhistoire", desc:"Un petit groupe d'Homo Sapiens — peut-être quelques milliers d'individus — franchit le détroit de Bab-el-Mandeb et quitte l'Afrique. Tous les non-Africains vivant aujourd'hui descendent de ce groupe fondateur." },
  { id:269, img:"Traversée_en_mer_au_coucher_du_soleil.webp", title:"Peuplement de l'Australie", date:"–50 000 ans", year:0, era:"Préhistoire", desc:"Des Homo Sapiens atteignent l'Australie en traversant au moins 90 km d'océan ouvert depuis l'Asie du Sud-Est — la première grande navigation de l'histoire humaine. Ce sont les ancêtres des Aborigènes d'aujourd'hui." },
  { id:270, img:"Homme_des_Neandertals_dans_la_neige.webp", title:"Disparition des Néandertaliens", date:"–40 000 ans", year:0, era:"Préhistoire", desc:"Homo neanderthalensis, qui peuplait l'Europe et le Proche-Orient depuis 400 000 ans, disparaît peu après l'arrivée de Sapiens sur le continent. Compétition, assimilation ou épidémies ? Le débat reste ouvert." },
  { id:271, img:"peintures_grotte_chauvet.webp", title:"Grotte Chauvet", date:"–36 000 av. J.-C.", year:0, era:"Préhistoire", desc:"Dans l'Ardèche, des Homo Sapiens peignent sur les parois de la grotte Chauvet les premières grandes œuvres d'art de l'humanité : mammouths, rhinocéros laineux, lions des cavernes — avec un sens du mouvement et de la perspective saisissant." },
  { id:272, img:"Chasseur préhistorique et troupeau de rennes.webp", title:"Le Propulseur & la Sagaie — Un Système Révolutionnaire", date:"–35 000 av. J.-C.", year:0, era:"Préhistoire", desc:"Le propulseur (atlatl) et la sagaie ne sont pas deux inventions séparées : ils forment un système conçu ensemble. Le propulseur est un bras de levier en bois ou en os qui prolonge artificiellement le bras, multipliant par 3 la vitesse et la puissance du lancer. La sagaie est le projectile qui lui correspond : légère, fine, en os ou en ivoire de mammouth — inutile à la main, redoutable lancée. Ensemble, ils permettent de tuer à 80 mètres sans s'approcher du danger." },
  { id:273, img:"Homme_préhistorique_jouant_une_flûte_osseuse.webp", title:"Les Premières Flûtes", date:"–35 000 av. J.-C.", year:0, era:"Préhistoire", desc:"Dans les grottes d'Allemagne du Sud (Hohle Fels, Vogelherd), des artisans taillent des flûtes dans des os d'oiseaux et de l'ivoire de mammouth. Ce sont les plus anciens instruments de musique connus — la musique est aussi vieille que l'art pariétal." },
  { id:274, img:"Chasse_dans_la_tempête_de_neige.webp", title:"La Grande Chasse au Mammouth", date:"–25 000 av. J.-C.", year:0, era:"Préhistoire", desc:"Le mammouth laineux est le pilier de l'économie paléolithique en Europe et en Sibérie. Un seul animal abattu fournit des centaines de kilos de viande, de la graisse pour les lampes et la cuisine, des peaux pour les vêtements et les tentes, des os pour les charpentes, de l'ivoire pour l'art. Ces chasses sont collectives et organisées — pas une simple prédation opportuniste." },
  { id:275, img:"Aiguille_en_os_sur_pierre_éclairée.webp", title:"L'Aiguille à Coudre", date:"–22 000 av. J.-C.", year:0, era:"Préhistoire", desc:"Taillée dans un fragment d'os ou de bois de renne, percée d'un chas minuscule avec un burin en silex : l'aiguille à coudre permet d'assembler des pièces de peau avec précision. On passe de la peau enroulée au vêtement taillé, cousu, ajusté au corps. Sans elle, coloniser la Sibérie glaciaire et atteindre les Amériques est impossible." },
  { id:276, img:"Crépuscule_sur_l'immensité_glacée.webp", title:"Maximum Glaciaire", date:"–20 000 av. J.-C.", year:0, era:"Préhistoire", desc:"Pic de la dernière ère glaciaire : les glaces couvrent l'Europe du Nord, les Alpes et les Pyrénées. Le niveau des mers est 120 mètres plus bas qu'aujourd'hui. Des continents entiers sont reliés à pied. L'humanité se réfugie dans des zones tempérées épargnées par les glaces." },
  { id:277, img:"Modelage_d'un_pot_en_argile.webp", title:"La Poterie", date:"–17 500 av. J.-C.", year:0, era:"Préhistoire", desc:"Les premières poteries connues (Chine, Japon) permettent de cuire, stocker et transporter les aliments. Une révolution silencieuse qui précède l'agriculture de plusieurs millénaires." },
  { id:278, img:"Artiste_préhistorique_peignant_un_cheval.webp", title:"Grotte de Lascaux", date:"–17 000 av. J.-C.", year:0, era:"Préhistoire", desc:"En Dordogne, des artistes magdaléniens ornent les parois de Lascaux de plus de 600 peintures et 1 500 gravures. Bisons, cerfs, chevaux et aurochs y sont représentés avec une maîtrise stylistique extraordinaire — c'est la « Chapelle Sixtine de la Préhistoire »." },
  { id:279, img:"L'homme_préhistorique_et_son_chien.webp", title:"Domestication du Chien", date:"–15 000 av. J.-C.", year:0, era:"Préhistoire", desc:"Le chien est le premier animal domestiqué par l'homme — bien avant les vaches, moutons ou chevaux. Issu du loup gris, il devient aide à la chasse, gardien et compagnon." },
  { id:280, img:"peuplement_amerique_traversée_béring.webp", title:"Peuplement des Amériques", date:"–13 000 av. J.-C.", year:0, era:"Préhistoire", desc:"Des chasseurs sibériens franchissent le pont terrestre de Béringie — une vaste plaine aujourd'hui engloutie sous le détroit de Béring — et s'installent en Amérique du Nord. En quelques millénaires, leurs descendants atteindront la Terre de Feu, à 15 000 km au sud." },
  { id:281, img:"Village néolithique au coucher du soleil.webp", title:"Révolution Néolithique — L'Invention du Futur", date:"–10 000 ans", year:0, era:"Préhistoire", desc:"Pendant 300 000 ans, Homo sapiens a vécu en chassant et en cueillant — nomade, libre, bien nourri, travaillant environ 4 heures par jour. Puis, au Croissant Fertile (actuel Irak, Syrie, Turquie), quelque chose bascule : des groupes commencent à semer, à attendre, à récolter, à stocker. À élever des animaux. À construire des maisons permanentes. En apparence, c'est un progrès. En réalité, c'est aussi le début du travail épuisant, des inégalités, des guerres pour les terres, des épidémies et de la faim. La révolution agricole est l'une des décisions les plus ambiguës de l'histoire humaine." },
  { id:282, img:"Lever_de_soleil_sur_Göbekli_Tepe.webp", title:"Göbekli Tepe", date:"–9 500 av. J.-C.", year:0, era:"Préhistoire", desc:"En Turquie actuelle, des chasseurs-cueilleurs érigent les premiers grands monuments en pierre de l'humanité : des cercles de piliers en T de 6 mètres de haut, ornés de bas-reliefs d'animaux. Göbekli Tepe précède Stonehenge de 6 000 ans et les pyramides de 7 000 ans — et renverse tout ce qu'on croyait savoir." },
  { id:283, img:"trepanations-neolithiques-688po.webp", title:"La Trépanation — Première Chirurgie", date:"–6 500 av. J.-C.", year:0, era:"Préhistoire", desc:"Des crânes néolithiques retrouvés en Europe et au Proche-Orient portent des trous soigneusement percés avec des outils en silex — et des bords recalcifiés, prouvant que les patients ont survécu. C'est la plus ancienne opération chirurgicale connue : on ouvre le crâne pour soigner des fractures, des hématomes, des crises convulsives, ou lors de rituels. L'humanité opère le cerveau 8 500 ans avant l'antisepsie." },
  { id:284, img:"Lever_de_soleil_sur_les_menhirs_de_Bretagne.webp", title:"Menhirs, Dolmens & Carnac", date:"–4 500 av. J.-C.", year:0, era:"Préhistoire", desc:"En Bretagne, des milliers de menhirs sont dressés en alignements sur des kilomètres. Les dolmens — chambres funéraires collectives en dalles de pierre — parsèment l'Europe de l'Atlantique à la mer du Nord. Ces monuments néolithiques exigent des centaines de personnes, des chantiers planifiés sur des décennies, et une astronomie précise : la plupart sont orientés sur les solstices." },
  { id:285, img:"Premier_contact_au_lever_du_soleil.webp", title:"Domestication du Cheval", date:"–3 500 av. J.-C.", year:0, era:"Préhistoire", desc:"Dans les steppes d'Eurasie (culture Botaï, Kazakhstan actuel), des éleveurs néolithiques domestiquent le cheval sauvage. C'est une révolution de la mobilité, de la guerre et du commerce : l'humain peut désormais se déplacer 10 fois plus vite, porter des charges lourdes sur des milliers de kilomètres. En moins de 2 000 ans, le cheval transforme toutes les civilisations du monde connu." },
  { id:286, img:"Atelier_de_charpentier_ancien.webp", title:"La Roue — L'Invention qui Change Tout", date:"–3 500 av. J.-C.", year:0, era:"Préhistoire", desc:"La roue apparaît en Mésopotamie et dans les steppes d'Eurasie vers –3 500 av. J.-C. — probablement à la même époque que la domestication du cheval, dont elle démultiplie l'utilité. La plus ancienne roue complète retrouvée est celle de Ljubljana (Slovénie, –3 350 av. J.-C.). D'abord utilisée pour les potiers, elle est rapidement adaptée aux chariots. Associée à l'axe fixe, elle révolutionne le transport, la guerre et l'agriculture." },
  { id:287, img:"otzi.webp", title:"Ötzi — L'Homme des Glaces", date:"–3 300 av. J.-C.", year:0, era:"Préhistoire", desc:"Dans les Alpes tyroliennes, un chasseur néolithique meurt à 3 210 m d'altitude. Préservé 5 300 ans dans la glace, il est découvert en 1991 et livre un portrait saisissant de l'homme de la fin du Néolithique." },
  { id:288, img:"La_cité_ancienne_d'Ur_au_crépuscule.webp", title:"Uruk & Ur — Les Premières Villes du Monde", date:"–3 200 av. J.-C.", year:0, era:"Préhistoire", desc:"En Mésopotamie (actuel Irak), entre le Tigre et l'Euphrate, naît quelque chose d'entièrement nouveau dans l'histoire humaine : la ville. Uruk dépasse 50 000 habitants — une densité humaine sans précédent. Pour gérer des stocks de milliers de jarres de grain, des centaines de troupeaux, des milliers d'ouvriers, les administrateurs inventent un système de notation : les premiers signes gravés sur argile. L'écriture vient d'être inventée — non pas pour raconter des poèmes, mais pour faire de la comptabilité." },
  { id:289, img:"Main_d'un_scribe_sur_tablette_d'argile.webp", title:"L'Écriture — La Fin de la Préhistoire", date:"–3 200 av. J.-C.", year:0, era:"Préhistoire", desc:"À Uruk (Mésopotamie), des administrateurs gravent des signes cunéiformes sur des tablettes d'argile pour gérer les stocks de grain et de bétail. C'est l'invention de l'écriture — et par définition, la fin de la Préhistoire. Tout ce qui précède, nous ne le connaissons que par l'archéologie. Tout ce qui suit, l'humanité peut se souvenir elle-même. Cette frontière invisible, tracée dans l'argile d'une ville irakienne, sépare le silence des origines de la parole de l'Histoire." },
  { id:290, img:"croissant fertile.webp", title:"Les Premières Cités-États — Uruk & Ur", date:"–3 500 av. J.-C.", year:0, era:"Premières Civilisations — −3500 à −2000", desc:"Entre le Tigre et l'Euphrate (actuel Irak), naît quelque chose d'entièrement nouveau : la ville. Uruk dépasse 50 000 habitants — une densité humaine sans précédent. Pour gérer des milliers de jarres de grain et des troupeaux entiers, les administrateurs inventent les premiers signes gravés sur argile. L'écriture vient de naître — non pas pour raconter des histoires, mais pour faire de la comptabilité." },
  { id:291, img:"Main_d'un_scribe_sur_tablette_d'argile.webp", title:"L'Invention de l'Écriture — Cunéiforme & Hiéroglyphes", date:"–3 500 av. J.-C.", year:0, era:"Premières Civilisations — −3500 à −2000", desc:"En Mésopotamie, les marchands d'Uruk inventent les premiers signes d'écriture pour comptabiliser les récoltes et les troupeaux. Ce cunéiforme tracé sur argile est la première mémoire de l'humanité. Simultanément, en Égypte, les hiéroglyphes apparaissent. L'écriture transforme radicalement les sociétés : elle permet les lois, les contrats, les archives, les récits." },
  { id:292, img:"Pharaon Ménès et l'unification de l'Égypte.webp", title:"Unification de l'Égypte — Ménès & la Double Couronne", date:"–3 100 av. J.-C.", year:0, era:"Premières Civilisations — −3500 à −2000", desc:"Le pharaon Ménès (ou Narmer) unifie la Haute et la Basse-Égypte sous une seule couronne vers –3 100 av. J.-C. C'est la naissance de l'un des plus longs États de l'histoire : la civilisation pharaonique durera 3 000 ans sans interruption majeure. La palette de Narmer, retrouvée à Hiérakonpolis, commémore cet acte fondateur — on y voit le roi coiffé alternativement de la couronne blanche du Sud et de la couronne rouge du Nord. La double couronne ainsi créée, symbole de cette union, sera portée par tous les pharaons pendant trente siècles." },
  { id:293, img:"La construction de la pyramide.webp", title:"Les Pyramides de Gizeh — L'Impossible Réalisé", date:"–2 560 av. J.-C.", year:0, era:"Premières Civilisations — −3500 à −2000", desc:"Sous le règne de Khéops, 20 000 ouvriers — pas des esclaves, des artisans organisés en équipes — érigent la Grande Pyramide en 20 ans. 2,3 millions de blocs de calcaire, chacun pesant en moyenne 2,5 tonnes. Pendant 3 800 ans, la pyramide de Khéops est le plus grand bâtiment du monde. Son alignement avec le nord géographique est précis à 0,05 degrés. On ne sait toujours pas exactement comment." },
  { id:294, img:"Levée_du_ciel_à_Stonehenge.webp", title:"Stonehenge — Le Monument le Plus Mystérieux du Monde", date:"–3 100 à –1 500 av. J.-C.", year:0, era:"Premières Civilisations — −3500 à −2000", desc:"Sur la plaine de Salisbury, en Angleterre, des générations de bâtisseurs érigent pendant 1 600 ans un cercle de pierres colossales. La phase principale commence vers –2 500 av. J.-C. : 80 blocs de grès bleuté (les « bluestones »), pesant jusqu'à 4 tonnes, sont acheminés depuis le Pays de Galles — à 240 km. Puis les immenses sarsen stones (25 tonnes chacune) arrivent de 30 km. Le tout s'aligne exactement sur le coucher de soleil du solstice d'hiver et le lever du solstice d'été. Sans roue. Sans métal. Sans écriture." },
  { id:295, img:"Rassemblement de guerriers et marchands du Bronze.webp", title:"L'Âge du Bronze — La Révolution des Métaux", date:"–2 000 av. J.-C.", year:0, era:"Premières Civilisations — −3500 à −2000", desc:"L'alliage du cuivre et de l'étain donne le bronze, métal plus dur et plus tranchant que tout ce qui existait. Il révolutionne l'armement, l'agriculture et le commerce. Les routes du bronze relient l'Europe à l'Asie Mineure. Les civilisations qui maîtrisent le bronze dominent leurs voisins pendant mille ans. En Europe, l'Âge du Bronze transforme des sociétés pastorales en civilisations guerrières organisées." },
  { id:296, img:"babylone vers -1800.webp", title:"Babylone & Hammurabi — Le Premier Code de Lois", date:"–1 800 av. J.-C.", year:0, era:"Égypte, Mésopotamie & Récits Fondateurs — −2000 à −1200", desc:"Babylone devient la plus grande ville du monde connu. Sous Hammurabi, elle unifie toute la Mésopotamie et grave sur une stèle de basalte de 2,25 mètres le premier grand code de lois de l'histoire : 282 articles applicables à tous. En même temps, les Babyloniens inventent les mathématiques avancées, prédisent les éclipses, et dessinent la première carte du monde." },
  { id:297, img:"Le sacrifice d'Isaac arrêté par l'ange.webp", title:"La Naissance du Judaïsme — Le Premier Monothéisme", date:"–1 800 à –1 200 av. J.-C.", year:0, era:"Égypte, Mésopotamie & Récits Fondateurs — −2000 à −1200", desc:"Selon la tradition biblique, Abraham quitte Ur en Chaldée et conclut une alliance (berith) avec un Dieu unique et universel — idée révolutionnaire dans un monde polythéiste. Cette figure fondatrice est commune aux trois monothéismes : judaïsme, christianisme et islam. L'historicité d'Abraham fait débat : aucune source extrabiblique ne le mentionne, mais la tradition orale qu'il représente correspond à des migrations de peuples sémites réelles vers –1 800." },
  { id:298, img:"Moïse_et_le_buisson_ardent.webp", title:"Moïse & l'Exode — La Libération d'Égypte", date:"–1 250 av. J.-C.", year:0, era:"Égypte, Mésopotamie & Récits Fondateurs — −2000 à −1200", desc:"Selon la Bible, le peuple hébreu est réduit en esclavage en Égypte. Moïse, hébreu élevé à la cour du Pharaon, reçoit de Dieu une mission au buisson ardent : libérer son peuple. Les dix plaies d'Égypte, la traversée de la mer Rouge, les Tables de la Loi reçues au Sinaï — ces récits fondent l'identité juive. <em>Note : aucun document égyptien ne mentionne cet Exode, et l'archéologie du Sinaï n'a pas retrouvé de traces d'un campement de masse. L'événement est historiquement non confirmé mais theólogiquement fondateur.</em>" },
  { id:299, img:"La destruction des anciens dieux à Amarna.webp", title:"Akhenaton — Le Pharaon Hérétique", date:"–1 372 à –1 336 av. J.-C.", year:0, era:"Égypte, Mésopotamie & Récits Fondateurs — −2000 à −1200", desc:"Amenhotep IV prend le nom d'Akhenaton ('celui qui est utile à Aton') et impose le monothéisme en Égypte : un seul dieu, Aton, le disque solaire. Il ferme les temples des autres dieux, confisque leurs richesses, et déplace la capitale à Amarna, une ville entièrement neuve bâtie en dix ans dans le désert. Sa femme Néfertiti, dont le buste au musée de Berlin est l'une des œuvres d'art les plus célèbres du monde, semble avoir joué un rôle politique majeur. À la mort d'Akhenaton, ses successeurs s'empressent d'effacer toute trace de sa révolution religieuse — son nom est martelé sur les monuments. Akhenaton sera oublié pendant 3 000 ans, jusqu'à ce que les archéologues redécouvrent Amarna au XIXe siècle." },
  { id:300, img:"Le jeune pharaon et ses trésors.webp", title:"Toutankhamon — Le Pharaon Enfant", date:"–1 354 à –1 327 av. J.-C.", year:0, era:"Égypte, Mésopotamie & Récits Fondateurs — −2000 à −1200", desc:"Toutankhamon monte sur le trône à 9 ans et meurt à 18 ou 19 ans — probablement de complications liées à une fracture de la jambe, selon les analyses ADN récentes. Fils ou gendre d'Akhenaton, il restaure l'ancienne religion égyptienne, reprend le nom divin Amon, et abandonne Amarna pour retourner à Thèbes. Pendant 3 000 ans, sa tombe sommeille dans la Vallée des Rois, oubliée. En 1922, l'archéologue Howard Carter perce un mur et découvre, incrédule, une chambre étincelante : 5 000 objets d'or, d'ivoire et de faïence. Le masque funéraire en or massif de Toutankhamon, pesant 10 kg, est aujourd'hui le visage le plus reconnu de l'Égypte ancienne." },
  { id:301, img:"Ramsès II devant ses temples majestueux.webp", title:"Ramsès II — Le Pharaon Bâtisseur", date:"–1 279 à –1 213 av. J.-C.", year:0, era:"Égypte, Mésopotamie & Récits Fondateurs — −2000 à −1200", desc:"Ramsès II règne 66 ans — le plus long règne de l'histoire égyptienne. Il fait ériger Abu Simbel, Karnak, le Ramesseum. Il mène la bataille de Qadesh contre les Hittites — la première bataille de l'histoire documentée en détail — et conclut le premier traité de paix international connu. Il eut probablement plus de 100 enfants." },
  { id:302, img:"Le cheval de Troie dans la cité.webp", title:"La Guerre de Troie", date:"–1 250 av. J.-C.", year:0, era:"Égypte, Mésopotamie & Récits Fondateurs — −2000 à −1200", desc:"Selon la tradition épique grecque, le prince troyen Pâris enlève Hélène, épouse du roi de Sparte Ménélas. Une coalition grecque assiège Troie pendant dix ans. La ruse du cheval de bois permet aux Grecs de s'infiltrer et d'incendier la ville. L'historicité de cet événement est débattue : des fouilles à Hisarlik (Turquie) révèlent bien une cité détruite vers –1 200, mais rien ne confirme le récit d'Homère." },
  { id:303, img:"Marché de l'Âge du Fer.webp", title:"L'Âge du Fer & l'Alphabet Phénicien", date:"–1 200 av. J.-C.", year:0, era:"Égypte, Mésopotamie & Récits Fondateurs — −2000 à −1200", desc:"Deux révolutions simultanées transforment le monde méditerranéen : l'Âge du Fer remplace le bronze par un métal plus résistant et abondant, démocratisant l'armement. Les Phéniciens, marchands de génie, inventent le premier alphabet de 22 consonnes — ancêtre direct de l'alphabet grec, latin, arabe et hébreu. L'écriture devient enfin accessible à tous." },
  { id:304, img:"Scène de commerce phénicien au port.webp", title:"Les Phéniciens — Marchands & Inventeurs de l'Alphabet", date:"–1 200 à –146 av. J.-C.", year:0, era:"Égypte, Mésopotamie & Récits Fondateurs — −2000 à −1200", desc:"Peuple de marins et de commerçants établis sur les côtes de l'actuel Liban (Tyr, Sidon, Byblos), les Phéniciens sont les grands explorateurs de la Méditerranée antique. Leurs vaisseaux atteignent l'Espagne, l'Afrique de l'Ouest et peut-être les îles britanniques. Mais leur legs le plus durable est invisible : l'alphabet consonantique de 22 lettres qu'ils diffusent partout où ils commercent. Les Grecs l'adoptent et ajoutent les voyelles — donnant naissance à l'alphabet que le monde entier utilise encore aujourd'hui." },
  { id:305, img:"David_et_Goliath_sur_le_champ_de_bataille.webp", title:"David & Goliath — Le Berger contre le Géant", date:"~–1 020 av. J.-C.", year:0, era:"Proche-Orient & Méditerranée — −1200 à −600", desc:"Selon la Bible (1er livre de Samuel), les Israélites affrontent les Philistins dans la vallée d'Éla. Goliath, guerrier philistin de plus de deux mètres, défie en combat singulier le camp adverse. Aucun soldat n'ose répondre — jusqu'à David, jeune berger sans armure. Il tue Goliath d'un seul projectile lancé à la fronde, tranchant ensuite la tête du géant avec sa propre épée. David deviendra roi et fondera la dynastie qui règnera sur Israël et Juda pendant quatre siècles." },
  { id:306, img:"Jérusalem ancienne sous la lumière dorée.webp", title:"Jérusalem — La Ville aux Trois Religions", date:"–1 000 à aujourd'hui", year:0, era:"Proche-Orient & Méditerranée — −1200 à −600", desc:"David conquiert Jérusalem vers –1000 av. J.-C. et en fait la capitale du royaume d'Israël. Son fils Salomon y bâtit le Premier Temple. En trois mille ans, la ville sera conquise, détruite et reconstruite plus de vingt fois : par Babylone (–586), Alexandre (–332), Rome (–63 puis 70 ap. J.-C.), les Croisés (1099), Saladin (1187), les Ottomans (1517). Chaque conquête laisse ses pierres et ses prières. Aujourd'hui encore, juifs, chrétiens et musulmans se disputent ce kilomètre carré de la Vieille Ville." },
  { id:307, img:"Temple de Salomon et l'Arche sainte.webp", title:"Le Temple de Salomon — La Maison de Dieu", date:"–970 à –586 av. J.-C.", year:0, era:"Proche-Orient & Méditerranée — −1200 à −600", desc:"Le roi Salomon, fils de David, fait construire à Jérusalem le Premier Temple vers –970 av. J.-C. — demeure de Dieu et écrin de l'Arche d'Alliance selon la Bible. Sa construction aurait duré 7 ans. En –586, Nabuchodonosor II rase le Temple et déporte les élites juives à Babylone : c'est la destruction du Premier Temple, catastrophe fondatrice du judaïsme. <em>Note : aucune preuve archéologique directe du Temple de Salomon n'a été retrouvée à ce jour.</em>" },
  { id:308, img:"La fondation de Carthage par Didon.webp", title:"Création de Carthage — La Rivale de Rome", date:"–814 av. J.-C.", year:0, era:"Proche-Orient & Méditerranée — −1200 à −600", desc:"La reine phénicienne Didon fonde Carthage ('Qart Hadasht' — la nouvelle ville) vers –814 av. J.-C. sur les côtes de l'actuelle Tunisie. Selon la légende, elle obtint des terres locales aussi grandes qu'une peau de bœuf pouvait en couvrir — et fit découper la peau en lanières si fines qu'elles délimitèrent toute une colline. En quelques siècles, Carthage devient la plus grande cité du monde méditerranéen occidental, avec 500 000 habitants, une marine redoutable et un empire commercial s'étendant de l'Espagne au Maroc. Sa rivalité avec Rome donnera naissance aux guerres Puniques — et au plus grand chef militaire de l'Antiquité : Hannibal." },
  { id:309, img:"Cyrus libère les captifs juifs.webp", title:"L'Exil Babylonien & Cyrus le Grand", date:"–586 à –538 av. J.-C.", year:0, era:"Proche-Orient & Méditerranée — −1200 à −600", desc:"En –586, Nabuchodonosor II rase le Temple de Salomon et déporte les élites juives à Babylone. C'est la plus grande catastrophe de l'histoire hébraïque. Mais dans l'adversité, les exilés inventent une religion nouvelle : sans Temple ni sacrifices, la prière collective à la synagogue, le Sabbat hebdomadaire et la mise par écrit de la Torah permettent à la foi de survivre sans lieu fixe. En –538, Cyrus le Grand, roi de Perse, conquiert Babylone et libère tous les peuples déportés. Son édit de tolérance — le premier de l'histoire — autorise les Juifs à rentrer et à reconstruire leur Temple." },
  { id:310, img:"Moïse et les prophètes sous l'orage.webp", title:"La Rédaction de la Bible Hébraïque", date:"–600 à –200 av. J.-C.", year:0, era:"Proche-Orient & Méditerranée — −1200 à −600", desc:"Les textes qui formeront la Bible hébraïque (Tanakh) ne sont pas écrits par Moïse mais compilés et mis par écrit principalement lors de l'exil à Babylone (–586) et dans les siècles qui suivent. La Torah (les cinq premiers livres), les Prophètes et les Écrits sont progressivement rassemblés, débattus et canonisés. C'est moins un événement qu'un long processus de mémoire collective mise en mots." },
  { id:311, img:"La_caravane_vers_le_Trésor_de_Petra.webp", title:"Pétra & les Routes Caravanières", date:"–400 à –100 av. J.-C.", year:0, era:"Proche-Orient & Méditerranée — −1200 à −600", desc:"Au cœur du désert jordanien, le peuple nabatéen taille dans la roche rose une ville extraordinaire : Pétra. Carrefour entre l'Arabie, l'Égypte et la Méditerranée, elle contrôle le commerce des épices, de l'encens, de la soie et de l'or. Ses ingénieurs maîtrisent l'eau dans le désert grâce à un réseau de citernes et de canaux invisible depuis l'extérieur. Au premier siècle avant J.-C., Pétra est l'une des villes les plus riches du monde." },
  { id:312, img:"L'odyssée d'Ulysse et les créatures mythologiques.webp", title:"Homère — L'Iliade & l'Odyssée", date:"–800 av. J.-C.", year:0, era:"Grèce Antique & Monde Hellénistique — −800 à −300", desc:"Vers –800 av. J.-C., un poète grec nommé Homère — peut-être aveugle, peut-être plusieurs personnes — compose les deux épopées fondatrices de toute la littérature occidentale. L'Iliade raconte les dernières semaines de la guerre de Troie : la colère d'Achille, les combats d'Hector, la mort de Patrocle. L'Odyssée suit le retour d'Ulysse pendant 10 ans après la chute de Troie. Ces deux récits transmis d'abord oralement ont été appris par cœur par des générations de Grecs — puis de Romains, puis d'Européens." },
  { id:313, img:"Les jeux olympiques antiques à Olympie.webp", title:"Les Jeux Olympiques — La Trêve Sacrée", date:"–776 av. J.-C.", year:0, era:"Grèce Antique & Monde Hellénistique — −800 à −300", desc:"Les premiers Jeux Olympiques sont célébrés à Olympie en l'honneur de Zeus. Pendant les jeux, toutes les guerres s'arrêtent — la 'trêve olympique' est sacrée. Athlètes nus, piste de stade, courses, lutte, disque, javelot. Les vainqueurs reçoivent une simple couronne d'olivier sauvage — mais leur gloire est immortelle. Les jeux se dérouleront sans interruption pendant 1 200 ans." },
  { id:314, img:"fondation de rome.webp", title:"Fondation de Rome — Romulus & Remus", date:"–753 av. J.-C.", year:0, era:"Grèce Antique & Monde Hellénistique — −800 à −300", desc:"Selon la tradition romaine, Romulus et Remus — jumeaux fils de Mars et de la vestale Rhéa Silvia — sont abandonnés sur le Tibre et allaités par une louve. Romulus fonde Rome sur le Palatin le 21 avril 753 av. J.-C. Il tue son frère lors d'une dispute sur les frontières sacrées. Cette date mythique marque l'an 1 du calendrier romain." },
  { id:315, img:"Masalia vue sur la cité antique au coucher du soleil.webp", title:"Fondation de Massalia — La Plus Vieille Ville de France", date:"–600 av. J.-C.", year:0, era:"Grèce Antique & Monde Hellénistique — −800 à −300", desc:"Des marins phocéens (Grecs d'Asie Mineure) fondent Massalia sur une calanque naturelle du littoral méditerranéen. C'est l'actuelle Marseille — la plus ancienne ville de France, 2 600 ans avant d'être le théâtre de l'hymne national. Cette colonie grecque introduit la vigne, l'olivier et l'écriture alphabétique en Gaule." },
  { id:316, img:"Les savants grecs en pleine étude.webp", title:"Thalès, Pythagore, Ptolémée — Les Savants Grecs", date:"–625 à –100 av. J.-C.", year:0, era:"Grèce Antique & Monde Hellénistique — −800 à −300", desc:"En deux siècles, la Grèce accomplit une révolution intellectuelle sans précédent : elle invente la démonstration mathématique, la philosophie, l'astronomie scientifique et la géographie rationnelle. Thalès de Milet (–624) prédit une éclipse solaire et mesure la hauteur des pyramides par les ombres. Pythagore (–570) lie mathématiques et musique. Euclide codifie la géométrie. Ptolémée (IIe siècle ap. J.-C.) construit un modèle du cosmos utilisé pendant 1 400 ans." },
  { id:317, img:"Rassemblement philosophique à Athènes.webp", title:"La Démocratie Athénienne — Clisthène & Périclès", date:"–508 à –322 av. J.-C.", year:0, era:"Grèce Antique & Monde Hellénistique — −800 à −300", desc:"Clisthène réforme Athènes en 508 av. J.-C. et invente la démocratie directe : chaque citoyen vote en assemblée. Périclès porte ce système à son apogée (461-429 av. J.-C.) et fait construire le Parthénon. Mais cette démocratie exclut femmes, esclaves et étrangers — soit 80% de la population. Socrate sera condamné par cette même démocratie." },
  { id:318, img:"Batailles iconiques des guerres gréco-perses.webp", title:"Les Guerres Médiques — Marathon, Thermopyles, Salamine", date:"–490 à –479 av. J.-C.", year:0, era:"Grèce Antique & Monde Hellénistique — −800 à −300", desc:"L'Empire perse de Darios puis de Xerxès, le plus grand empire du monde connu, tente deux fois d'envahir la Grèce. Deux fois, les cités grecques repoussent l'envahisseur — contre toute attente. Ces guerres produisent trois moments légendaires : Marathon (–490), où un soldat court 42 km pour annoncer la victoire avant de mourir ; les Thermopyles (–480), où 300 Spartiates retardent l'armée perse pendant trois jours ; Salamine (–480), où la flotte athénienne détruit la flotte perse dans un détroit étroit." },
  { id:319, img:"Socrates face à la fatalité.webp", title:"Socrate, Platon — La Philosophie Occidentale", date:"–470 à –347 av. J.-C.", year:0, era:"Grèce Antique & Monde Hellénistique — −800 à −300", desc:"Socrate n'écrit rien — il questionne. Sa méthode (la maïeutique) consiste à faire accoucher les esprits de leurs propres vérités. En 399 av. J.-C., Athènes le condamne à mort pour 'impiété' et 'corruption de la jeunesse'. Il boit la ciguë. Son disciple Platon fonde l'Académie et couche par écrit les dialogues socratiques qui fondent la philosophie occidentale." },
  { id:320, img:"Aristote Le philosophe et ses disciples aux étoiles.webp", title:"Aristote — Le Fondateur de la Science", date:"–384 à –322 av. J.-C.", year:0, era:"Grèce Antique & Monde Hellénistique — −800 à −300", desc:"Élève de Platon à 17 ans, précepteur d'Alexandre le Grand à 42 ans, Aristote est le seul penseur de l'Antiquité à avoir fondé simultanément la logique, la biologie, la physique, la politique, la poétique et l'éthique. Il invente la méthode de classification des animaux, décrit 500 espèces, théorise la tragédie, définit la politique. Ses œuvres, perdues en Occident pendant des siècles, furent conservées par les savants arabes et restituées à l'Europe au XIIe siècle — déclenchant la révolution scolastique." },
  { id:321, img:"Alexandre le grand Le général au coucher du soleil.webp", title:"Alexandre le Grand — Le Plus Grand Conquérant", date:"–336 à –323 av. J.-C.", year:0, era:"Grèce Antique & Monde Hellénistique — −800 à −300", desc:"En 13 ans, Alexandre de Macédoine conquiert un empire s'étendant de la Grèce à l'Inde — sans jamais perdre une bataille. Élève d'Aristote à 13 ans, roi à 20 ans, il renverse l'Empire perse, libère l'Égypte, franchit l'Hindou Kouch, atteint l'Indus. Il meurt à Babylone à 32 ans, d'une cause encore débattue. Son empire se fracture immédiatement — mais la culture grecque, elle, se répand dans tout le monde connu." },
  { id:322, img:"Diogène et l’agora d’Athènes.webp", title:"Diogène — Le Philosophe dans son Tonneau", date:"–412 à –323 av. J.-C.", year:0, era:"Grèce Antique & Monde Hellénistique — −800 à −300", desc:"Diogène de Sinope est le philosophe le plus provocateur de l'Antiquité. Fondateur du cynisme, il vit dans une jarre en terre cuite sur l'agora d'Athènes, ne possède rien, mendie sa nourriture et insulte les puissants. Sa philosophie tient en un mot : <em>autarcie</em> — se suffire à soi-même. Il promène une lanterne en plein jour en déclarant chercher un homme honnête. Quand Alexandre le Grand, maître du monde connu, vient lui rendre visite et lui propose d'exaucer n'importe quel vœu, Diogène répond : «&nbsp;Ôte-toi de mon soleil.&nbsp;» Alexandre s'éloigne en disant : «&nbsp;Si je n'étais pas Alexandre, je voudrais être Diogène.&nbsp;»" },
  { id:323, img:"Les sept merveilles du monde antique.webp", title:"Les 7 Merveilles du Monde Antique", date:"–280 à –140 av. J.-C.", year:0, era:"Rome — République & Conquêtes — −300 à −27", desc:"La liste des 7 Merveilles est établie par des auteurs grecs — notamment Antipater de Sidon (~–140 av. J.-C.) — pour désigner les constructions humaines les plus spectaculaires du monde connu. Les 7 : les Pyramides de Gizeh (Égypte), les Jardins suspendus de Babylone (Mésopotamie), la Statue de Zeus à Olympie (Grèce), le Temple d'Artémis à Éphèse (Turquie), le Mausolée d'Halicarnasse (Turquie), le Colosse de Rhodes (Grèce), le Phare d'Alexandrie (Égypte). Une seule est encore debout." },
  { id:324, img:"Transition historique entre Étrusques et Romains.webp", title:"Les Étrusques & la République Romaine", date:"–800 à –509 av. J.-C.", year:0, era:"Rome — République & Conquêtes — −300 à −27", desc:"Avant Rome, les Étrusques dominent l'Italie centrale. Ce peuple mystérieux — dont la langue reste partiellement indéchiffrée — transmet à Rome l'architecture en voûte, les jeux du cirque, la divination et les symboles du pouvoir (la toge, les faisceaux). En 509 av. J.-C., les Romains chassent leur dernier roi étrusque et proclament la République." },
  { id:325, img:"Hannibal_traversant_les_Alpes_enneigées.webp", title:"Les Guerres Puniques — Carthage & Hannibal", date:"–264 à –146 av. J.-C.", year:0, era:"Rome — République & Conquêtes — −300 à −27", desc:"Trois guerres entre Rome et Carthage (actuelle Tunisie) pour la domination de la Méditerranée. La deuxième (–218 à –201) est la plus célèbre : le général carthaginois Hannibal traverse l'Espagne, franchit les Pyrénées et les Alpes avec 37 éléphants de guerre en plein hiver, descend en Italie et remporte des victoires stupéfiantes — avant d'être finalement repoussé. En –146, Rome rase Carthage et sème le sol de sel." },
  { id:326, img:"Jules César _ de général à empereur.webp", title:"Jules César — Le Dictateur Éternel", date:"–100 à –44 av. J.-C.", year:0, era:"Rome — République & Conquêtes — −300 à −27", desc:"Général brillant, orateur redoutable, écrivain, César conquiert la Gaule (58-52 av. J.-C.), franchit le Rubicon ('alea jacta est'), devient dictateur perpétuel. Il réforme le calendrier (calendrier julien), amnistie ses ennemis, planifie la reconstruction de Carthage. Le 15 mars 44 av. J.-C., 23 coups de poignard mettent fin à sa vie — et déclenchent 13 ans de guerres civiles." },
  { id:327, img:"La Gaule et ses peuples anciens.webp", title:"La Gaule Conquise — César & Vercingétorix", date:"–58 à –52 av. J.-C.", year:0, era:"Rome — République & Conquêtes — −300 à −27", desc:"En 8 campagnes, Jules César soumet 300 tribus gauloises et tue ou réduit en esclavage un million de personnes. Vercingétorix unifie les tribus gauloises en une dernière coalition. Il défait César à Gergovie — mais échoue à Alésia. Encerclé dans la ville fortifiée, il capitule et se livre à César. Il sera emprisonné 6 ans à Rome puis étranglé lors du triomphe de César." },
  { id:328, img:"Le siège romain d'Alesia enflammé.webp", title:"Alésia — La Gaule Devient Romaine", date:"–52 av. J.-C.", year:0, era:"Rome — République & Conquêtes — −300 à −27", desc:"Vercingétorix unifie les peuples gaulois dans un dernier sursaut de résistance. Assiégé dans l'oppidum d'Alésia (Bourgogne), il fait face à César qui construit une double enceinte de 40 km — pour assiéger la ville tout en repoussant une armée de secours de 250 000 hommes. Après 6 semaines, Vercingétorix se rend. La Gaule devient province romaine." },
  { id:329, img:"Cléopâtre surplombant Alexandrie au crépuscule.webp", title:"Cléopâtre & la Fin de l'Égypte Pharaonique", date:"–51 à –30 av. J.-C.", year:0, era:"Rome — République & Conquêtes — −300 à −27", desc:"Cléopâtre VII n'est pas égyptienne de sang — elle est grecque, de la dynastie ptolémaïque fondée par un général d'Alexandre. Elle est la première de sa lignée à parler égyptien. Elle s'allie à César puis à Marc Antoine pour résister à Rome. Vaincue, elle se suicide avec un aspic. Son suicide met fin à 3 000 ans de civilisation pharaonique." },
  { id:330, img:"Auguste.webp", title:"Auguste — Le Premier Empereur", date:"–27 à 14 ap. J.-C.", year:0, era:"Empire Romain & Naissance du Christianisme — −27 à 200", desc:"Octave, petit-neveu et héritier de César, n'a que 18 ans quand il apprend l'assassinat de son grand-oncle. Il forge des alliances, brise ses alliés, et écrase ses rivaux Marc Antoine et Cléopâtre à la bataille d'Actium en –31. En –27, le Sénat lui accorde le titre d'Augustus — 'le vénérable'. Il règne 44 ans, le plus long règne de l'histoire romaine, en gardant soigneusement les formes républicaines tout en concentrant tous les pouvoirs. Sous lui naît la Pax Romana — 200 ans de paix relative qui permettront à l'Empire de prospérer. 'J'ai trouvé Rome en briques, je la laisse en marbre.' Sous son règne naît, en Judée romaine, un certain Jésus de Nazareth." },
  { id:331, img:"Lugdunum à son apogée.webp", title:"Lugdunum (Lyon) — Capitale des Gaules", date:"–15 av. J.-C.", year:0, era:"Empire Romain & Naissance du Christianisme — −27 à 200", desc:"L'empereur Auguste fait de Lugdunum (Lyon) la capitale administrative des Trois Gaules. Deuxième ville de l'Empire après Rome, avec 50 000 à 80 000 habitants. Deux empereurs romains y naîtront : Claude et Caracalla. C'est par Lyon que le christianisme entre en Gaule — et que naît le réseau routier en étoile de toute la France." },
  { id:332, img:"pont_du_gard.webp", title:"Le Pont du Gard — Le Génie Romain", date:"–19 av. J.-C.", year:0, era:"Empire Romain & Naissance du Christianisme — −27 à 200", desc:"Construit sous Auguste près de Nîmes, le Pont du Gard est l'aqueduc le plus haut du monde romain : 49 mètres, 3 niveaux d'arcades, 50 km de canal pour acheminer 40 000 m³ d'eau par jour vers Nîmes. Aucun mortier — uniquement des blocs de pierre ajustés au millimètre, certains pesant 6 tonnes. Il a traversé 2 000 ans pratiquement intact." },
  { id:333, img:"La Nativité sous l'étoile brillante.webp", title:"Naissance de Jésus — Le Tournant du Calendrier", date:"0 ap. J.-C.", year:0, era:"Empire Romain & Naissance du Christianisme — −27 à 200", desc:"La naissance de Jésus de Nazareth divise l'histoire en deux — avant et après Jésus-Christ. Né en Judée romaine, fils d'un charpentier, il prêche l'amour du prochain et le Royaume de Dieu pendant trois ans. Condamné par le gouverneur romain Ponce Pilate sous pression des autorités juives, il est crucifié vers 33 ap. J.-C. Ses disciples proclament sa résurrection. Le christianisme naît." },
  { id:334, img:"Néron contemple la ville en flammes.webp", title:"Néron — L'Incendie de Rome & les Persécutions", date:"54 à 68 ap. J.-C.", year:0, era:"Empire Romain & Naissance du Christianisme — −27 à 200", desc:"Néron monte sur le trône à 17 ans. Son règne commence bien — il est conseillé par le philosophe Sénèque — puis déraille dans la tyrannie, les meurtres de proches (dont sa propre mère Agrippine) et la mégalomanie. En 64, un incendie ravage les deux tiers de Rome. Il accuse les chrétiens, les fait crucifier et brûler comme torches vivantes. Il est le premier persécuteur institutionnel du christianisme." },
  { id:335, img:"Persécution des chrétiens dans l'arène.webp", title:"Les Persécutions des Chrétiens — Le Sang des Martyrs", date:"64 à 313 ap. J.-C.", year:0, era:"Empire Romain & Naissance du Christianisme — −27 à 200", desc:"Pendant deux siècles et demi, le christianisme est une religion illégale dans l'Empire romain. Les chrétiens refusent de sacrifier aux dieux de Rome et de vénérer l'empereur comme dieu — actes perçus comme trahison politique autant que religieuse. Dix grandes vagues de persécutions se succèdent, de Néron (64 ap. J.-C.) à Dioclétien (303-313 ap. J.-C.). Des milliers de fidèles sont jetés aux fauves dans les arènes, crucifiés, brûlés vifs ou décapités. Pourtant, loin d'éteindre la foi, ces persécutions la propagent : « Le sang des martyrs est semence de chrétiens », écrit Tertullien." },
  { id:336, img:"La chute de Jérusalem sous siège.webp", title:"Titus Détruit le Temple — La Diaspora Juive", date:"70 ap. J.-C.", year:0, era:"Empire Romain & Naissance du Christianisme — −27 à 200", desc:"En l'an 70, le général romain Titus écrase la grande révolte juive et rase Jérusalem. Le Second Temple — reconstruit par Hérode le Grand à partir de –20 av. J.-C. — est incendié et détruit. C'est la deuxième destruction du Temple, la plus traumatisante de l'histoire juive. Plus d'un million de Juifs périssent selon Josèphe. Des centaines de milliers sont déportés ou réduits en esclavage. Commence la grande Diaspora : les Juifs, sans terre ni Temple, deviendront le 'peuple du Livre', dispersé dans tout l'Empire." },
  { id:337, img:"L'expansion du christianisme au Ier siècle.webp", title:"Le Nouveau Testament — La Naissance du Christianisme", date:"30 à 100 ap. J.-C.", year:0, era:"Empire Romain & Naissance du Christianisme — −27 à 200", desc:"Jésus de Nazareth prêche en Galilée et Judée vers 27-30 ap. J.-C., est crucifié sous Ponce Pilate, et ses disciples annoncent sa résurrection. Paul de Tarse (lui-même ancien persécuteur des chrétiens) diffuse cette nouvelle foi dans tout le bassin méditerranéen. Les 27 textes du Nouveau Testament — Évangiles, Actes, Épîtres, Apocalypse — sont rédigés entre ~50 et 100 ap. J.-C. en grec, dans l'Empire romain. En moins de 300 ans, cette religion minoritaire et persécutée devient la religion officielle de l'Empire." },
  { id:338, img:"L'éruption de Pompéi en 79 après J.-C..webp", title:"Pompéi — La Ville Engloutie", date:"79 ap. J.-C.", year:0, era:"Empire Romain & Naissance du Christianisme — −27 à 200", desc:"Le 24 août 79 ap. J.-C., le Vésuve entre en éruption et ensevelit Pompéi sous 6 mètres de cendres en quelques heures. 2 000 personnes périssent. La ville est oubliée pendant 1 700 ans. Redécouverte en 1748, elle révèle un instantané parfait de la vie romaine : fresques, graffitis, pain dans les fours, corps figés dans la lave." },
  { id:339, img:"Construction_du_Colisée_à_Rome.webp", title:"Le Colisée — La Violence comme Spectacle", date:"72 à 80 ap. J.-C.", year:0, era:"Empire Romain & Naissance du Christianisme — −27 à 200", desc:"L'amphithéâtre Flavien — le Colisée — est inauguré par l'empereur Titus en 80 ap. J.-C. avec 100 jours de jeux consécutifs. 50 000 spectateurs, des combats de gladiateurs, des chasses d'animaux exotiques, des exécutions publiques. En 8 ans de construction, 100 000 tonnes de travertin. C'est le plus grand amphithéâtre jamais construit — et le symbole de l'utilisation politique du spectacle de masse." },
  { id:340, img:"Mur d'hadrien.webp", title:"Le Mur d'Hadrien — La Frontière du Monde Romain", date:"122 à 142 ap. J.-C.", year:0, era:"Empire Romain & Naissance du Christianisme — −27 à 200", desc:"En 122 ap. J.-C., l'empereur Hadrien ordonne la construction d'un mur traversant l'île de Bretagne (actuelle Angleterre) d'est en ouest sur 118 km — pour marquer et défendre la frontière nord de l'Empire contre les Pictes d'Écosse. 15 000 légionnaires construisent en 6 ans une muraille de 4 à 6 mètres de haut avec forts, fossés et tours de guet tous les 1 500 mètres. En 142, son successeur Antonin fait bâtir un second mur 160 km plus au nord — mais il est abandonné en 20 ans, et l'Empire revient au mur d'Hadrien." },
  { id:341, img:"LEmpire Trajan.webp", title:"L'Apogée de l'Empire Romain — Sous Trajan", date:"117 ap. J.-C.", year:0, era:"Empire Romain & Naissance du Christianisme — −27 à 200", desc:"Sous l'empereur Trajan (98–117 ap. J.-C.), l'Empire romain atteint sa plus grande extension : 5 millions de km², 70 millions d'habitants, de l'Écosse à la Mésopotamie, du Sahara au Rhin. C'est le moment de la Pax Romana à son zénith : routes pavées, aqueducs, villes prospères, commerce florissant de l'Inde à la Bretagne. Son successeur Hadrien comprend qu'un tel empire ne peut plus s'étendre — il consolide les frontières et commence à les fortifier." },
  { id:342, img:"Vie_quotidienne_dans_une_villa_romaine.webp", title:"La Vie dans une Villa Romaine — Art de Vivre à la Romaine", date:"Ier–IIe siècle ap. J.-C.", year:0, era:"Gaule Romaine & Déclin de l'Empire — 200 à 476", desc:"La villa romaine est bien plus qu'une maison : c'est une institution. Autour de l'atrium (cour centrale avec bassin), se déploient triclinium (salle à manger), tablinum (bureau du pater familias), jardins à colonnades et bains privés. Les sols de mosaïque, les fresques aux murs, les sculptures dans les jardins témoignent d'un raffinement qui ne sera retrouvé en Europe qu'à la Renaissance. En Gaule, ce modèle se diffuse massivement au Ier siècle : les aristocrates gaulois adoptent le mode de vie romain tout en conservant leurs langues et traditions." },
  { id:343, img:"Le_semeur_au_lever_du_soleil.webp", title:"L'Agriculture Romaine en Gaule — La Révolution des Techniques", date:"Ier–IIe siècle ap. J.-C.", year:0, era:"Gaule Romaine & Déclin de l'Empire — 200 à 476", desc:"La conquête romaine apporte en Gaule une véritable révolution agricole. Le moulin à eau remplace le broyage à la main. La charrue à roues améliore le labour. La faucille à encoches (vallus) permet de moissonner mécaniquement — inventée par les Gaulois et adoptée par Rome. Les vignes, l'olivier, les vergers fruitiers se multiplient. Les grandes villae rusticae organisent une agriculture rationalisée qui nourrit les villes. La Gaule devient le grenier à blé de l'Empire." },
  { id:344, img:"moissonneuse gauloise.webp", title:"La Faucille & la Moissonneuse Gauloise", date:"Ier siècle ap. J.-C.", year:0, era:"Gaule Romaine & Déclin de l'Empire — 200 à 476", desc:"Les Gaulois romanisés perfectionnent la vallus — une moissonneuse tirée par un bœuf qui coupe les épis directement dans le champ. Décrite par Pline l'Ancien, cette machine précède la moissonneuse industrielle de 1 800 ans et témoigne du génie gallo-romain : la fusion du savoir-faire gaulois et de l'organisation romaine produit des innovations que l'Europe n'atteindra pas à nouveau avant le XIXe siècle." },
  { id:345, img:"Bains romains sous les voûtes majestueuses.webp", title:"La Gaule Romaine — Villes, Routes & Romanisation", date:"Ier–IIe siècle ap. J.-C.", year:0, era:"Gaule Romaine & Déclin de l'Empire — 200 à 476", desc:"Pendant deux siècles, la Gaule est l'une des provinces les plus riches de l'Empire. De Lugdunum à Lutetia, des dizaines de villes romaines naissent avec leurs forums, amphithéâtres, thermes et aqueducs. La langue gauloise disparaît au profit du latin vulgaire — qui deviendra le français." },
  { id:346, img:"Lutetia au crépuscule du Ier siècle.webp", title:"Lutèce — La Naissance de Paris", date:"Ier–IIe siècle ap. J.-C.", year:0, era:"Gaule Romaine & Déclin de l'Empire — 200 à 476", desc:"Sur l'île de la Cité et la rive gauche de la Seine, les Romains développent Lutèce, chef-lieu des Parisii. Forum, thermes, amphithéâtre, temple — une ville compacte de 10 000 habitants. Les thermes de Cluny, encore debout aujourd'hui au cœur de Paris, datent de cette époque." },
  { id:347, img:"premieres invasion barbare sur l empire romain.webp", title:"La Crise du IIIe Siècle — Les Premières Invasions Barbares", date:"235 à 284 ap. J.-C.", year:0, era:"Gaule Romaine & Déclin de l'Empire — 200 à 476", desc:"En 50 ans, Rome connaît 50 empereurs — dont la plupart meurent assassinés. L'Empire s'effondre en trois tronçons. C'est le début des grandes invasions : vers 260 ap. J.-C., les Francs franchissent le Rhin pour la première fois et ravagent la Gaule du Nord. Les Wisigoths pillent les Balkans. Les Burgondes s'installent sur le Rhin. Rome tient — mais l'Empire n'est plus jamais vraiment stable." },
  { id:348, img:"L'édiction de l'Édit de Milan.webp", title:"L'Édit de Milan — La Victoire du Christianisme", date:"313 ap. J.-C.", year:0, era:"Gaule Romaine & Déclin de l'Empire — 200 à 476", desc:"L'empereur Constantin proclame la liberté de culte dans tout l'Empire. Le christianisme, religion des persécutés depuis trois siècles, devient légal — puis bientôt officielle. En moins d'une génération, les temples gaulois ferment, les basiliques s'élèvent. L'Europe médiévale vient de naître." },
  { id:349, img:"Les deux souverains face à face.webp", title:"Théodose — La Division de l'Empire Romain", date:"395 ap. J.-C.", year:0, era:"Gaule Romaine & Déclin de l'Empire — 200 à 476", desc:"Le 17 janvier 395, l'empereur Théodose Ier meurt à Milan et divise l'Empire entre ses deux fils : Arcadius reçoit l'Orient (Constantinople), Honorius l'Occident (Rome). Cette séparation, pensée comme temporaire, sera définitive. En 380, Théodose avait déjà fait du christianisme la religion officielle de l'Empire — parachevant le travail de Constantin. L'Empire romain d'Occident survivra à peine 80 ans." },
  { id:350, img:"Sainte Geneviève défendant Paris en 451.webp", title:"Sainte Geneviève — La Bergère qui Sauva Paris", date:"451 ap. J.-C.", year:0, era:"Gaule Romaine & Déclin de l'Empire — 200 à 476", desc:"En 451, la nouvelle se répand comme une traînée de poudre : Attila et ses Huns déferlent vers Paris. La population panique et s'apprête à fuir. Une jeune bergère de 27 ans, Geneviève de Nanterre, harangue les habitants et les femmes de la ville : elle leur ordonne de rester, de prier et de ne pas céder à la peur. Sa conviction est absolue — Dieu protégera Paris. Contre toute attente, les Huns dévient leur route et épargnent la ville. Geneviève devient la patronne de Paris, dont elle porte encore aujourd'hui le nom sur la montagne Sainte-Geneviève." },
  { id:351, img:"Atila.webp", title:"Attila & les Huns aux Portes de Paris", date:"451 ap. J.-C.", year:0, era:"Gaule Romaine & Déclin de l'Empire — 200 à 476", desc:"Attila, 'le fléau de Dieu', mène ses cavaliers huns à travers l'Europe. En 451, il menace Paris. Selon la tradition, la prière de la jeune Geneviève — future patronne de Paris — détourne les Huns. Attila est finalement stoppé aux Champs Catalauniques par une coalition romano-barbare. Il meurt en 453, probablement d'une hémorragie nasale lors de sa nuit de noces." },
  { id:352, img:"La chute de Rome, 476 après J.-C..webp", title:"Chute de l'Empire Romain d'Occident", date:"476 ap. J.-C.", year:0, era:"Gaule Romaine & Déclin de l'Empire — 200 à 476", desc:"Le 4 septembre 476, le chef barbare Odoacre destitue Romulus Augustule, dernier empereur romain d'Occident. Ce n'est pas une chute dramatique — Rome se vide depuis des décennies. Mais cette date marque symboliquement la fin de l'Antiquité et le début du Moyen Âge. L'Empire romain d'Orient (Byzance) survivra lui jusqu'en 1453." },
  { id:353, img:"La chute de Rome, 476 après J.-C..webp", title:"Invasions Barbares & Chute de Rome", date:"376 – 476", year:0, era:"Haut Moyen Âge", desc:"Huns, Wisigoths, Vandales déferlent sur l'Empire. En 476, Romulus Augustule est déposé. Fin de l'Antiquité, début du Moyen Âge." },
  { id:354, img:"Atila.webp", title:"Attila & les Huns — Le Fléau de Dieu", date:"434 – 453", year:0, era:"Haut Moyen Âge", desc:"Attila unifie les tribus huns et ravage l'Europe de la Chine aux portes de Rome. En 451, il envahit la Gaule. La coalition romano-wisigothique l'arrête aux Champs Catalauniques (près de Châlons). C'est l'une des batailles les plus décisives de l'histoire de France." },
  { id:355, img:"Le_baptême_de_Clovis_à_Reims.webp", title:"Clovis Ier — Fondateur du Royaume de France", date:"481 – 511", year:0, era:"Mérovingiens", desc:"Il unifie les Francs et se fait baptiser à Reims vers 496. Naissance de l'alliance entre la royauté et l'Église catholique." },
  { id:356, img:"dagobert.webp", title:"Dagobert Ier — Le Dernier Grand Mérovingien", date:"629 – 639", year:0, era:"Mérovingiens", desc:"Dernier roi mérovingien puissant. Il unifie le royaume franc et fait de Saint-Denis la nécropole royale de France." },
  { id:357, img:"rois faineants.webp", title:"Les Rois Fainéants", date:"639 – 751", year:0, era:"Mérovingiens", desc:"Les maires du palais prennent le vrai pouvoir. Les rois mérovingiens ne sont plus que des figurants promenés en charrette lors des fêtes." },
  { id:358, img:"charles martel.webp", title:"Charles Martel — Poitiers", date:"732", year:0, era:"Carolingiens", desc:"Maire du palais, Charles Martel arrête l'avancée arabe en Europe à la bataille de Poitiers. Le surnom « Martel » (le marteau) lui est donné." },
  { id:359, img:"pepin le bref.webp", title:"Pépin le Bref — 1er Roi Carolingien", date:"751 – 768", year:0, era:"Carolingiens", desc:"Il dépose le dernier mérovingien avec l'accord du pape. Son fils sera Charlemagne." },
  { id:360, img:"sacre_charlemagne.webp", title:"Charlemagne — Empereur d'Occident", date:"768 – 814", year:0, era:"Carolingiens", desc:"Couronné Empereur à Rome le 25 décembre 800 par le pape Léon III. Il unifie l'Europe occidentale et crée les premières écoles." },
