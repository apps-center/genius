<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards Historiques — L'Encyclopédie des Explorateurs</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060a14; --gold: #d4a843; --gold-dim: rgba(200,180,120,0.18);
  --text: #e8dfc4; --text-dim: rgba(232,223,196,0.48);
  --card-bg: rgba(8,13,26,0.94); --border: rgba(200,180,120,0.18);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Crimson Pro', Georgia, serif; min-height: 100vh; overflow-x: hidden; user-select: none; }
#stars-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.content { position: relative; z-index: 1; }

/* HEADER */
header { text-align: center; padding: 52px 20px 28px; }
.enc-label { font-size: .72rem; letter-spacing: .38em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 14px; }
h1 { font-family: 'Cinzel', serif; font-weight: 900; font-size: clamp(1.7rem, 4.5vw, 3.2rem); background: linear-gradient(135deg, #f5e6a3, #d4a843 38%, #f0c060 68%, #fff8e0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.1; }
.tagline { margin-top: 10px; font-size: .95rem; color: var(--text-dim); font-style: italic; }
.divider { height: 1px; background: var(--gold-dim); max-width: 300px; margin: 20px auto; }

/* PROGRESS */
.progress-wrap { max-width: 520px; margin: 0 auto 28px; text-align: center; }
.progress-text { font-family: 'Cinzel', serif; font-size: .72rem; letter-spacing: .2em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; }
.progress-bar { height: 2px; background: var(--gold-dim); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--gold); transition: width .4s ease; border-radius: 2px; }

/* FLASHCARD */
.stage { display: flex; justify-content: center; align-items: center; perspective: 1400px; padding: 8px 0 20px; }
.fc-wrap {
  width: 420px; max-width: 88vw; height: 540px;
  position: relative; transform-style: preserve-3d;
  transition: transform .72s cubic-bezier(.4,0,.2,1);
  cursor: pointer;
}

.fc-wrap.flipped { transform: rotateY(180deg); }
.fc-wrap.no-anim { transition: none !important; }

.face {
  position: absolute; inset: 0; border-radius: 14px;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  border: 1px solid var(--border);
  box-shadow: 0 20px 60px rgba(0,0,0,.7), 0 0 0 1px rgba(200,180,120,.06);
  overflow: hidden;
}

/* RECTO */
.face-front { background: var(--card-bg); display: flex; flex-direction: column; }
.face-front img { width: 100%; height: 400px; object-fit: cover; display: block; }

.front-footer { flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px 20px; border-top: 1px solid var(--border); }
.flip-hint { font-size: .7rem; letter-spacing: .2em; text-transform: uppercase; color: var(--text-dim); }
.flip-arrow { color: var(--gold); opacity: .7; font-size: 1rem; }

/* VERSO */
.face-back {
  transform: rotateY(180deg);
  background: linear-gradient(145deg, #0a1220 0%, #111e33 50%, #0d1828 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 44px 36px; border-color: rgba(200,180,120,.38);
}
.face-back::before { content: ''; position: absolute; inset: 0; border-radius: 14px; background: radial-gradient(ellipse at 50% 20%, rgba(212,168,67,.07) 0%, transparent 65%); pointer-events: none; }
.b-era { font-size: .64rem; letter-spacing: .22em; text-transform: uppercase; color: var(--gold); border: 1px solid rgba(212,168,67,.45); padding: 4px 16px; border-radius: 3px; margin-bottom: 28px; opacity: .9; }
.b-date { font-family: 'Cinzel', serif; font-size: 2rem; font-weight: 900; background: linear-gradient(135deg, #f5e6a3, #d4a843); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 16px; line-height: 1.2; }
.b-title { font-family: 'Cinzel', serif; font-size: 1.05rem; font-weight: 700; color: var(--text); line-height: 1.4; margin-bottom: 22px; }
.b-desc { font-size: .95rem; line-height: 1.75; color: rgba(232,223,196,.62); font-style: italic; max-width: 280px; }

/* OVERLAY NOIR */
.overlay { position: absolute; inset: 0; border-radius: 14px; background: #000; z-index: 30; opacity: 0; pointer-events: none; transition: opacity 0.28s ease; }
.overlay.dark { opacity: 1; }

/* IRIS depuis le centre */
@keyframes iris {
  from { clip-path: inset(50% 50% 50% 50% round 8px); }
  to   { clip-path: inset(0% 0% 0% 0% round 14px); }
}
.face-front.iris { animation: iris 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

/* BUTTONS */
.controls { display: flex; justify-content: center; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
.btn { font-family: 'Cinzel', serif; font-size: .72rem; letter-spacing: .18em; text-transform: uppercase; padding: 11px 26px; border-radius: 4px; border: 1px solid var(--border); background: rgba(6,10,20,.9); color: var(--text-dim); cursor: pointer; transition: all .2s; }
.btn:hover { border-color: rgba(200,180,120,.5); color: var(--text); background: rgba(200,180,120,.07); }
.btn-gold { border-color: rgba(212,168,67,.6); color: var(--gold); background: rgba(212,168,67,.07); }
.btn-gold:hover { background: rgba(212,168,67,.16); box-shadow: 0 0 18px rgba(212,168,67,.2); }
.btn-green { border-color: rgba(94,196,138,.5); color: #5ec48a; }
.btn-green:hover { background: rgba(94,196,138,.1); }
.btn-red { border-color: rgba(232,80,80,.5); color: #e84848; }
.btn-red:hover { background: rgba(232,80,80,.1); }
.review-row { display: flex; justify-content: center; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
.review-label { text-align: center; margin-top: 16px; font-size: .65rem; letter-spacing: .18em; text-transform: uppercase; color: var(--text-dim); }

/* COUNTERS */
.known-bar { max-width: 520px; margin: 20px auto 0; display: flex; gap: 20px; justify-content: center; }
.known-stat { font-family: 'Cinzel', serif; font-size: .68rem; letter-spacing: .14em; text-transform: uppercase; color: var(--text-dim); }
.known-stat span { color: var(--text); font-weight: 700; }

/* STRIP */
.strip { display: flex; gap: 8px; overflow-x: auto; padding: 12px 20px; scrollbar-width: none; }
.strip::-webkit-scrollbar { display: none; }
.thumb { width: 52px; height: 38px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border); flex-shrink: 0; opacity: .45; transition: opacity .2s; cursor: pointer; }
.thumb:hover { opacity: .7; }
.thumb.cur { opacity: 1; border-color: var(--gold); }

.back{position:fixed;top:22px;left:24px;z-index:100;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(212,168,67,.5);text-decoration:none;display:flex;align-items:center;gap:8px;transition:color .2s;}
.back:hover{color:#d4a843;}
@media (max-width: 600px) {
  .fc-wrap { height: 460px; }
  .face-front img { height: 330px; }
  .b-date { font-size: 1.5rem; }
}
</style>
</head>
<body>
<canvas id="stars-canvas"></canvas>
<a class="back" href="/flashcards/index.html">← Flashcards</a>
<div class="content">

  <header>
    <div class="enc-label">L'Encyclopédie des Explorateurs</div>
    <h1>Flashcards Historiques</h1>
    <div class="tagline">Voyage à travers le temps — testez vos connaissances</div>
  </header>

  <div style="padding: 0 20px 80px;">

    <div class="progress-wrap">
      <div class="progress-text" id="p-text">Carte 1 / 109</div>
      <div class="progress-bar"><div class="progress-fill" id="p-fill" style="width:0%"></div></div>
    </div>

    <div class="stage">
      <div class="fc-wrap" id="fc" onclick="flipCard()">
        <div class="overlay" id="overlay"></div>
        <div class="face face-front" id="front">
          <img id="fc-img" src="" alt="Illustration historique">
          <div class="front-footer">
            <span class="flip-arrow">↩</span>
            <span class="flip-hint">Cliquez pour révéler · re-cliquez pour passer</span>
          </div>
        </div>
        <div class="face face-back">
          <div class="b-era"   id="fc-era"></div>
          <div class="b-date"  id="fc-date"></div>
          <div class="b-title" id="fc-title"></div>
          <div class="b-desc"  id="fc-desc"></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn"      onclick="prevCard()">← Précédente</button>
      <button class="btn btn-gold" onclick="nextCard()">Suivante →</button>
      <button class="btn"      onclick="shuffleCards()">🔀 Mélanger</button>
    </div>

    <div class="review-label">Après avoir révélé la carte :</div>
    <div class="review-row">
      <button class="btn btn-green" onclick="markKnown()">✓ Je savais</button>
      <button class="btn btn-red"   onclick="markReview()">↩ À revoir</button>
    </div>

    <div class="known-bar">
      <div class="known-stat">Connues : <span id="k-count">0</span></div>
      <div class="known-stat">À revoir : <span id="r-count">0</span></div>
      <div class="known-stat">Restantes : <span id="rem-count">109</span></div>
    </div>

    <div class="divider"></div>
    <div class="strip" id="strip"></div>
  </div>

</div>
