  { id:361, img:"serment de strasbourg.webp", title:"Les Serments de Strasbourg — Naissance du Français", date:"842", year:0, era:"Carolingiens", desc:"Après la mort de Charlemagne, ses trois petits-fils se disputent l'empire. Deux d'entre eux, Louis le Germanique et Charles le Chauve, s'allient contre leur frère Lothaire. En 842, à Strasbourg, ils se font une promesse solennelle d'entraide. Mais voilà quelque chose d'extraordinaire : pour que les soldats de chacun comprennent le serment, chaque prince le prononce dans la langue de l'autre. Charles parle en vieux-allemand, Louis en vieux-français. Ce vieux-français est le plus ancien texte écrit dans la langue qui deviendra le français. Le latin de Jules César vient de se transformer en quelque chose de nouveau !" },
  { id:362, img:"traite de verdun.webp", title:"Le Traité de Verdun — L'Europe Découpée", date:"843", year:0, era:"Carolingiens", desc:"Un an après les Serments de Strasbourg, les trois petits-fils de Charlemagne signent le traité de Verdun en 843. Ils coupent l'empire en trois morceaux. Charles le Chauve reçoit l'Ouest — ce sera la France. Louis le Germanique reçoit l'Est — ce sera l'Allemagne. Lothaire garde le milieu et le titre d'empereur. Ce découpage, fait il y a 1 200 ans, dessine en gros les frontières de l'Europe d'aujourd'hui. La France que tu connais est née d'un coup de crayon sur une carte en 843 !" },
  { id:363, img:"raids_vikings.webp", title:"Les Vikings — Terreur sur la France & Naissance de la Normandie", date:"845 à 911", year:0, era:"Carolingiens", desc:"Depuis les années 820, des drakkars normands remontent la Seine, la Loire et la Gironde. En 845, Ragnar assiège Paris : Charles le Chauve paie 7 000 livres d'argent pour les faire partir — la première rançon de l'histoire de France. En 885, ils reviennent avec 700 navires. Le comte Eudes défend Paris héroïquement pendant un an. En 911, le roi Charles le Simple prend une décision radicale : il cède la Normandie au chef viking Rollon, qui jure fidélité et se fait baptiser." },
  { id:364, img:"collier d epaule.webp", title:"L'Étrier & le Collier d'Épaule", date:"Xe – XIIe siècle", year:0, era:"Carolingiens", desc:"L'étrier (venu d'Asie centrale, diffusé en Europe dès le VIIIe siècle) et le collier d'épaule (généralisé en Europe entre le Xe et le XIIe siècle) transforment radicalement la traction animale et le combat. La productivité agricole bondit ; la chevalerie lourde devient possible." },
  { id:365, img:"mont_saint_michel.webp", title:"Le Mont Saint-Michel", date:"966", year:0, era:"Capétiens & Moyen Âge", desc:"Une abbaye bénédictine fondée sur un îlot rocheux de 80 m de hauteur en Normandie. Construit sur 10 siècles, le Mont Saint-Michel est le monument le plus visité de France après le Louvre." },
  { id:366, img:"hugues capet.webp", title:"Hugues Capet — Fondateur de la Lignée", date:"987", year:0, era:"Capétiens & Moyen Âge", desc:"Élu roi, sa descendance régnera 800 ans. Petit royaume autour de Paris, mais lignée ininterrompue jusqu'en 1848." },
  { id:367, img:"guillaume le conquerant.webp", title:"Guillaume le Conquérant — La France Conquiert l'Angleterre", date:"1066", year:0, era:"Capétiens & Moyen Âge", desc:"En 1066, Guillaume, duc de Normandie (donc descendant de Vikings devenus Français !), traverse la Manche avec son armée et bat le roi d'Angleterre Harold à la bataille d'Hastings. Il devient roi d'Angleterre. Résultat inattendu : pendant des siècles, les rois d'Angleterre parlent français, la noblesse anglaise parle français, et des milliers de mots français entrent dans la langue anglaise. Aujourd'hui encore, la moitié des mots anglais viennent du français apporté par Guillaume !" },
  { id:368, img:"urbain2_croisades.webp", title:"Les Croisades — Dieu le Veut !", date:"1095 à 1291", year:0, era:"Capétiens & Moyen Âge", desc:"En novembre 1095, le pape Urbain II prêche à Clermont-Ferrand devant une foule immense : il appelle les chrétiens à reprendre Jérusalem aux Turcs seldjoukides. La foule répond en masse : « Dieu le veut ! » C'est le signal de la première des huit croisades. En 1099, les croisés prennent Jérusalem et massacrent sa population. En 1291, Saint-Jean-d'Acre, dernier bastion chrétien, tombe. En 200 ans, les croisades ont transformé l'Europe, le Proche-Orient — et les relations entre chrétiens et musulmans pour des siècles." },
  { id:369, img:"templiers.webp", title:"Les Templiers — Moines & Guerriers", date:"1119 – 1312", year:0, era:"Capétiens & Moyen Âge", desc:"Fondé en 1119 à Jérusalem pour protéger les pèlerins, l'Ordre du Temple devient la première banque internationale d'Europe. Richissimes et puissants, les Templiers prêtent aux rois. Leur fortune attise la convoitise de Philippe le Bel." },
  { id:370, img:"alienor.webp", title:"Aliénor d'Aquitaine — Reine de France, puis d'Angleterre", date:"1122 à 1204", year:0, era:"Capétiens & Moyen Âge", desc:"À 15 ans, Aliénor hérite du duché d'Aquitaine — un territoire plus vaste que le royaume de France. Elle épouse Louis VII et devient reine de France. Après 15 ans de mariage sans héritier mâle et une 2e croisade catastrophique, leur union est annulée en 1152. Huit semaines plus tard, Aliénor épouse Henri Plantagenêt, futur roi d'Angleterre. En une saison, la plus riche province de France passe à l'ennemi. Cette décision hantera la France pendant 300 ans — jusqu'à la fin de la Guerre de Cent Ans." },
  { id:371, img:"arc_boutant.webp", title:"L'Arc-Boutant — Architecture Gothique", date:"1140", year:0, era:"Capétiens & Moyen Âge", desc:"L'abbé Suger et les architectes de la cathédrale de Saint-Denis inventent l'arc-boutant. Cette structure reporte le poids des voûtes vers l'extérieur, permettant des murs percés de vitraux et des hauteurs inégalées." },
  { id:372, img:"basilique saint denis gothique.webp", title:"La Basilique Saint-Denis — L'Invention du Gothique", date:"1144", year:0, era:"Capétiens & Moyen Âge", desc:"Un moine très intelligent nommé Suger a une idée géniale : et si on construisait des églises remplies de lumière ? Jusqu'alors, les églises romanes avaient des murs épais et des petites fenêtres — elles étaient sombres. Suger invente une nouvelle façon de construire, le gothique, avec des arcs en ogive et des arcs-boutants qui soutiennent les murs de l'extérieur. Résultat : on peut ouvrir les murs en immenses vitraux colorés. La lumière entre à flots. Suger dit que 'Dieu est lumière'. Ce style gothique va transformer toutes les cathédrales de France pendant 300 ans." },
  { id:373, img:"universités.webp", title:"Naissance des Universités", date:"1150", year:0, era:"Capétiens & Moyen Âge", desc:"Les premières universités européennes naissent à Bologne (1088), Paris (~1150–1170), Oxford (~1167). L'Université de Paris se forme progressivement autour des écoles cathédrales. Attention : la Sorbonne est un collège fondé vers 1257 par Robert de Sorbon — elle n'est pas l'université elle-même, mais en est devenue le symbole." },
  { id:374, img:"notre_dame_1200.webp", title:"Notre-Dame de Paris", date:"1163", year:0, era:"Capétiens & Moyen Âge", desc:"Chef-d'œuvre du gothique, Notre-Dame est construite en 182 ans sur l'Île de la Cité. Ses arcs-boutants, rosaces et 69 m de hauteur en font le symbole de Paris. Incendiée en 2019, elle rouvre en décembre 2024." },
  { id:375, img:"moulins a vent.webp", title:"Le Moulin à Vent en Europe", date:"1180", year:0, era:"Capétiens & Moyen Âge", desc:"Les croisés rapportent le moulin à vent de Perse. En quelques décennies, des milliers de moulins ponctuent le paysage européen, moudant le grain et pompant l'eau des polders hollandais." },
  { id:376, img:"La_bataille_de_Bouvines_en_1214.webp", title:"Philippe Auguste — Bâtisseur du Royaume", date:"1180 – 1223", year:0, era:"Capétiens & Moyen Âge", desc:"Il quadruple le domaine royal (Bouvines, 1214) et fait construire le Louvre et les remparts de Paris." },
  { id:377, img:"Schéma et histoire du compas.webp", title:"La Boussole en Europe", date:"1190", year:0, era:"Capétiens & Moyen Âge", desc:"La boussole magnétique, venue de Chine via les Arabes, arrive en Europe. Elle permet la navigation en mer fermée, même par temps couvert. Sans elle, les Grandes Découvertes sont impossibles." },
  { id:378, img:"Louis IX.webp", title:"Louis IX — Saint Louis", date:"1226 – 1270", year:0, era:"Capétiens & Moyen Âge", desc:"Roi pieux, il rend la justice sous un chêne à Vincennes. Part deux fois en croisade, meurt à Tunis. Canonisé en 1297." },
  { id:379, img:"blanche castille.webp", title:"Blanche de Castille — La Reine qui Gouverna la France", date:"1226 – 1252", year:0, era:"Capétiens & Moyen Âge", desc:"Quand le roi Louis VIII meurt en 1226, son fils et héritier Louis IX n'a que 12 ans. C'est sa mère, Blanche de Castille, qui prend les rênes du royaume — et elle le fait avec une poigne de fer. Pendant des années, elle repousse les nobles qui veulent profiter de la jeunesse du roi pour reprendre du pouvoir, signe des traités, et élève son fils pour en faire un grand roi. Louis IX deviendra Saint Louis, l'un des rois les plus admirés de l'histoire de France. Grande première : pour la première fois, une femme gouverne la France, et elle est étrangère — elle vient d'Espagne !" },
  { id:380, img:"1ers etats generaux.webp", title:"Les États Généraux — Le Roi Demande l'Avis du Peuple", date:"10 avril 1302", year:0, era:"Capétiens & Moyen Âge", desc:"Le roi Philippe le Bel est en dispute avec le pape, qui prétend avoir plus d'autorité que lui. Pour montrer que tout le royaume est derrière lui, Philippe invente quelque chose de nouveau : il convoque à Notre-Dame de Paris des représentants de toute la France — les nobles, les prêtres, et pour la première fois, des représentants des villes (les bourgeois). C'est la naissance des États Généraux. Cette réunion de 1302 est le lointain ancêtre de notre Assemblée Nationale — et 487 ans plus tard, ce sont les États Généraux que Louis XVI convoquera en 1789, déclenchant la Révolution !" },
  { id:381, img:"philippe le bel.webp", title:"Philippe le Bel & la Chute des Templiers", date:"1307 – 1314", year:0, era:"Capétiens & Moyen Âge", desc:"Endetté jusqu'au cou envers les Templiers, Philippe IV fait arrêter tous leurs membres en France le 13 octobre 1307 — un vendredi. Sous la torture, les aveux s'accumulent. Il obtient du pape la dissolution de l'Ordre." },
  { id:382, img:"pape avignon.webp", title:"Les Papes à Avignon — Quand Rome s'Installa en France", date:"1309 – 1377", year:0, era:"Capétiens & Moyen Âge", desc:"Tu sais que le pape habite à Rome — mais pendant 68 ans au XIVe siècle, il habitait en France, à Avignon ! Comment ? Le roi Philippe le Bel était très influent, et le nouveau pape Clément V, qui était français, préféra rester près de chez lui. Il s'installa à Avignon en 1309. Les six papes suivants, tous français, firent pareil. C'était bizarre : le chef de toute la chrétienté vivait dans une ville française ! À Avignon, ils firent construire un immense palais, le Palais des Papes, qu'on peut encore visiter aujourd'hui." },
  { id:383, img:"Jacques_de_Molay_devant_Notre-Dame.webp", title:"Le Bûcher de Jacques de Molay", date:"18 mars 1314", year:0, era:"Capétiens & Moyen Âge", desc:"Le grand maître des Templiers, Jacques de Molay, est brûlé vif à Paris sur l'île de la Cité. Depuis les flammes, il maudit Philippe le Bel et le pape Clément V — tous deux mourront dans l'année. La malédiction des Templiers entre dans la légende." },
  { id:384, img:"La_fin_de_la_lignée_capétienne.webp", title:"Les Rois Maudits — La Fin des Capétiens Directs", date:"1314 à 1328", year:0, era:"Capétiens & Moyen Âge", desc:"Du bûcher, Jacques de Molay maudit Philippe le Bel et le pape Clément V : « Avant un an, je vous cite au tribunal de Dieu. » Le pape mourut en avril 1314, Philippe le Bel en novembre. Puis ses trois fils régnèrent et moururent sans héritier mâle en 14 ans : Louis X (1316), Philippe V (1322), Charles IV (1328). La lignée capétienne directe s'éteignit. La couronne passa à un cousin Valois — et l'Angleterre, qui la revendiquait aussi, déclencha la Guerre de Cent Ans." },
  { id:385, img:"ars nova.webp", title:"Ars Nova — La Polyphonie", date:"1320 – 1370", year:0, era:"Capétiens & Moyen Âge", desc:"Philippe de Vitry théorise l'Ars Nova (vers 1320) : plusieurs voix indépendantes chantent simultanément des mélodies différentes. Cette révolution rythmique et harmonique du XIVe siècle ouvre la voie à toute la musique polyphonique occidentale. À distinguer de l'École de Notre-Dame (XIIe–XIIIe s.) qui en fut le terreau." },
  { id:386, img:"guerre de 100 ans.webp", title:"Guerre de Cent Ans", date:"1337 – 1453", year:0, era:"Capétiens & Moyen Âge", desc:"France contre Angleterre pour la couronne de France. Cent ans de batailles, d'occupations et de misère populaire, du règne de Philippe VI jusqu'à Charles VII. Redressement final grâce à Jeanne d'Arc (1429)." },
  { id:387, img:"crecy.webp", title:"Crécy — Le Désastre de la Chevalerie Française", date:"26 août 1346", year:0, era:"Capétiens & Moyen Âge", desc:"Première grande défaite de la Guerre de Cent Ans. L'armée française, pourtant trois fois supérieure en nombre, est écrasée par les archers gallois d'Édouard III. La chevalerie en armure charge sans ordre et s'effondre sous les flèches." },
  { id:388, img:"peste.webp", title:"La Grande Peste Noire", date:"1347 – 1351", year:0, era:"Capétiens & Moyen Âge", desc:"La peste bubonique tue un tiers de la population européenne — 25 à 50 millions de morts en 4 ans." },
  { id:389, img:"roi prisonnier.webp", title:"Poitiers — Le Roi de France Fait Prisonnier !", date:"19 septembre 1356", year:0, era:"Capétiens & Moyen Âge", desc:"Imaginez qu'on capture le Président de la République à la guerre ! C'est ce qui arrive au roi Jean II de France en 1356 à Poitiers. Les archers anglais écrasent une nouvelle fois la chevalerie française. Pire : le roi lui-même est fait prisonnier et emmené en Angleterre. Pour le récupérer, la France devra payer une rançon astronomique — 3 millions d'écus d'or — et céder un tiers du territoire. C'est l'une des pires humiliations de l'histoire de France. C'est le fils du roi, Charles, 18 ans, qui doit gérer ce chaos." },
  { id:390, img:"charles V.webp", title:"Charles V — Le Sage", date:"1364 – 1380", year:0, era:"Capétiens & Moyen Âge", desc:"Après les désastres de Crécy et Poitiers, Charles V reconstruit la France avec méthode. Il réforme l'armée, réorganise les finances et reprend presque tout le territoire perdu aux Anglais, sans livrer une seule grande bataille." },
  { id:391, img:"charles VI.webp", title:"Charles VI — Le Fol", date:"1380 – 1422", year:0, era:"Capétiens & Moyen Âge", desc:"Roi frappé de folie à partir de 1392 : crises de démence, il croit parfois être fait de verre. La France sombre dans la guerre civile entre Armagnacs et Bourguignons, ouvrant la porte aux Anglais." },
  { id:392, img:"expulsion juifs.webp", title:"L'Expulsion des Juifs de France", date:"1394", year:0, era:"Capétiens & Moyen Âge", desc:"En 1394, le roi Charles VI décide d'expulser tous les Juifs du royaume de France. Ce n'était pas la première fois — ils avaient déjà été chassés plusieurs fois et rappelés. Mais cette fois, c'est présenté comme définitif. Des milliers de familles durent tout quitter — leurs maisons, leurs boutiques, leurs synagogues — et partir vers l'Allemagne, l'Italie ou l'Orient. Cette décision injuste faisait des Juifs les boucs émissaires des malheurs du temps (la guerre, la peste). Ce n'est qu'en 1791, après la Révolution française, que les Juifs de France obtiendraient enfin les mêmes droits que tous les autres citoyens." },
  { id:393, img:"christine de pisan.webp", title:"Christine de Pisan — La Première Grande Écrivaine Française", date:"1405", year:0, era:"Capétiens & Moyen Âge", desc:"Au Moyen Âge, les femmes n'étaient pas censées écrire des livres. Christine de Pisan, venue d'Italie enfant et éduquée à la cour du roi, ne s'en soucia pas. Quand son mari mourut et la laissa seule avec ses enfants, elle se mit à écrire pour gagner sa vie. Poèmes, histoires, traités de politique et même un manuel militaire ! En 1405, elle écrit 'La Cité des Dames' — un livre où elle imagine une ville peuplée des plus grandes femmes de l'histoire pour montrer que les femmes sont aussi capables et courageuses que les hommes. 600 ans avant le féminisme, Christine défendait les mêmes idées !" },
  { id:394, img:"bourguignon armagnac.webp", title:"Bourguignons contre Armagnacs — La France contre elle-même", date:"1407 à 1435", year:0, era:"Capétiens & Moyen Âge", desc:"Pendant la folie de Charles VI, deux factions se disputent le pouvoir : les Bourguignons (menés par Jean sans Peur, duc de Bourgogne) et les Armagnacs (menés par Louis d'Orléans, frère du roi). En 1407, Jean sans Peur fait assassiner Louis d'Orléans dans une rue de Paris. La France bascule dans la guerre civile — pendant qu'Henri V d'Angleterre envahit et remporte Azincourt. Les Bourguignons, alliés aux Anglais, font signer au roi fou le traité de Troyes (1420) : l'héritier de France sera... le roi d'Angleterre." },
  { id:395, img:"Bataille d'Azincourt sous la pluie.webp", title:"Azincourt — La Catastrophe des Fleurs de Lys", date:"25 octobre 1415", year:0, era:"Capétiens & Moyen Âge", desc:"Henri V d'Angleterre écrase une armée française cinq fois plus nombreuse. La noblesse française est décimée — plus de 6 000 morts côté français, une centaine côté anglais. La France, déjà ravagée par la folie de Charles VI, plie le genou." },
  { id:396, img:"charles VII.webp", title:"Charles VII — Le Victorieux", date:"1422 – 1461", year:0, era:"Capétiens & Moyen Âge", desc:"Surnommé « le petit roi de Bourges » par ses ennemis, il semblait perdu. Jeanne d'Arc le fit sacrer à Reims en 1429. Il chassa les Anglais, mit fin à la Guerre de Cent Ans (1453) et réunifie la France." },
  { id:397, img:"jeanne-d-arc.webp", title:"Le Bûcher de Jeanne d'Arc", date:"30 mai 1431", year:0, era:"Capétiens & Moyen Âge", desc:"Capturée par les Bourguignons puis vendue aux Anglais, Jeanne d'Arc est jugée pour hérésie à Rouen. Condamnée par un tribunal ecclésiastique, elle est brûlée vive à 19 ans. Réhabilitée en 1456. Canonisée en 1920." },
  { id:398, img:"Gutenberg.webp", title:"L'Imprimerie de Gutenberg", date:"1450", year:0, era:"Capétiens & Moyen Âge", desc:"Johannes Gutenberg invente les caractères mobiles en plomb à Mayence. La Bible à 42 lignes est imprimée vers 1455. En quelques décennies, l'imprimerie se répand dans toute l'Europe — y compris en France dès 1470. La diffusion du savoir bascule pour toujours." },
  { id:399, img:"castillon la bataille.webp", title:"Castillon — La Fin de la Guerre de Cent Ans", date:"17 juillet 1453", year:0, era:"Capétiens & Moyen Âge", desc:"Après 116 ans de guerre, la France remporte enfin une victoire décisive à Castillon, près de Bordeaux, en 1453. Cette fois, les Anglais ont face à eux une arme terrifiante qu'ils ne connaissaient pas encore bien : les canons. L'artillerie française pulvérise leur armée. Le général anglais John Talbot, vieux guerrier de 70 ans, est tué. La Guyenne — le Sud-Ouest de la France — redevient française. L'Angleterre ne garde plus en France que Calais. Après plus d'un siècle de guerre, d'épidémies et de famine, la France peut enfin souffler." },
  { id:400, img:"louis XI carte.webp", title:"Louis XI — L'Universelle Araignée", date:"1461 – 1483", year:0, era:"Capétiens & Moyen Âge", desc:"Roi diplomate et rusé, il tisse ses intrigues plutôt que de livrer bataille. Il soumet la Bourgogne, annexe la Provence et la Franche-Comté, achève l'unification territoriale de la France. Ses ennemis l'appellent « l'Araignée »." },
  { id:401, img:"relais de poste.webp", title:"Les Relais de Poste — L'Internet du Moyen Âge", date:"1476", year:0, era:"Capétiens & Moyen Âge", desc:"Sous Louis XI, une idée simple révolutionne les communications : on installe sur les grandes routes des 'relais' où des messagers royaux peuvent changer de cheval. Au lieu d'épuiser un seul cheval pour un long voyage, le message est transmis de relais en relais, comme un bâton de course. Une lettre peut traverser la France en quelques jours au lieu de plusieurs semaines. C'est le premier réseau de communication rapide de l'histoire — l'ancêtre de nos emails ! Et Louis XI, ce roi rusé qu'on surnomme 'l'Universelle Araignée', voulait surtout pouvoir envoyer ses espions et ses ordres plus vite que ses ennemis." },
  { id:402, img:"provence rejoint france.webp", title:"La Provence Rejoint la France", date:"1481", year:0, era:"Capétiens & Moyen Âge", desc:"En 1481, le comte de Provence meurt sans héritier direct et lègue sa région au roi de France Louis XI. La Provence — avec ses oliviers, sa mer bleue, son soleil et ses villes comme Marseille et Aix — devient française. C'est une grande acquisition : la Provence est riche, cultivée, et ses ports ouvrent la France sur la Méditerranée. La France grandit à nouveau. Peu à peu, comme des pièces de puzzle, les grandes régions s'assemblent pour former le pays que nous connaissons." },
  { id:403, img:"picardie.webp", title:"La Bourgogne & la Picardie — La France Complète son Puzzle", date:"1482 – 1493", year:0, era:"Capétiens & Moyen Âge", desc:"Charles le Téméraire, duc de Bourgogne et homme le plus puissant d'Europe après le roi, meurt en 1477 dans une bataille en Lorraine. Son rêve de créer un grand empire entre France et Allemagne s'effondre. Louis XI récupère rapidement la Bourgogne et la Picardie — deux régions immenses et riches. C'est un coup de maître : le rival le plus dangereux de la France a disparu, et ses terres tombent dans l'escarcelle du royaume. La France ressemble désormais beaucoup à ce qu'elle sera pendant des siècles." },
  { id:404, img:"francois Ier.webp", title:"François Ier — Roi de la Renaissance", date:"1515 – 1547", year:0, era:"Renaissance & Réforme", desc:"Grand mécène, il attire Léonard de Vinci. Impose le français comme langue officielle (Villers-Cotterêts, 1539)." },
  { id:405, img:"rabelais.webp", title:"Rabelais — Gargantua & Pantagruel", date:"~1532", year:0, era:"Renaissance & Réforme", desc:"François Rabelais publie Pantagruel (1532) puis Gargantua (1534) — mêlant érudition humaniste, satire et humour. Il incarne l'idéal humaniste de la Renaissance française : curiosité universelle et liberté d'esprit." },
  { id:406, img:"henri II.webp", title:"Henri II — Mort dans un Tournoi", date:"1547 – 1559", year:0, era:"Renaissance & Réforme", desc:"Fils de François Ier, Henri II poursuit la Renaissance mais est tué accidentellement lors d'un tournoi en 1559 : la lance de Gabriel de Montgomery lui transperce la visière et lui crève l'œil. Il agonise dix jours. Sa mort plonge la France dans la crise." },
  { id:407, img:"francois II.webp", title:"François II — Le Roi Enfant", date:"1559 – 1560", year:0, era:"Renaissance & Réforme", desc:"Fils aîné d'Henri II, il monte sur le trône à 15 ans et meurt à 16 ans d'une otite foudroyante. Mari de Marie Stuart, reine d'Écosse. Son règne de 17 mois est dominé par les Guise et préfigure les guerres de Religion." },
  { id:408, img:"guerres religion.webp", title:"Les Guerres de Religion", date:"1562 – 1598", year:0, era:"Renaissance & Réforme", desc:"Huit guerres civiles déchirent la France entre catholiques et protestants (huguenots). Massacres, sièges, assassinats de rois. Un tiers de siècle de chaos qui ruine le pays jusqu'à l'Édit de Nantes d'Henri IV (1598)." },
  { id:409, img:"saint barthelemy.webp", title:"La Saint-Barthélemy", date:"24 août 1572", year:0, era:"Renaissance & Réforme", desc:"Sur ordre de Catherine de Médicis, les cloches de Saint-Germain-l'Auxerrois sonnent à Paris dans la nuit du 23 au 24 août. C'est le signal du massacre des chefs protestants réunis pour un mariage royal. En trois jours, entre 3 000 et 10 000 protestants sont tués dans toute la France." },
  { id:410, img:"henri 4.webp", title:"Henri IV — Le Vert-Galant", date:"1589 – 1610", year:0, era:"Monarchie Absolue", desc:"Premier Bourbon. L'Édit de Nantes (1598) met fin aux guerres de Religion. Assassiné par Ravaillac en 1610." },
  { id:411, img:"marie de medicis.webp", title:"Marie de Médicis — La Régente", date:"1610 – 1617", year:0, era:"Monarchie Absolue", desc:"Épouse d'Henri IV, Marie de Médicis assure la régence à la mort de son mari en 1610, pour le jeune Louis XIII. Sa régence effective court jusqu'en 1614 (majorité du roi), son influence politique jusqu'en 1617. Florentine ambitieuse, elle commande à Rubens le cycle monumental du Luxembourg et s'appuie sur Concini — jusqu'à sa rupture définitive avec son fils." },
  { id:412, img:"richelieu louis xiii.webp", title:"Louis XIII & le Cardinal de Richelieu", date:"1610 – 1643", year:0, era:"Monarchie Absolue", desc:"Fils d'Henri IV, Louis XIII règne avec l'ombre de Richelieu. Le Cardinal-Ministre centralise le pouvoir royal, écrase les Protestants à La Rochelle (1628) et fonde l'Académie française (1635). Le vrai maître de la France." },
  { id:413, img:"le cid.webp", title:"Corneille — Le Cid", date:"1637", year:0, era:"Monarchie Absolue", desc:"Pierre Corneille révolutionne le théâtre français avec Le Cid (1637). Il invente le héros déchiré entre devoir et passion — le « dilemme cornélien » structurera la littérature pour des siècles." },
  { id:414, img:"pascal.webp", title:"Pascal — Génie Universel", date:"~1640 – 1670", year:0, era:"Monarchie Absolue", desc:"Blaise Pascal est mathématicien (probabilités, triangle de Pascal), physicien (pression atmosphérique, expérience du Puy-de-Dôme) et philosophe. La Pascaline, première calculatrice mécanique, date de 1642. Ses Pensées, inachevées, paraissent à titre posthume en 1670. Emporté à 39 ans, il reste l'un des plus grands esprits de l'histoire française." },
  { id:415, img:"mazarin.webp", title:"Mazarin — La Régence & la Fronde", date:"1643 – 1661", year:0, era:"Monarchie Absolue", desc:"Successeur de Richelieu, Mazarin gouverne en régent pour le jeune Louis XIV. Il surmonte la Fronde (1648-1653), révolte des nobles et du Parlement. Il façonne le futur Roi-Soleil et signe la Paix des Pyrénées (1659) qui fait de la France la première puissance européenne." },
  { id:416, img:"louis XIV.webp", title:"Louis XIV — Le Roi-Soleil", date:"1643 – 1715", year:0, era:"Monarchie Absolue", desc:"72 ans de règne. Versailles, absolutisme royal, révocation de l'Édit de Nantes (1685). Apogée et épuisement de la France." },
  { id:417, img:"versailles.webp", title:"Le Château de Versailles", date:"1661 – 1710", year:0, era:"Monarchie Absolue", desc:"Louis XIV transforme un pavillon de chasse en le plus grand palais du monde sur cinquante ans de travaux (1661–1710) : 700 pièces, 2 000 hectares de jardins, 20 000 personnes à la cour. Versailles devient le modèle de toutes les cours royales européennes — et la prison dorée où Louis XIV enferme sa noblesse." },
  { id:418, img:"colbert.webp", title:"Colbert — L'Architecte de la France Moderne", date:"1661 – 1683", year:0, era:"Monarchie Absolue", desc:"Jean-Baptiste Colbert, contrôleur général des finances de Louis XIV, invente le mercantilisme d'État. Il crée la marine royale, les manufactures royales (tapisseries de Gobelins, cristal de Saint-Gobain), les grandes routes et le Code de commerce. La France industrielle naît avec lui." },
  { id:419, img:"moliere.webp", title:"Molière — Le Théâtre Français", date:"1664 – 1673", year:0, era:"Monarchie Absolue", desc:"Jean-Baptiste Poquelin, dit Molière, révolutionne la comédie française avec Tartuffe, Le Misanthrope, L'Avare. Il dénonce les hypocrisies de son époque avec une liberté audacieuse." },
  { id:420, img:"racine andromaque.webp", title:"Racine — Andromaque & Phèdre", date:"1667", year:0, era:"Monarchie Absolue", desc:"Jean Racine pousse la tragédie à son sommet avec Andromaque (1667) et Phèdre (1677). Sa langue d'une pureté absolue fait de lui le plus grand tragédien français." },
  { id:421, img:"la fontaine.webp", title:"La Fontaine — Les Fables", date:"1668", year:0, era:"Monarchie Absolue", desc:"Jean de La Fontaine publie ses Fables en 12 livres (1668-1694). Ces courts poèmes animaliers cachent une critique mordante de la société. Appris par cœur par des générations d'écoliers français depuis 350 ans." },
  { id:422, img:"mme de cleves.webp", title:"Mme de Lafayette — La Princesse de Clèves", date:"1678", year:0, era:"Monarchie Absolue", desc:"Marie-Madeleine de Lafayette publie anonymement La Princesse de Clèves (1678) — le premier roman psychologique moderne. Une femme mariée résiste à sa passion par devoir. Fondateur du roman d'analyse." },
  { id:423, img:"corsaires.webp", title:"Les Corsaires — La Guerre de Course", date:"~1550 – 1815", year:0, era:"Monarchie Absolue", desc:"Armés par le roi, les corsaires français pillent les navires ennemis en toute légalité. Jean Bart, Duguay-Trouin, Robert Surcouf — ces héros de Dunkerque et Saint-Malo terrorisent les marines anglaise et hollandaise sous Louis XIV et Napoléon." },
  { id:424, img:"traite negriere.webp", title:"Le Commerce Triangulaire", date:"1640 – 1848", year:0, era:"Monarchie Absolue", desc:"La France participe activement à la traite négrière atlantique. Nantes, Bordeaux et La Rochelle envoient des navires en Afrique, échangent des marchandises contre des esclaves, les déportent aux Antilles. Plus d'un million d'Africains sont ainsi déportés sous pavillon français." },
  { id:425, img:"peste marseille.webp", title:"La Grande Peste de Marseille", date:"1720 – 1722", year:0, era:"Monarchie Absolue", desc:"Le navire Grand-Saint-Antoine débarque la peste à Marseille. En deux ans, la ville perd la moitié de sa population — 50 000 morts sur 90 000 habitants. La Provence entière est frappée. C'est la dernière grande épidémie de peste en France." },
  { id:426, img:"louis XV.webp", title:"Louis XV — Le Bien-Aimé", date:"1715 – 1774", year:0, era:"Monarchie Absolue", desc:"Arrière-petit-fils de Louis XIV, il hérite d'un royaume épuisé. D'abord adoré (« le Bien-Aimé »), son long règne voit la montée des philosophes des Lumières, la perte du Canada et des Indes, et la France glisser vers l'abîme financier." },
  { id:427, img:"voltaire.webp", title:"Voltaire — Les Lumières & la Tolérance", date:"1734", year:0, era:"Monarchie Absolue", desc:"François-Marie Arouet, dit Voltaire, symbole des Lumières : défenseur de la tolérance, ennemi du fanatisme. Candide et ses pamphlets incarnèrent la puissance de la plume contre l'arbitraire et l'injustice." },
  { id:428, img:"diderot dalembert.webp", title:"L'Encyclopédie de Diderot & d'Alembert", date:"1751 – 1772", year:0, era:"Monarchie Absolue", desc:"Diderot et d'Alembert coordonnent 150 auteurs — Voltaire, Rousseau, Montesquieu — pour produire 28 volumes recensant tout le savoir humain. L'Encyclopédie est la bombe intellectuelle des Lumières : elle conteste l'Église, glorifie la raison et prépare les esprits à la Révolution." },
  { id:429, img:"guerre de 7 ans.webp", title:"La Guerre de Sept Ans — La Première Guerre Mondiale", date:"1756 – 1763", year:0, era:"Monarchie Absolue", desc:"Souvent appelée la première guerre mondiale, elle oppose la France à l'Angleterre sur 5 continents. La France perd le Canada, la Louisiane et ses comptoirs en Inde. L'Angleterre devient la première puissance mondiale." },
  { id:430, img:"rousseau.webp", title:"Rousseau — Le Contrat Social", date:"1762", year:0, era:"Monarchie Absolue", desc:"Jean-Jacques Rousseau révolutionne la pensée politique avec Le Contrat Social (1762) : « la souveraineté appartient au peuple ». Ses idées nourriront directement la Révolution française et l'Émile révolutionne la pédagogie." },
  { id:431, img:"louis XVI.webp", title:"Louis XVI — La Fin de la Monarchie", date:"1774 – 1792", year:0, era:"Monarchie Absolue", desc:"Guillotiné le 21 janvier 1793. La Révolution éclate en 1789 : Bastille, Déclaration des droits de l'Homme." },
  { id:432, img:"La_prise_de_la_Bastille_en_feu.webp", title:"Prise de la Bastille", date:"14 juillet 1789", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Le peuple de Paris prend d'assaut la forteresse-prison symbole de l'absolutisme. Date fondatrice de la République." },
  { id:433, img:"Exécution_à_la_guillotine_pendant_la_Révolution.webp", title:"La Terreur — Robespierre", date:"1793 – 1794", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Le Comité de Salut Public envoie des milliers à la guillotine. 17 000 exécutions officielles. La Terreur finira par se dévorer elle-même." },
  { id:434, img:"Napoléon_se_couronnant_à_Notre-Dame.webp", title:"Napoléon Ier — Empereur des Français", date:"1804 – 1815", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Sacré en 1804 à Notre-Dame. Code civil, lycées, Légion d'honneur. Il domine l'Europe avant Waterloo (1815)." },
  { id:435, img:"revolution_industrielle.webp", title:"La Révolution Industrielle Française", date:"1815 – 1870", year:0, era:"Révolution, Empires & XIXe siècle", desc:"La France suit l'Angleterre avec une génération de retard. Chemins de fer, machines à vapeur, mines de charbon, sidérurgie. Lille, Saint-Étienne, Le Creusot deviennent des villes ouvrières. Le prolétariat naît — et avec lui les premières luttes sociales." },
  { id:436, img:"victor hugo.webp", title:"Victor Hugo — Les Misérables & Notre-Dame", date:"1830 – 1885", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Victor Hugo est le monument de la littérature française du XIXe siècle : poète, romancier, dramaturge et homme politique. Les Misérables (1862) est l'un des romans les plus lus du monde." },
  { id:437, img:"epoque coloniale.webp", title:"L'Empire Colonial Français", date:"1830 – 1962", year:0, era:"Révolution, Empires & XIXe siècle", desc:"La France bâtit le deuxième empire colonial du monde : Algérie (1830), Indochine, Afrique de l'Ouest, Madagascar, Polynésie. À son apogée en 1938, l'empire couvre 12 millions de km² et 110 millions d'habitants. Sa décolonisation, souvent violente, marquera profondément la France." },
  { id:438, img:"Napoléon_III.webp", title:"Napoléon III — Le Second Empire", date:"1852 – 1870", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Neveu de Napoléon Ier, Louis-Napoléon Bonaparte est élu président puis se fait couronner Empereur par plébiscite. Son règne autoritaire puis libéral modernise la France : industrialisation accélérée, réseaux ferrés, banques, libre-échange. Il finit captif à Sedan en 1870." },
  { id:439, img:"haussman.webp", title:"Haussmann — La Naissance de Paris Moderne", date:"1853 – 1870", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Mandaté par Napoléon III, le baron Haussmann détruit 20 000 immeubles et trace 137 km de grands boulevards. Il dote Paris d'égouts, de gaz, de parcs et de l'eau courante. La capitale médiévale disparaît — Paris moderne naît." },
  { id:440, img:"3eme republique.webp", title:"3ème République", date:"1870 – 1940", year:0, era:"Révolution, Empires & XIXe siècle", desc:"70 ans de République. Jules Ferry instaure l'école laïque et gratuite (1882). Tour Eiffel (1889). Affaire Dreyfus. Deux guerres mondiales." },
  { id:441, img:"belle epoque.webp", title:"La Belle Époque", date:"1871 – 1914", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Entre la défaite de 1870 et la Grande Guerre, la France connaît une période de paix, de prospérité et d'innovations folles : électricité, automobile, cinéma, aviation. Paris est la capitale mondiale de la culture, de la mode et des arts." },
  { id:442, img:"zola.webp", title:"Zola — Le Naturalisme", date:"1871 – 1902", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Émile Zola crée la série des Rougon-Macquart — 20 romans sur une famille sous le Second Empire. Germinal (1885) sur les mineurs reste l'un des grands romans sociaux de la littérature mondiale. En 1898, « J'accuse ! » le propulse au cœur de l'Affaire Dreyfus. Il meurt en 1902 dans des circonstances suspectes." },
  { id:443, img:"impressionnisme.webp", title:"Monet & l'Impressionnisme", date:"1874", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Claude Monet expose « Impression, Soleil Levant » — un critique la raille en disant « ce ne sont que des impressions ». Le mot reste et donne son nom au mouvement qui révolutionne la peinture." },
  { id:444, img:"tour effeil.webp", title:"La Tour Eiffel", date:"1889", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Gustave Eiffel construit cette tour de 330 m pour l'Exposition universelle de 1889. D'abord raillée comme une « vergue de fer », elle devait être démolie après 20 ans. Sauvée par sa radio-antenne, elle reçoit 7 millions de visiteurs par an." },
  { id:445, img:"dreyfus.webp", title:"L'Affaire Dreyfus — La France Déchirée", date:"1894 – 1906", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Le capitaine Alfred Dreyfus, officier juif, est accusé à tort de trahison et déporté à l'île du Diable. L'Affaire divise la France en deux : dreyfusards contre antidreyfusards. Elle révèle l'antisémitisme d'État et accélère la séparation de l'Église et de l'État (1905)." },
  { id:446, img:"premiere guerre.webp", title:"Première Guerre Mondiale", date:"1914 – 1918", year:0, era:"Révolution, Empires & XIXe siècle", desc:"18 millions de morts dont 1,4 million de soldats français. La guerre des tranchées traumatise toute une génération." },
  { id:447, img:"annees folles.webp", title:"Les Années Folles", date:"1920 – 1929", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Après l'horreur de la Grande Guerre, la France explose de joie. Paris devient la capitale mondiale du jazz, de la mode, de la littérature d'avant-garde. Joséphine Baker, Coco Chanel, Hemingway, Fitzgerald — tout le monde veut vivre à Paris." },
  { id:448, img:"crise 1929.webp", title:"La Crise de 1929 — Le Grand Krach", date:"1929 – 1939", year:0, era:"Révolution, Empires & XIXe siècle", desc:"Le jeudi noir d'octobre 1929 s'étend de Wall Street à l'Europe. En France, la crise frappe plus lentement mais plus longuement. Chômage, instabilité politique, montée des extrêmes : le Front Populaire (1936) et ses acquis sociaux — congés payés, semaine de 40h — naissent directement de cette crise." },
  { id:449, img:"occupation.webp", title:"Deuxième Guerre Mondiale", date:"1939 – 1945", year:0, era:"Révolution, Empires & XIXe siècle", desc:"La France est occupée de 1940 à 1944. Résistance, débarquement du 6 juin 1944, Libération. La Shoah fait 6 millions de victimes juives." },
  { id:450, img:"debarquement.webp", title:"Le Débarquement de Normandie — Jour J", date:"6 juin 1944", year:0, era:"Révolution, Empires & XIXe siècle", desc:"La plus grande opération militaire amphibie de l'histoire. 156 000 soldats alliés débarquent sur 80 km de côtes normandes en une seule journée. Omaha, Utah, Gold, Juno, Sword. Le verrou atlantique de Hitler saute — la libération de la France commence." },
  { id:451, img:"guerre d indochine.webp", title:"La Guerre d'Indochine", date:"1946 – 1954", year:0, era:"France Contemporaine", desc:"La France tente de reprendre le contrôle de son empire colonial en Asie du Sud-Est face au Viêt-minh de Hô Chi Minh. La défaite de Diên Biên Phû (1954) met fin à la présence française en Indochine et annonce la fin de l'ère coloniale." },
  { id:452, img:"guerre d algerie.webp", title:"La Guerre d'Algérie", date:"1954 – 1962", year:0, era:"France Contemporaine", desc:"Huit ans de guerre entre la France et le FLN pour l'indépendance algérienne. 400 000 morts algériens, 30 000 soldats français. La torture, les massacres du 17 octobre 1961 à Paris, et l'exode des pieds-noirs laissent des plaies encore ouvertes." },
  { id:453, img:"de gaulle.webp", title:"5ème République — De Gaulle & Nos Jours", date:"1958 – aujourd'hui", year:0, era:"France Contemporaine", desc:"La Constitution de 1958 instaure un régime semi-présidentiel fort. Mai 1968. Construction européenne. La France reste une grande puissance mondiale." },
  { id:454, img:"mai 68.webp", title:"Mai 68 — La France Tremble", date:"Mai 1968", year:0, era:"France Contemporaine", desc:"En quelques jours, une révolte étudiante à la Sorbonne devient une crise nationale. 10 millions de grévistes paralysent le pays. De Gaulle disparaît secrètement. La France est à deux doigts de la révolution — puis recule. Rien ne sera plus jamais tout à fait pareil." },
  { id:455, img:"mur de berlin.webp", title:"Le Mur de Berlin — La Guerre Froide en Béton", date:"1961 – 1989", year:0, era:"France Contemporaine", desc:"L'URSS fait ériger le mur de Berlin en une nuit, le 13 août 1961. La France, puissance occupante de Berlin-Ouest, est en première ligne de la Guerre Froide. La chute du Mur le 9 novembre 1989 ouvre la voie à la réunification allemande et transforme l'Europe." },
  { id:456, img:"aborigene.webp", title:"Les Aborigènes d'Australie — La Plus Ancienne Culture", date:"–65 000 ans", year:0, era:"Origines de l'Humanité", desc:"Des groupes humains traversent la mer depuis l'Asie du Sud-Est et peuplent l'Australie. C'est la première navigation maritime connue et la culture humaine continue la plus ancienne au monde." },
  { id:457, img:"sortie_afrique.webp", title:"Homo Sapiens Colonise le Monde", date:"–40 000 ans", year:0, era:"Origines de l'Humanité", desc:"Notre espèce, venue d'Afrique il y a ~70 000 ans, peuple l'Eurasie, l'Australie, puis les Amériques (~15 000 ans). Partout elle développe art, rites et langages." },
  { id:458, img:"peuplement_amerique_traversée_béring.webp", title:"Les Inuits — Maîtres de l'Arctique", date:"~2 500 av. J.-C. – 1 100 ap. J.-C.", year:0, era:"Origines de l'Humanité", desc:"Les peuples paléo-inuits (culture de Dorset) colonisent l'Arctique dès ~2 500 av. J.-C. La culture thuléenne — ancêtre direct des Inuit actuels — émerge vers 1 100 ap. J.-C. en Alaska et atteint le Groenland vers 1 200." },
  { id:459, img:"Ville antique de Sumer en soirée.webp", title:"Sumer — Les Premières Villes", date:"–3 500 av. J.-C.", year:0, era:"Premières Civilisations (–3500 à –500 av. J.-C.)", desc:"En Mésopotamie (Irak actuel), entre le Tigre et l'Euphrate, naissent les premières grandes villes : Uruk, Ur, Lagash. La civilisation commence ici." },
  { id:460, img:"Atelier_de_charpentier_ancien.webp", title:"Invention de la Roue (Mésopotamie)", date:"–3 500 av. J.-C.", year:0, era:"Premières Civilisations (–3500 à –500 av. J.-C.)", desc:"En Mésopotamie, la roue apparaît d'abord comme tour de potier, puis comme roue de transport. Elle révolutionne le commerce et l'agriculture sur tous les continents." },
  { id:461, img:"Main_d'un_scribe_sur_tablette_d'argile.webp", title:"Invention de l'Écriture Cunéiforme", date:"–3 200 av. J.-C.", year:0, era:"Premières Civilisations (–3500 à –500 av. J.-C.)", desc:"Les Sumériens inventent l'écriture pour gérer leurs échanges commerciaux. C'est la première écriture connue de l'humanité." },
  { id:462, img:"Pharaon Ménès et l'unification de l'Égypte.webp", title:"Égypte Ancienne — Naissance", date:"–3 100 av. J.-C.", year:0, era:"Premières Civilisations (–3500 à –500 av. J.-C.)", desc:"Le roi Narmer unifie la Haute et la Basse Égypte. Commence alors une civilisation de 3 000 ans ininterrompus — la plus durable de l'histoire." },
  { id:463, img:"mohenjo daro.webp", title:"Civilisation de l'Indus — Mohenjo-Daro", date:"–3 000 av. J.-C.", year:0, era:"Premières Civilisations (–3500 à –500 av. J.-C.)", desc:"Dans la vallée de l'Indus (Pakistan actuel), une civilisation sophistiquée développe des villes planifiées avec égouts et bains publics — 4 000 ans avant Paris." },
  { id:464, img:"Homme_préhistorique_jouant_une_flûte_osseuse.webp", title:"Premières Musiques — Flûtes & Harpes", date:"~–3 000 av. J.-C.", year:0, era:"Premières Civilisations (–3500 à –500 av. J.-C.)", desc:"Les plus anciennes flûtes connues datent de –40 000 ans (Allemagne). Les premières partitions écrites viennent de Mésopotamie vers –2 000 av. J.-C. La musique est aussi ancienne que l'humanité." },
  { id:465, img:"La construction de la pyramide.webp", title:"Art Égyptien — Les Pyramides comme Œuvres", date:"~–2 500 av. J.-C.", year:0, era:"Premières Civilisations (–3500 à –500 av. J.-C.)", desc:"L'art égyptien développe un style reconnaissable immédiatement : hiérarchie des tailles, vue de profil, couleurs symboliques. Il restera stable pendant 3 000 ans — la plus longue tradition artistique de l'histoire." },
  { id:466, img:"gilgamesh.webp", title:"Épopée de Gilgamesh", date:"~–2 100 av. J.-C.", year:0, era:"Premières Civilisations (–3500 à –500 av. J.-C.)", desc:"Premier texte littéraire connu de l'humanité — un roi sumérien cherche l'immortalité et traverse un déluge. Écrit sur des tablettes d'argile 1 500 ans avant la Bible." },
  { id:467, img:"indouisme.webp", title:"Hindouisme — Les Védas", date:"–1 500 av. J.-C.", year:0, era:"Premières Civilisations (–3500 à –500 av. J.-C.)", desc:"Les textes védiques fondent l'hindouisme, la plus ancienne religion encore pratiquée. Naissance du concept de karma, de dharma et du cycle des réincarnations." },
  { id:468, img:"Scène de commerce phénicien au port.webp", title:"Phéniciens — Inventeurs de l'Alphabet", date:"–1 200 av. J.-C.", year:0, era:"Premières Civilisations (–3500 à –500 av. J.-C.)", desc:"Les Phéniciens du Liban actuel développent le premier alphabet de 22 lettres — ancêtre direct des alphabets grec, latin, arabe, hébreu et de presque tous les alphabets modernes." },
  { id:469, img:"Les jeux olympiques antiques à Olympie.webp", title:"Grèce archaïque & classique — Philosophie, Olympiques, Démocratie", date:"–800 av. J.-C.", year:0, era:"Premières Civilisations (–3500 à –500 av. J.-C.)", desc:"Les cités-États grecques inventent la philosophie, le théâtre et les Jeux Olympiques. La démocratie athénienne naît des réformes de Clisthène en 508/507 av. J.-C. Socle intellectuel de toute la civilisation occidentale." },
  { id:470, img:"L'odyssée d'Ulysse et les créatures mythologiques.webp", title:"Homère — Iliade & Odyssée", date:"~–800 av. J.-C.", year:0, era:"Premières Civilisations (–3500 à –500 av. J.-C.)", desc:"Ces deux épopées fondatrices de la littérature occidentale racontent la guerre de Troie et le voyage d'Ulysse. Elles ont influencé 2 800 ans de culture." },
  { id:471, img:"Cyrus libère les captifs juifs.webp", title:"Perse — Cyrus le Grand", date:"–550 av. J.-C.", year:0, era:"Premières Civilisations (–3500 à –500 av. J.-C.)", desc:"Cyrus le Grand conquiert la Médie, la Lydie et Babylone. Il crée le premier grand empire tolérant : liberté de culte, retour des peuples déportés (dont les Juifs)." },
  { id:472, img:"Lao-Tzu.webp", title:"Taoïsme — Lao-Tseu", date:"~–600 av. J.-C.", year:0, era:"Naissance des Grandes Religions (–600 à –400 av. J.-C.)", desc:"Lao-Tseu rédige le Tao Te Ching : 81 courts chapitres sur la Voie, l'harmonie avec la nature et le « non-agir ». Philosophie qui influencera toute l'Asie." },
  { id:473, img:"boudha.webp", title:"Siddhartha Gautama — Le Bouddha", date:"~–563 av. J.-C.", year:0, era:"Naissance des Grandes Religions (–600 à –400 av. J.-C.)", desc:"Prince indien qui quitte son palais à 29 ans, choqué par la souffrance. Après 6 ans de méditation, il atteint l'Éveil sous l'arbre Bodhi. Le bouddhisme naît." },
  { id:474, img:"confucius.webp", title:"Confucius — La Philosophie Chinoise", date:"~–551 av. J.-C.", year:0, era:"Naissance des Grandes Religions (–600 à –400 av. J.-C.)", desc:"Confucius enseigne le respect, la famille, l'harmonie et le gouvernement juste. Sa philosophie influencera la Chine pendant 2 500 ans." },
  { id:475, img:"La fondation de Carthage par Didon.webp", title:"Carthage — La Rivale de Rome", date:"~814 av. J.-C.", year:0, era:"Antiquité Classique (–500 à 500 ap. J.-C.)", desc:"Fondée par les Phéniciens, Carthage domine la Méditerranée occidentale. Hannibal traverse les Alpes avec 37 éléphants. Rome finira par la raser en 146 av. J.-C." },
  { id:476, img:"Alexandre le grand Le général au coucher du soleil.webp", title:"Alexandre le Grand", date:"–356 – –323 av. J.-C.", year:0, era:"Antiquité Classique (–500 à 500 ap. J.-C.)", desc:"En 13 ans, il conquiert la Perse, l'Égypte, l'Afghanistan et l'Inde. Il meurt à 32 ans après avoir créé le plus grand empire qu'un seul homme ait jamais dirigé." },
  { id:477, img:"eratosthene.webp", title:"Ératosthène — Circumférence de la Terre", date:"–240 av. J.-C.", year:0, era:"Antiquité Classique (–500 à 500 ap. J.-C.)", desc:"Depuis Alexandrie, Ératosthène calcule la circonférence de la Terre avec deux bâtons et des ombres. Son résultat est à 1,7 % de la valeur exacte." },
  { id:478, img:"thales.webp", title:"Thalès — Géométrie & Astronomie", date:"~–570 av. J.-C.", year:0, era:"Antiquité Classique (–500 à 500 ap. J.-C.)", desc:"Thalès de Milet est le premier philosophe grec connu à chercher des explications naturelles (et non divines) aux phénomènes. Il mesure la hauteur des pyramides grâce aux ombres." },
  { id:479, img:"pythagore.webp", title:"Pythagore — Le Théorème", date:"~–530 av. J.-C.", year:0, era:"Antiquité Classique (–500 à 500 ap. J.-C.)", desc:"Dans un triangle rectangle, le carré de l'hypoténuse est égal à la somme des carrés des deux autres côtés. Démontré il y a 2 500 ans, ce théorème est encore enseigné dans toutes les écoles du monde." },
  { id:480, img:"parthenon.webp", title:"Le Parthénon & Phidias", date:"~–447 av. J.-C.", year:0, era:"Antiquité Classique (–500 à 500 ap. J.-C.)", desc:"Phidias supervise la construction du Parthénon à Athènes et sculpte la statue d'Athéna Parthénos en or et ivoire. C'est l'apogée de la sculpture et de l'architecture grecques classiques." },
  { id:481, img:"archimede.webp", title:"Archimède — La Poulie & le Levier", date:"~–260 av. J.-C.", year:0, era:"Antiquité Classique (–500 à 500 ap. J.-C.)", desc:"Archimède formule le principe du levier et invente la vis sans fin, la poulie composée et le principe de la poussée hydrostatique. « Donnez-moi un point d'appui et je soulèverai le monde. »" },
  { id:482, img:"moulins a vent.webp", title:"Invention du Moulin à Eau", date:"~–200 av. J.-C.", year:0, era:"Antiquité Classique (–500 à 500 ap. J.-C.)", desc:"Le moulin à eau est l'une des premières machines à exploiter une source d'énergie autre que la force humaine ou animale. Il révolutionne la mouture des céréales en Europe et en Asie." },
  { id:483, img:"Qin Shi Huang & la Grande Muraille.webp", title:"Chine — Qin Shi Huang & la Grande Muraille", date:"–221 av. J.-C.", year:0, era:"Antiquité Classique (–500 à 500 ap. J.-C.)", desc:"Le roi Ying Zheng unifie 7 royaumes en guerre et devient le premier Empereur de Chine. Il lance la construction de la Grande Muraille et standardise l'écriture, les poids et les mesures." },
  { id:484, img:"Auguste.webp", title:"Empire Romain — Auguste à la Chute", date:"–27 av. J.-C.", year:0, era:"Antiquité Classique (–500 à 500 ap. J.-C.)", desc:"Auguste devient le premier Empereur. La Pax Romana offre 2 siècles de paix. Rome atteint 1 million d'habitants, 80 000 km de routes, des aqueducs et le droit romain." },
  { id:485, img:"L'expansion du christianisme au Ier siècle.webp", title:"Naissance du Christianisme", date:"~33 ap. J.-C.", year:0, era:"Antiquité Classique (–500 à 500 ap. J.-C.)", desc:"L'enseignement de Jésus de Nazareth se répand dans tout l'Empire romain. En 380, Théodose en fait la religion officielle de l'Empire." },
  { id:486, img:"Schéma et histoire du compas.webp", title:"La Boussole (Chine → Monde)", date:"~XIe siècle", year:0, era:"Antiquité Classique (–500 à 500 ap. J.-C.)", desc:"Inventée en Chine pour la géomancie (feng shui), la boussole est adaptée à la navigation maritime au XIe siècle. Elle permettra les Grandes Découvertes européennes." },
  { id:487, img:"Lady Murasaki écrivant sous la lueur de la bougie.webp", title:"Le Dit du Genji — Premier Roman du Monde", date:"~1 010", year:0, era:"Antiquité Classique (–500 à 500 ap. J.-C.)", desc:"Murasaki Shikibu, dame de cour japonaise, écrit Le Dit du Genji — le premier roman de l'histoire humaine. Un récit de 54 chapitres sur les amours de la cour impériale." },
  { id:488, img:"papier.webp", title:"Invention du Papier (Chine)", date:"105 ap. J.-C.", year:0, era:"Antiquité Classique (–500 à 500 ap. J.-C.)", desc:"Cai Lun améliore le procédé de fabrication du papier en Chine. Cette invention mettra 1 000 ans à atteindre l'Europe, révolutionnant la transmission du savoir." },
  { id:489, img:"Prêtre shintoïste.webp", title:"Japon Ancien — Shintô & Premiers Clans", date:"~300 ap. J.-C.", year:0, era:"Antiquité Classique (–500 à 500 ap. J.-C.)", desc:"Les premiers clans japonais se fédèrent. Le shintô, religion indigène, vénère les kami — les esprits qui habitent la nature. L'Empereur descend de la déesse du Soleil Amaterasu." },
  { id:490, img:"byzance.webp", title:"Byzance — La Rome Orientale", date:"330 ap. J.-C.", year:0, era:"Antiquité Classique (–500 à 500 ap. J.-C.)", desc:"Constantin fonde Constantinople sur le Bosphore. L'Empire romain d'Orient survivra 1 123 ans de plus que celui d'Occident, gardant vivant l'héritage grec et romain." },
  { id:491, img:"Tombuctu le marché animé d'une cité ancienne.webp", title:"Empire du Mali — Mansa Musa, l'Homme le Plus Riche", date:"1 235 – 1 600", year:0, era:"Moyen Âge Mondial (500 – 1300)", desc:"L'empire du Mali contrôle les routes de l'or. Mansa Musa est probablement l'homme le plus riche de toute l'histoire humaine. Tombouctou est l'une des grandes capitales intellectuelles du monde." },
  { id:492, img:"Empire Songhaï — Tombouctou.webp", title:"Empire Songhaï — Le Plus Grand d'Afrique", date:"1 464 – 1 591", year:0, era:"Moyen Âge Mondial (500 – 1300)", desc:"L'un des plus vastes empires d'Afrique précoloniale couvre une superficie comparable à l'Europe occidentale. Tombouctou est l'un des grands centres intellectuels mondiaux avec ses 700 000 manuscrits." },
  { id:493, img:"Mayas.webp", title:"Mayas Classiques — Astronomie & Écriture", date:"~500 – 900", year:0, era:"Moyen Âge Mondial (500 – 1300)", desc:"Les Mayas construisent des cités-pyramides, développent l'écriture, calculent un calendrier d'une précision extraordinaire et inventent le zéro indépendamment de l'Inde." },
  { id:494, img:"Leonard et Michel-Ange.webp", title:"Léonard & Michel-Ange — Renaissance Italienne", date:"~1 500", year:0, era:"Moyen Âge Mondial (500 – 1300)", desc:"La Renaissance italienne produit en 50 ans plus de chefs-d'œuvre que n'importe quelle autre période. Léonard, Michel-Ange, Raphaël, Botticelli redéfinissent l'art occidental." },
  { id:495, img:"La_migration_du_prophète_Muhammad.webp", title:"Naissance de l'Islam — L'Hégire", date:"622", year:0, era:"Moyen Âge Mondial (500 – 1300)", desc:"Mahomet fuit La Mecque pour Médine. Cette date marque le début du calendrier musulman. En 10 ans, ses successeurs conquièrent la Perse, l'Égypte et la Syrie." },
  { id:496, img:"La Maison de la Sagesse à Bagdad.webp", title:"Âge d'Or de l'Islam — Bagdad", date:"750 – 1 258", year:0, era:"Moyen Âge Mondial (500 – 1300)", desc:"Bagdad devient la capitale intellectuelle du monde. La Maison de la Sagesse traduit tout le savoir grec, perse et indien. Mathématiques, médecine, astronomie atteignent leur apogée." },
  { id:497, img:"raids_vikings.webp", title:"Les Vikings — Explorateurs du Monde", date:"793 – 1 066", year:0, era:"Moyen Âge Mondial (500 – 1300)", desc:"Les Vikings partis de Scandinavie attaquent les côtes européennes, remontent les fleuves jusqu'à Bagdad, colonisent l'Islande et le Groenland, et atteignent l'Amérique 500 ans avant Colomb." },
  { id:498, img:"Samouraï_noble_au_lever_du_jour.webp", title:"Japon Féodal — Les Samouraïs", date:"1185", year:0, era:"Moyen Âge Mondial (500 – 1300)", desc:"Le premier shogunat de Kamakura est créé. Les samouraïs deviennent la classe dirigeante. Le Bushidô (voie du guerrier) codifie l'honneur, la loyauté et le sacrifice." },
  { id:499, img:"Gengis_Khan_sur_les_steppes_mongoles.webp", title:"Gengis Khan — L'Empire Mongol", date:"1206", year:0, era:"Moyen Âge Mondial (500 – 1300)", desc:"Temüjin unifie les tribus mongoles et devient Gengis Khan. En 20 ans, il conquiert la Chine du Nord, l'Asie centrale et la Perse. Son empire sera le plus grand jamais créé." },
  { id:500, img:"fibonacci.webp", title:"Fibonacci — Les Chiffres Arabes en Europe", date:"1202", year:0, era:"Moyen Âge Mondial (500 – 1300)", desc:"Leonardo Fibonacci publie le Liber Abaci et introduit les chiffres arabes (0-9) en Europe. Ils remplacent progressivement les chiffres romains et rendent le calcul infiniment plus simple." },
  { id:501, img:"bacon.webp", title:"Roger Bacon — La Poudre à Canon en Europe", date:"~1267", year:0, era:"Moyen Âge Mondial (500 – 1300)", desc:"Le moine franciscain Roger Bacon décrit pour la première fois la poudre à canon en Europe dans ses écrits. Il prédit aussi le télescope, les lunettes et les avions — 600 ans avant leur invention." },
  { id:502, img:"lunettes.webp", title:"Invention des Lunettes", date:"~1286", year:0, era:"Moyen Âge Mondial (500 – 1300)", desc:"Les premières lunettes correctrices sont fabriquées en Italie vers 1286. Elles permettent aux clercs et artisans âgés de continuer à travailler. La productivité intellectuelle de l'Europe fait un bond." },
  { id:503, img:"l'horloge médiévale.webp", title:"L'Horloge Mécanique", date:"~1300", year:0, era:"Moyen Âge Mondial (500 – 1300)", desc:"Les premières horloges mécaniques à échappement apparaissent dans les cathédrales européennes. Pour la première fois, le temps est mesuré, divisé, et partagé publiquement — naissance de la ponctualité." },
  { id:504, img:"dante.webp", title:"Dante — La Divine Comédie", date:"1305", year:0, era:"Moyen Âge Mondial (500 – 1300)", desc:"Dante Alighieri écrit en italien (et non en latin) un voyage poétique à travers l'Enfer, le Purgatoire et le Paradis. C'est le fondement de la langue italienne et l'un des plus grands textes de la littérature mondiale." },
  { id:505, img:"Giotto peint les fresques à Padoue.webp", title:"Giotto — La Révolution du Réalisme", date:"~1305", year:0, era:"Moyen Âge Mondial (500 – 1300)", desc:"Giotto di Bondone peint les fresques de la chapelle des Scrovegni à Padoue. Pour la première fois depuis l'Antiquité, les personnages ont un volume, des émotions, une profondeur. Il invente la peinture moderne." },
  { id:506, img:"copernic.webp", title:"Copernic — Révolution Héliocentrique", date:"1543", year:0, era:"Moyen Âge Mondial (500 – 1300)", desc:"La Terre tourne autour du Soleil. Cette idée, publiée en 1543, déclenche la révolution scientifique et brise 1 400 ans de cosmologie ptolémaïque." },

/* ── STARS ── */
(function(){
  const c=document.getElementById('stars-canvas'),ctx=c.getContext('2d');let stars=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  function init(){resize();stars=Array.from({length:220},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.3+.15,a:Math.random()*.55+.08,speed:Math.random()*.0004+.00015,phase:Math.random()*Math.PI*2}));}
  let t=0;function draw(){t++;ctx.clearRect(0,0,c.width,c.height);for(const s of stars){const f=s.a*(.65+.35*Math.sin(t*s.speed*80+s.phase));ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(232,223,196,${f})`;ctx.fill();}requestAnimationFrame(draw);}
  addEventListener('resize',init);init();draw();
})();

/* ── STATE ── */
let deck=[],idx=0,flipped=false,knownSet=new Set(),reviewSet=new Set();
const fc=()=>document.getElementById('fc');
const front=()=>document.getElementById('front');
const overlay=()=>document.getElementById('overlay');

/* ── LOAD CONTENT ── */
function loadContent(){
  const card=deck[idx];
  document.getElementById('fc-img').src='../img/histoire/'+card.img;
  document.getElementById('fc-era').textContent=card.era;
  document.getElementById('fc-date').textContent=card.date;
  document.getElementById('fc-title').textContent=card.title;
  document.getElementById('fc-desc').textContent=card.desc||'';
  const pct=(idx/deck.length)*100;
  document.getElementById('p-text').textContent=`Carte ${idx+1} / ${deck.length}`;
  document.getElementById('p-fill').style.width=pct+'%';
  document.querySelectorAll('#strip .thumb').forEach((el,i)=>el.classList.toggle('cur',i===idx));
}

/* ── ADVANCE: fondu noir → iris ── */
function advance(){
  const ov=overlay(), fr=front(), wrap=fc();

  // 1. Fondu NOIR
  ov.classList.add('dark');

  setTimeout(()=>{
    // 2. Snap verso→recto SANS animation (bloqué par no-anim)
    wrap.classList.add('no-anim');
    wrap.classList.remove('flipped');
    flipped=false;
    fr.classList.remove('iris');

    // 3. Charger le contenu sous le noir
    loadContent();

    // 4. Deux frames = snap peint avant de retirer le verrou
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      wrap.classList.remove('no-anim');
      ov.classList.remove('dark');   // dissoudre le noir
      fr.classList.add('iris');      // ouvrir l'iris
    }));

  }, 280);
}

/* ── FLIP ── */
function flipCard(){
  if(flipped){
    idx=(idx+1)%deck.length;
    advance();
  } else {
    flipped=true;
    fc().classList.add('flipped');
  }
}

/* ── NAVIGATION ── */
function nextCard(){idx=(idx+1)%deck.length;advance();}
function prevCard(){idx=(idx-1+deck.length)%deck.length;advance();}

function shuffleCards(){
  deck=shuffle([...CARDS]);idx=0;flipped=false;
  knownSet.clear();reviewSet.clear();
  updateCounters();buildStrip();advance();
}

function markKnown(){
  knownSet.add(deck[idx].id);reviewSet.delete(deck[idx].id);
  updateCounters();idx=(idx+1)%deck.length;advance();
}

function markReview(){
  reviewSet.add(deck[idx].id);knownSet.delete(deck[idx].id);
  const card=deck.splice(idx,1)[0];
  deck.splice(Math.min(idx+3,deck.length),0,card);
  updateCounters();if(idx>=deck.length)idx=0;advance();
}

/* ── UI ── */
function updateCounters(){
  document.getElementById('k-count').textContent=knownSet.size;
  document.getElementById('r-count').textContent=reviewSet.size;
  document.getElementById('rem-count').textContent=deck.length-knownSet.size-reviewSet.size;
}

function buildStrip(){
  const strip=document.getElementById('strip');strip.innerHTML='';
  deck.forEach((card,i)=>{
    const img=document.createElement('img');
    img.src='../img/histoire/'+card.img;img.alt=card.title;
    img.className='thumb'+(i===0?' cur':'');
    img.onclick=()=>{idx=i;advance();};
    img.title=card.title;
    strip.appendChild(img);
  });
}

/* ── UTILS ── */
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nextCard();}
  if(e.key==='ArrowLeft'){e.preventDefault();prevCard();}
  if(e.key==='Enter'){e.preventDefault();flipCard();}
  if(e.key==='k'||e.key==='K')markKnown();
  if(e.key==='r'||e.key==='R')markReview();
});

/* ── BOOT ── */
deck=shuffle([...CARDS]);
buildStrip();
loadContent(); // première carte sans animation
</script>
