<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards Arts — L'Encyclopédie des Explorateurs</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a14;--gold:#d4a843;--gold-dim:rgba(200,180,120,0.18);--text:#e8dfc4;--text-dim:rgba(232,223,196,0.48);--card-bg:rgba(8,13,26,0.94);--border:rgba(200,180,120,0.18);--rose:#e87ab0;--rose-dim:rgba(232,122,176,0.15);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;min-height:100vh;overflow-x:hidden;user-select:none;}
#stars-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.content{position:relative;z-index:1;}
.back{position:fixed;top:22px;left:24px;z-index:100;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(212,168,67,.5);text-decoration:none;display:flex;align-items:center;gap:8px;transition:color .2s;}
.back:hover{color:#d4a843;}
header{text-align:center;padding:52px 20px 28px;}
.enc-label{font-size:.72rem;letter-spacing:.38em;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;}
h1{font-family:'Cinzel',serif;font-weight:900;font-size:clamp(1.7rem,4.5vw,3.2rem);background:linear-gradient(135deg,#f5d0e8,#e87ab0 38%,#f0a0c8 68%,#fff0f8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;}
.tagline{margin-top:10px;font-size:.95rem;color:var(--text-dim);font-style:italic;}
.divider{height:1px;background:var(--gold-dim);max-width:300px;margin:20px auto;}
.filter-bar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:0 20px 20px;max-width:700px;margin:0 auto;}
.filter-btn{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;padding:6px 14px;border-radius:3px;border:1px solid var(--border);background:rgba(6,10,20,.9);color:var(--text-dim);cursor:pointer;transition:all .2s;}
.filter-btn:hover,.filter-btn.active{border-color:rgba(232,122,176,.5);color:var(--rose);background:rgba(232,122,176,.07);}
.filter-btn.active{box-shadow:0 0 12px rgba(232,122,176,.12);}
.progress-wrap{max-width:520px;margin:0 auto 28px;text-align:center;}
.progress-text{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;}
.progress-bar{height:2px;background:var(--gold-dim);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--rose);transition:width .4s ease;border-radius:2px;}
.stage{display:flex;justify-content:center;align-items:center;perspective:1400px;padding:8px 0 20px;}
.fc-wrap{width:420px;max-width:88vw;height:480px;position:relative;transform-style:preserve-3d;transition:transform .72s cubic-bezier(.4,0,.2,1);cursor:pointer;}
.fc-wrap.flipped{transform:rotateY(180deg);}
.fc-wrap.no-anim{transition:none!important;}
.face{position:absolute;inset:0;border-radius:14px;backface-visibility:hidden;-webkit-backface-visibility:hidden;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 0 1px rgba(200,180,120,.06);overflow:hidden;}
.face-front{background:var(--card-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 36px 70px;}
.face-front::before{content:'';position:absolute;inset:0;border-radius:14px;background:radial-gradient(ellipse at 50% 0%,rgba(232,122,176,.06) 0%,transparent 65%);pointer-events:none;}
.q-category{font-size:.6rem;letter-spacing:.24em;text-transform:uppercase;color:var(--rose);border:1px solid rgba(232,122,176,.35);padding:4px 14px;border-radius:3px;margin-bottom:24px;opacity:.9;}
.q-text{font-family:'Cinzel',serif;font-size:1rem;font-weight:700;color:var(--text);line-height:1.6;}
.q-hint{font-size:.82rem;color:var(--text-dim);font-style:italic;margin-top:14px;}
.front-footer{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 20px;border-top:1px solid var(--border);background:rgba(6,10,20,.6);}
.flip-hint{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);}
.flip-arrow{color:var(--gold);opacity:.7;font-size:1rem;}
.face-back{transform:rotateY(180deg);background:linear-gradient(145deg,#150a1e 0%,#1e0f2a 50%,#140918 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 32px;border-color:rgba(232,122,176,.25);}
.face-back::before{content:'';position:absolute;inset:0;border-radius:14px;background:radial-gradient(ellipse at 50% 20%,rgba(232,122,176,.07) 0%,transparent 65%);pointer-events:none;}
.b-category{font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--rose);border:1px solid rgba(232,122,176,.4);padding:4px 16px;border-radius:3px;margin-bottom:20px;}
.b-question{font-family:'Cinzel',serif;font-size:.82rem;font-weight:700;color:rgba(232,223,196,.45);line-height:1.4;margin-bottom:16px;}
.b-answer{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,#f5d0e8,#e87ab0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px;line-height:1.35;}
.b-explain{font-size:.88rem;line-height:1.75;color:rgba(232,223,196,.55);font-style:italic;max-width:300px;}
.overlay{position:absolute;inset:0;border-radius:14px;background:#000;z-index:30;opacity:0;pointer-events:none;transition:opacity 0.28s ease;}
.overlay.dark{opacity:1;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.face-front.iris{animation:fadeIn 0.35s ease forwards;}
.controls{display:flex;justify-content:center;gap:12px;margin-top:20px;flex-wrap:wrap;}
.btn{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;padding:11px 26px;border-radius:4px;border:1px solid var(--border);background:rgba(6,10,20,.9);color:var(--text-dim);cursor:pointer;transition:all .2s;}
.btn:hover{border-color:rgba(200,180,120,.5);color:var(--text);background:rgba(200,180,120,.07);}
.btn-gold{border-color:rgba(212,168,67,.6);color:var(--gold);background:rgba(212,168,67,.07);}
.btn-gold:hover{background:rgba(212,168,67,.16);box-shadow:0 0 18px rgba(212,168,67,.2);}
.btn-green{border-color:rgba(94,196,138,.5);color:#5ec48a;}
.btn-green:hover{background:rgba(94,196,138,.1);}
.btn-red{border-color:rgba(232,80,80,.5);color:#e84848;}
.btn-red:hover{background:rgba(232,80,80,.1);}
.review-row{display:flex;justify-content:center;gap:12px;margin-top:12px;flex-wrap:wrap;}
.review-label{text-align:center;margin-top:16px;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);}
.known-bar{max-width:520px;margin:20px auto 0;display:flex;gap:20px;justify-content:center;}
.known-stat{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);}
.known-stat span{color:var(--text);font-weight:700;}
.strip{display:flex;gap:8px;overflow-x:auto;padding:12px 20px;scrollbar-width:none;}
.strip::-webkit-scrollbar{display:none;}
.thumb-art{width:52px;height:38px;border-radius:4px;border:1px solid var(--border);flex-shrink:0;opacity:.45;transition:opacity .2s;cursor:pointer;background:rgba(232,122,176,.08);display:flex;align-items:center;justify-content:center;font-size:.55rem;font-family:'Cinzel',serif;color:rgba(232,122,176,.65);text-align:center;padding:2px;}
.thumb-art:hover{opacity:.7;}
.thumb-art.cur{opacity:1;border-color:var(--rose);}
@media(max-width:600px){.fc-wrap{height:440px;}.b-answer{font-size:1.1rem;}}
</style>
</head>
<body>
<canvas id="stars-canvas"></canvas>
<a class="back" href="/flashcards/index.html">← Flashcards</a>
<div class="content">
  <header>
    <div class="enc-label">L'Encyclopédie des Explorateurs</div>
    <h1>Flashcards Arts & Culture</h1>
    <div class="tagline">Peinture · Musique · Littérature · Théâtre · Cinéma</div>
  </header>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterBy('all',this)">Tout</button>
    <button class="filter-btn" onclick="filterBy('Peinture',this)">🎨 Peinture</button>
    <button class="filter-btn" onclick="filterBy('Musique',this)">🎵 Musique</button>
    <button class="filter-btn" onclick="filterBy('Littérature',this)">📖 Littérature</button>
    <button class="filter-btn" onclick="filterBy('Théâtre',this)">🎭 Théâtre</button>
    <button class="filter-btn" onclick="filterBy('Cinéma',this)">🎬 Cinéma</button>
  </div>

  <div style="padding:0 20px 80px;">
    <div class="progress-wrap">
      <div class="progress-text" id="p-text">Carte 1 / 30</div>
      <div class="progress-bar"><div class="progress-fill" id="p-fill" style="width:0%"></div></div>
    </div>
    <div class="stage">
      <div class="fc-wrap" id="fc" onclick="flipCard()">
        <div class="overlay" id="overlay"></div>
        <div class="face face-front" id="front">
          <div class="q-category" id="fc-cat"></div>
          <div class="q-text" id="fc-q"></div>
          <div class="q-hint" id="fc-hint"></div>
          <div class="front-footer">
            <span class="flip-arrow">↩</span>
            <span class="flip-hint">Cliquez pour révéler</span>
          </div>
        </div>
        <div class="face face-back">
          <div class="b-category" id="fc-cat2"></div>
          <div class="b-question" id="fc-q2"></div>
          <div class="b-answer" id="fc-ans"></div>
          <div class="b-explain" id="fc-exp"></div>
        </div>
      </div>
    </div>
    <div class="controls">
      <button class="btn" onclick="prevCard()">← Précédente</button>
      <button class="btn btn-gold" onclick="nextCard()">Suivante →</button>
      <button class="btn" onclick="shuffleCards()">🔀 Mélanger</button>
    </div>
    <div class="review-label">Après avoir révélé la carte :</div>
    <div class="review-row">
      <button class="btn btn-green" onclick="markKnown()">✓ Je savais</button>
      <button class="btn btn-red" onclick="markReview()">↩ À revoir</button>
    </div>
    <div class="known-bar">
      <div class="known-stat">Connues : <span id="k-count">0</span></div>
      <div class="known-stat">À revoir : <span id="r-count">0</span></div>
      <div class="known-stat">Restantes : <span id="rem-count">30</span></div>
    </div>
    <div class="divider"></div>
    <div class="strip" id="strip"></div>
  </div>
</div>

<script>
const ALL_CARDS = [
// ══════════════════════════════════════════════════════════════════
// SOURCE 1 — Cartes générales (id 1–30)
// ══════════════════════════════════════════════════════════════════

// ── PEINTURE (8 cartes) ───────────────────────────────────────────
{id:1,  cat:"Peinture",      q:"Qui a peint la Joconde ?",                                                         ans:"Léonard de Vinci",                                                                                              exp:"Peinte entre 1503 et 1519, elle est exposée au Louvre. Le sourire de Mona Lisa reste l'un des mystères de l'histoire de l'art.",                                                                           hint:"Peintre, sculpteur et savant de la Renaissance italienne."},
{id:2,  cat:"Peinture",      q:"Quel peintre est célèbre pour ses Nymphéas ?",                                     ans:"Claude Monet",                                                                                                  exp:"Monet a peint plus de 250 variations de Nymphéas entre 1896 et 1926 dans son jardin de Giverny. Il est le chef de file de l'impressionnisme.",                                                             hint:"Impressionnisme français, XIXe-XXe siècle."},
{id:3,  cat:"Peinture",      q:"Qui a peint La Nuit étoilée ?",                                                    ans:"Vincent van Gogh",                                                                                              exp:"Peinte en juin 1889 depuis sa chambre à l'asile de Saint-Rémy-de-Provence. Elle est conservée au MoMA de New York.",                                                                                        hint:"Post-impressionniste néerlandais, peintre torturé du XIXe."},
{id:4,  cat:"Peinture",      q:"Qu'est-ce que le sfumato ?",                                                       ans:"Une technique de peinture utilisant des contours flous et des transitions douces.",                              exp:"Inventée par Léonard de Vinci, elle crée une atmosphère brumeuse et donne du relief aux visages.",                                                                                                           hint:"Terme italien signifiant 'évanoui comme de la fumée'."},
{id:5,  cat:"Peinture",      q:"Quel mouvement artistique est associé à Salvador Dalí ?",                          ans:"Le surréalisme.",                                                                                               exp:"Le surréalisme explore le monde des rêves et de l'inconscient. Dalí y mêle précision technique et images délirantes (La Persistance de la mémoire, 1931).",                                                  hint:"Mouvement du XXe siècle lié aux théories de Freud."},
{id:6,  cat:"Peinture",      q:"Qui a peint le plafond de la Chapelle Sixtine ?",                                  ans:"Michel-Ange",                                                                                                   exp:"Commandé par le pape Jules II, Michel-Ange a peint ce plafond entre 1508 et 1512. La scène centrale représente La Création d'Adam.",                                                                         hint:"Génie de la Renaissance italienne, également sculpteur du David."},
{id:7,  cat:"Peinture",      q:"Qu'est-ce que le cubisme ?",                                                       ans:"Un mouvement qui représente les objets sous plusieurs angles simultanément.",                                    exp:"Fondé par Picasso et Braque vers 1907, il déconstruit la perspective traditionnelle en fragments géométriques.",                                                                                              hint:"Révolution artistique du XXe siècle, Picasso en est la figure centrale."},
{id:8,  cat:"Peinture",      q:"Quel tableau de Picasso commémore le bombardement d'une ville basque ?",           ans:"Guernica (1937)",                                                                                               exp:"Peint en réaction au bombardement de Guernica par les nazis en 1937 pendant la guerre civile espagnole. Chef-d'œuvre du cubisme et symbole anti-guerre.",                                                    hint:"Ville basque espagnole, 1937, guerre civile."},

// ── MUSIQUE (7 cartes) ────────────────────────────────────────────
{id:9,  cat:"Musique",       q:"Qui a composé les 9 symphonies dont la célèbre 5ème en do mineur ?",               ans:"Ludwig van Beethoven",                                                                                          exp:"La Cinquième Symphonie commence par le fameux motif 'da-da-da-DUM'. Beethoven l'a composée entre 1804 et 1808, alors qu'il devenait sourd.",                                                                 hint:"Compositeur allemand du classicisme/romantisme, sourd à la fin de sa vie."},
{id:10, cat:"Musique",       q:"Combien de symphonies Mozart a-t-il composées ?",                                  ans:"41 symphonies.",                                                                                                exp:"Mozart a composé 41 symphonies dont la célèbre n°40 en sol mineur. Il a commencé à composer à l'âge de 5 ans.",                                                                                              hint:"Enfant prodige autrichien du XVIIIe siècle."},
{id:11, cat:"Musique",       q:"Qu'est-ce qu'une fugue en musique ?",                                              ans:"Une composition contrapuntique où un thème est repris et imité par différentes voix.",                            exp:"Bach est le maître de la fugue. L'Art de la Fugue (BWV 1080) est son œuvre la plus complexe sur ce sujet.",                                                                                                 hint:"Jean-Sébastien Bach en est le maître incontesté."},
{id:12, cat:"Musique",       q:"Quel compositeur romantique est surnommé 'le Poète du piano' ?",                   ans:"Frédéric Chopin",                                                                                               exp:"Chopin (1810-1849) a consacré presque toute son œuvre au piano. Ses nocturnes, valses et préludes restent parmi les plus beaux du répertoire.",                                                              hint:"Compositeur polonais ayant vécu à Paris."},
{id:13, cat:"Musique",       q:"Qu'est-ce qu'un opéra ?",                                                          ans:"Un spectacle musical où les personnages chantent leurs dialogues.",                                             exp:"L'opéra est né à Florence vers 1600. Wagner, Verdi, Puccini sont parmi les plus grands compositeurs d'opéras.",                                                                                              hint:"Genre musical né en Italie à la fin de la Renaissance."},
{id:14, cat:"Musique",       q:"Qu'appelle-t-on le 'jazz' ?",                                                      ans:"Un genre musical né aux États-Unis à la fin du XIXe s., mêlant blues, gospel et improvisation.",                 exp:"Né à La Nouvelle-Orléans vers 1890-1910. Louis Armstrong, Miles Davis, John Coltrane en sont les figures emblématiques.",                                                                                     hint:"Né à La Nouvelle-Orléans, influencé par la culture afro-américaine."},
{id:15, cat:"Musique",       q:"Quel est le nom du célèbre requiem composé par Mozart et inachevé à sa mort ?",    ans:"Requiem en ré mineur, K. 626.",                                                                                 exp:"Composé en 1791, l'année de sa mort, il fut complété par son élève Süssmayr. Ce mystère a alimenté de nombreuses théories et le film Amadeus.",                                                              hint:"Sa dernière œuvre, restée inachevée en 1791."},

// ── LITTÉRATURE (8 cartes) ────────────────────────────────────────
{id:16, cat:"Littérature",   q:"Qui a écrit Les Misérables ?",                                                     ans:"Victor Hugo (1862)",                                                                                            exp:"Roman fleuve de 1500 pages suivant Jean Valjean. Hugo y dénonce les injustices sociales de la France du XIXe siècle. Adapté en comédie musicale mondiale.",                                                  hint:"Grand auteur romantique français du XIXe siècle."},
{id:17, cat:"Littérature",   q:"Qu'est-ce que l'Odyssée ?",                                                        ans:"Un poème épique d'Homère racontant le retour d'Ulysse après la guerre de Troie.",                               exp:"L'Odyssée compte 12 000 vers et 24 chants. Elle est avec l'Iliade l'œuvre fondatrice de la littérature occidentale.",                                                                                        hint:"Épopée grecque antique, compagnon de l'Iliade."},
{id:18, cat:"Littérature",   q:"Qui a écrit En attendant Godot ?",                                                 ans:"Samuel Beckett (1953)",                                                                                         exp:"Pièce du théâtre de l'absurde : deux personnages attendent Godot qui ne vient jamais. Beckett a reçu le Nobel de littérature en 1969.",                                                                       hint:"Théâtre de l'absurde, Prix Nobel 1969."},
{id:19, cat:"Littérature",   q:"Qu'est-ce que le roman picaresque ?",                                              ans:"Un roman suivant les aventures d'un héros de basse condition, rusé et débrouillard.",                            exp:"Né en Espagne au XVIe siècle (Lazarillo de Tormes). Il dénonce la société par l'ironie. Gil Blas de Lesage en est l'exemple français.",                                                                     hint:"Genre littéraire né en Espagne, critique sociale par l'ironie."},
{id:20, cat:"Littérature",   q:"Qui a écrit À la recherche du temps perdu ?",                                      ans:"Marcel Proust",                                                                                                 exp:"Roman-fleuve en 7 volumes (1913-1927). La célèbre madeleine trempée dans du thé déclenche un flot de souvenirs. Chef-d'œuvre de la littérature mondiale.",                                                  hint:"Roman-fleuve français en 7 volumes, début XXe siècle."},
{id:21, cat:"Littérature",   q:"Qu'est-ce que l'alexandrin ?",                                                     ans:"Un vers de 12 syllabes, coupé en deux hémistiches de 6.",                                                      exp:"Vers noble de la poésie française classique (Racine, Corneille). Ex : 'Je le vis, je rou-gis, / je pâ-lis à sa vue.' (Racine, Phèdre)",                                                                    hint:"Le vers roi du théâtre classique français."},
{id:22, cat:"Littérature",   q:"Qui est l'auteur de Don Quichotte ?",                                              ans:"Miguel de Cervantes (1605-1615)",                                                                               exp:"Don Quichotte est considéré comme le premier roman moderne. Le héros se prend pour un chevalier et combat des moulins à vent qu'il imagine être des géants.",                                                hint:"Auteur espagnol du XVIIe, œuvre fondatrice du roman moderne."},
{id:23, cat:"Littérature",   q:"Qu'appelle-t-on le courant naturaliste en littérature ?",                          ans:"Un courant qui décrit la réalité sociale avec précision scientifique, sans idéalisation.",                        exp:"Zola en est le chef de file avec Les Rougon-Macquart (20 romans). Il veut appliquer la méthode scientifique à la littérature.",                                                                              hint:"Émile Zola en est la figure centrale, XIXe siècle."},

// ── THÉÂTRE (4 cartes) ────────────────────────────────────────────
{id:24, cat:"Théâtre",       q:"Quelle est la règle des trois unités du théâtre classique ?",                      ans:"Unité de temps (24h), de lieu (un seul endroit) et d'action (une seule intrigue).",                              exp:"Ces règles héritées d'Aristote ont été codifiées en France au XVIIe siècle pour Corneille, Molière et Racine.",                                                                                              hint:"Règle du théâtre classique français du XVIIe siècle."},
{id:25, cat:"Théâtre",       q:"Qui a écrit Hamlet, Macbeth et Roméo et Juliette ?",                               ans:"William Shakespeare",                                                                                           exp:"Shakespeare (1564-1616) a écrit 37 pièces et 154 sonnets. Ses œuvres sont les plus jouées au monde. Il a révolutionné le théâtre élisabéthain.",                                                            hint:"Dramaturge anglais de la Renaissance, le plus grand de tous les temps."},
{id:26, cat:"Théâtre",       q:"Qu'est-ce que la catharsis selon Aristote ?",                                      ans:"La purification des passions du spectateur par le spectacle tragique.",                                          exp:"Le spectateur qui assiste à une tragédie éprouve pitié et terreur, puis se libère de ces émotions. Concept clé de la Poétique d'Aristote.",                                                                  hint:"Concept aristotélicien lié à la tragédie grecque."},
{id:27, cat:"Théâtre",       q:"Qui est Molière et pourquoi est-il important ?",                                   ans:"Jean-Baptiste Poquelin (1622-1673), le plus grand auteur de comédie française.",                                  exp:"Il a écrit Tartuffe, Le Misanthrope, L'Avare. Il jouait lui-même dans ses pièces et est mort sur scène. La Comédie-Française lui est dédiée.",                                                              hint:"Il est mort sur scène en jouant Le Malade imaginaire."},

// ── CINÉMA (3 cartes) ─────────────────────────────────────────────
{id:28, cat:"Cinéma",        q:"Qui sont les frères qui ont inventé le cinématographe en 1895 ?",                  ans:"Auguste et Louis Lumière",                                                                                      exp:"La première projection publique payante eut lieu le 28 décembre 1895 au Grand Café de Paris. Ils ont filmé L'Arrivée d'un train en gare de La Ciotat.",                                                     hint:"Deux frères lyonnais, fin XIXe siècle."},
{id:29, cat:"Cinéma",        q:"Qu'est-ce que la Nouvelle Vague au cinéma ?",                                      ans:"Un mouvement français des années 1960 prônant un cinéma libre, improvisé, personnel.",                            exp:"Godard, Truffaut, Chabrol en sont les figures. À bout de souffle (1960) en est le manifeste. Révolution contre le cinéma académique.",                                                                        hint:"Mouvement français des années 60, Godard et Truffaut en tête."},
{id:30, cat:"Cinéma",        q:"Quel réalisateur est connu pour 2001 l'Odyssée de l'espace et Orange mécanique ?", ans:"Stanley Kubrick",                                                                                               exp:"Kubrick (1928-1999) est considéré comme l'un des plus grands réalisateurs. Perfectionniste absolu, il a aussi réalisé Shining et Full Metal Jacket.",                                                        hint:"Réalisateur américain perfectionniste, maître du genre."},

// ══════════════════════════════════════════════════════════════════
// SOURCE 2 — Cartes approfondies arts-data.json (id 31–82)
// ══════════════════════════════════════════════════════════════════

// ── PEINTURE ──────────────────────────────────────────────────────
{id:31, cat:"Peinture",      q:"Quelle technique de Léonard de Vinci crée les contours flous de la Joconde ?",                          ans:"Le sfumato — des glacis translucides superposés qui fondent les contours dans la lumière.",                    exp:"Le mot vient de l'italien 'sfumare' (s'estomper). Cette innovation donne au visage de la Joconde son modelé atmosphérique et son sourire insaisissable.",                                                    hint:"Du mot italien pour 'fumée' — les contours s'évaporent comme de la vapeur."},
{id:32, cat:"Peinture",      q:"Qui a volé la Joconde en 1911, et comment ?",                                                           ans:"Vincenzo Peruggia, un ouvrier du Louvre, qui la cacha sous son manteau.",                                      exp:"Le tableau disparut deux ans. Picasso fut même interrogé comme suspect. Peruggia fut arrêté en 1913 en tentant de la vendre à un marchand florentin.",                                                    hint:"Un ouvrier du musée lui-même, avec un moyen très simple."},
{id:33, cat:"Peinture",      q:"Dans L'École d'Athènes de Raphaël, que symbolise le geste de Platon pointant vers le ciel ?",           ans:"Le monde des Idées — le monde immatériel et parfait, opposé au monde réel incarné par Aristote.",           exp:"Raphaël a donné à Platon le visage de Léonard de Vinci. Son opposé Aristote pointe vers la terre, symbolisant l'empirisme et l'observation du monde réel.",                                              hint:"Platon croit en un monde supérieur des Idées au-dessus de la réalité sensible."},
{id:34, cat:"Peinture",      q:"Pour qui Botticelli a-t-il peint La Naissance de Vénus, et que symbolise-t-elle ?",                     ans:"Commandée par la famille Médicis, elle symbolise la Beauté céleste et l'amour divin selon le néoplatonisme.", exp:"Vénus n'est pas une déesse de chair mais le symbole de la Beauté idéale. C'est la première grande peinture de nu féminin depuis l'Antiquité.",                                                          hint:"La grande famille mécène de Florence — et une philosophie platonicienne de la beauté."},
{id:35, cat:"Peinture",      q:"Combien de temps Michel-Ange a-t-il mis pour peindre le plafond de la Chapelle Sixtine ?",              ans:"Quatre ans (1508–1512), travaillant seul, allongé sur des échafaudages.",                                      exp:"Il avait d'abord refusé la commande, se considérant comme sculpteur. Le pape Jules II le contraignit d'accepter. La Chapelle mesure 40 × 14 mètres.",                                                    hint:"Moins longtemps qu'on ne l'imagine pour une surface de 500 m²."},
{id:36, cat:"Peinture",      q:"Quelle scène de la Chapelle Sixtine est la plus célèbre, et que représente-t-elle ?",                   ans:"La Création d'Adam — les doigts de Dieu et d'Adam se frôlent, symbolisant le souffle de vie divin.",          exp:"Cette image est la plus reproduite de l'histoire de l'art occidental. L'espace entre les deux doigts concentre toute la tension dramatique de l'œuvre.",                                                 hint:"Le moment où la vie est transmise à l'humanité par un frôlement de doigt."},
{id:37, cat:"Peinture",      q:"Quelle technique de Rembrandt caractérise La Ronde de Nuit ?",                                          ans:"Le clair-obscur — un contraste saisissant entre zones très éclairées et ombres profondes.",                    exp:"Rembrandt maîtrise le clair-obscur influencé par Caravage. La Ronde de Nuit est en réalité une scène de jour — les vernis ont assombri le tableau avec le temps.",                                        hint:"Lumière et ombre en contraste extrême — une technique venue de Caravage."},
{id:38, cat:"Peinture",      q:"Que représente réellement La Ronde de Nuit, et pourquoi son titre est-il trompeur ?",                   ans:"Une compagnie de miliciens en plein jour — le tableau a noirci avec le temps, d'où le titre.",                  exp:"Commandée par 18 miliciens d'Amsterdam, La Ronde de Nuit mesure 3,79 × 4,53 m et est exposée au Rijksmuseum.",                                                                                           hint:"Le vrai moment représenté est diurne — c'est la patine des vernis qui induit en erreur."},
{id:39, cat:"Peinture",      q:"Dans La Fille à la Perle de Vermeer, que révèle l'analyse de la perle selon les experts ?",             ans:"Ce serait une perle en verre — d'une forme trop parfaite pour être une vraie perle naturelle.",                 exp:"Surnommée 'la Joconde du Nord', cette peinture de 44,5 × 39 cm fascine par son regard mystérieux tourné vers le spectateur.",                                                                             hint:"Sa perfection géométrique trahit peut-être une imitation — les vraies perles sont irrégulières."},
{id:40, cat:"Peinture",      q:"Quel mensonge historique cache Le Sacre de Napoléon peint par David ?",                                 ans:"Joséphine était absente de la cérémonie — David l'a peinte quand même sur ordre de Napoléon.",                  exp:"Napoléon se couronna lui-même des mains du pape, mais David montre le couronnement de Joséphine. Le tableau mesure 6,21 × 9,79 m — presque 60 m².",                                                    hint:"Le peintre officiel arrangea la vérité — la reine n'était pas là ce jour-là."},
{id:41, cat:"Peinture",      q:"Pourquoi Le Radeau de la Méduse de Géricault fut-il un scandale politique en 1819 ?",                   ans:"Il dénonçait un naufrage réel causé par l'incompétence d'un officier royaliste nommé par favoritisme.",        exp:"La frégate Méduse s'échoua en 1816. Le capitaine prit la chaloupe — 147 survivants sur le radeau, 15 rescapés après 13 jours. Le gouvernement Bourbon était directement mis en cause.",                 hint:"Derrière la scène maritime se cachait une critique du régime politique de la Restauration."},
{id:42, cat:"Peinture",      q:"Quel tableau a donné son nom au mouvement Impressionniste ?",                                            ans:"'Impression, soleil levant' de Monet (1872) — un critique l'utilisa par moquerie, les artistes l'adoptèrent.", exp:"Lors de l'exposition de 1874, le critique Leroy utilisa le terme 'impressionniste' comme une moquerie. Monet, Renoir, Degas et Pissarro en sont les maîtres.",                                          hint:"Le nom vient d'un tableau de Monet que la critique utilisa pour se moquer du mouvement."},
{id:43, cat:"Peinture",      q:"Pourquoi Les Nymphéas de Monet sont-ils exposés dans des salles ovales à l'Orangerie ?",                ans:"Monet les conçut spécialement pour ces salles, offertes à l'État en 1918, pour créer une expérience immersive.", exp:"La série comporte plus de 250 peintures. Les huit grandes toiles mesurent jusqu'à 91 m au total. Monet les peignit alors qu'il devenait progressivement aveugle.",                                        hint:"Des œuvres pensées pour envelopper le spectateur à 360° dans la nature."},
{id:44, cat:"Peinture",      q:"Pour qui Van Gogh peignit-il Les Tournesols, et en combien de versions ?",                               ans:"Pour décorer la chambre de son ami Gauguin à Arles — il en peignit sept versions différentes.",                exp:"Van Gogh écrit : 'Je travaille avec l'ardeur d'un Marseillais mangeant la bouillabaisse.' Les tournesols symbolisent pour lui la gratitude et l'amitié.",                                               hint:"Un ami peintre attendu à Arles — une série peinte en signe d'accueil."},
{id:45, cat:"Peinture",      q:"Depuis où Van Gogh a-t-il peint La Nuit Étoilée, et comment l'a-t-il transformée ?",                    ans:"Depuis sa chambre à l'asile de Saint-Rémy — transformée par son imagination en tourbillons cosmiques.",         exp:"Van Gogh écrit : 'La nuit est encore plus richement colorée que le jour.' Le cyprès au premier plan et le village endormi créent un contraste entre ciel agité et terre apaisée.",                        hint:"Peinte d'une fenêtre d'hôpital psychiatrique — entre vision réelle et hallucination."},
{id:46, cat:"Peinture",      q:"Quelle technique révolutionnaire Klimt utilise-t-il dans Le Baiser ?",                                   ans:"Les feuilles d'or véritable appliquées sur la toile — inspirées des mosaïques byzantines de Ravenne.",         exp:"Klimt utilise également de l'argent et du platine. Le Baiser est la synthèse de sa 'Période Dorée'. Il mesure 180 × 180 cm et est exposé à Vienne.",                                                    hint:"Une technique venue de l'art religieux médiéval — de l'or véritable sur la toile."},
{id:47, cat:"Peinture",      q:"Qu'est-ce que l'Expressionnisme, dont Le Cri de Munch est l'œuvre emblématique ?",                      ans:"Un mouvement qui déforme la réalité pour exprimer les états intérieurs — angoisse, peur, solitude.",             exp:"Munch écrit : 'Je sentis un cri infini traverser la nature.' Le personnage est lui-même. Le tableau existe en plusieurs versions, dont une volée en 1994.",                                                hint:"La forme est tordue pour exprimer l'émotion intérieure plutôt que la réalité visible."},
{id:48, cat:"Peinture",      q:"Quelle technique Picasso invente-t-il dans Les Demoiselles d'Avignon ?",                                 ans:"La décomposition simultanée sous plusieurs angles dans un même plan — fondement du cubisme.",                    exp:"Peint en 1907 sous l'influence de l'art africain, ce tableau choqua même Braque et Matisse. Il reste dans l'atelier de Picasso jusqu'en 1916.",                                                           hint:"Voir un visage de face et de profil en même temps — plusieurs points de vue simultanés."},
{id:49, cat:"Peinture",      q:"Quel événement Guernica de Picasso dénonce-t-il ?",                                                      ans:"Le bombardement de la ville basque de Guernica par l'aviation nazie et fasciste le 26 avril 1937.",             exp:"Commandé pour l'Exposition Universelle de Paris, Guernica mesure 3,49 × 7,76 m. Il fut gardé au MoMA jusqu'à la mort de Franco en 1981.",                                                                hint:"Un village basque rasé en quelques heures — premier bombardement massif sur des civils."},
{id:50, cat:"Peinture",      q:"Pourquoi La Persistance de la Mémoire de Dalí représente-t-elle des montres molles ?",                  ans:"Pour illustrer la relativité du temps dans le rêve — inspirée par un camembert qui fondait au soleil.",         exp:"Peinte en 1931, elle mesure seulement 24 × 33 cm. Le paysage est Port Lligat en Catalogne. L'être mou au centre est peut-être Dalí lui-même.",                                                            hint:"Dalí s'inspira d'un fromage qui fondait — le temps 'fond' dans l'inconscient."},
{id:51, cat:"Peinture",      q:"Qu'est-ce que le Fauvisme, dont Matisse est le maître ?",                                                ans:"Un courant utilisant des couleurs pures et violentes pour exprimer la joie et l'émotion, sans reproduire la réalité.", exp:"Le mot 'fauves' fut lancé par un critique choqué au Salon d'Automne de 1905. La Danse fut commandée par le collectionneur russe Chtchoukine.",                                                       hint:"Du mot pour 'bête sauvage' — des couleurs crues qui 'rugissent' sur la toile."},
{id:52, cat:"Peinture",      q:"Pourquoi Kandinsky est-il considéré comme le fondateur de l'art abstrait ?",                             ans:"Il fut le premier à peindre une œuvre sans aucun sujet reconnaissable — sa première aquarelle abstraite date de 1910.", exp:"Kandinsky comparait la peinture à la musique : comme une symphonie n'imite pas le monde, la peinture peut exprimer des émotions pures sans représenter d'objets.",                                hint:"Comme la musique, abstraite sans représenter d'objets — il voulait 'peindre de la musique'."},
{id:53, cat:"Peinture",      q:"Quelle révolution La Liberté guidant le Peuple de Delacroix opère-t-elle ?",                             ans:"Elle mêle allégorie (la Marianne) et réalisme cru (cadavres, foule hétéroclite) — un choc pour les contemporains.", exp:"Peinte après les Trois Glorieuses de juillet 1830, elle inspira le drapeau de la Liberté dans Les Misérables et figure sur les anciens billets de 100 francs.",                                      hint:"Une déesse grecque aux seins nus marchant sur des cadavres réels — l'idéal et le sordide mêlés."},
{id:54, cat:"Peinture",      q:"Quelle technique impressionniste caractérise le Bal du Moulin de la Galette de Renoir ?",                ans:"Des touches de couleur pure juxtaposées reproduisant la lumière filtrée à travers les feuilles sur les danseurs.", exp:"Renoir transportait chaque jour sa toile à Montmartre. Les personnages sont ses amis. Le tableau mesure 131 × 175 cm et est exposé au musée d'Orsay.",                                              hint:"Des taches lumineuses sur les robes — la lumière décomposée en touches de couleur."},
{id:55, cat:"Peinture",      q:"Quelle vérité historique cache le Napoléon traversant les Alpes de David ?",                             ans:"Napoléon traversa sur un mulet, discrètement, guidé par un paysan — non sur un cheval cabré dans la tempête.", exp:"Napoléon demanda à David de le peindre 'calme sur un cheval fougueux'. Il existe 5 versions de ce tableau.",                                                                                          hint:"La réalité était bien moins héroïque — un mulet et un temps gris."},

// ── LITTÉRATURE ───────────────────────────────────────────────────
{id:56, cat:"Littérature",   q:"Pourquoi Don Quichotte est-il considéré comme le premier roman moderne ?",                               ans:"Il invente la complexité psychologique, la mise en abyme et l'ironie narrative — rupture avec les romans de chevalerie.", exp:"Écrit en prison par Cervantès, c'est le livre le plus traduit après la Bible, élu meilleur roman de tous les temps en 2002.",                                                                           hint:"Pour la première fois, un héros est ridicule, complexe et conscient de lui-même."},
{id:57, cat:"Littérature",   q:"Qu'est-ce que le 'donquichottisme' ?",                                                                   ans:"Une attitude idéaliste qui confond la réalité et les rêves — se battre pour des causes imaginaires.",              exp:"Don Quichotte prend des moulins à vent pour des géants. Son compagnon Sancho Pança représente le bon sens populaire. Ce couple est devenu universel.",                                                    hint:"Confondre l'imaginaire et le réel — prendre des moulins pour des géants."},
{id:58, cat:"Littérature",   q:"Qui est l'auteur de L'Odyssée et à quelle époque a-t-il vécu ?",                                         ans:"Homère, aède grec supposément aveugle du VIIIe siècle av. J.-C. — mais son existence même est débattue.",          exp:"L'Odyssée raconte les dix ans d'errance d'Ulysse après la guerre de Troie. Avec L'Iliade, ce sont les deux poèmes fondateurs de la littérature occidentale.",                                             hint:"Un poète grec légendaire, peut-être aveugle, du VIIIe siècle avant notre ère."},
{id:59, cat:"Littérature",   q:"En combien de parties se divise La Divine Comédie de Dante ?",                                           ans:"Trois — L'Enfer, le Purgatoire et le Paradis — symbolisant le voyage de l'âme vers la salvation.",                exp:"Dante écrit en toscan vulgaire, non en latin — il fonde la langue italienne littéraire. Virgile le guide en Enfer, Béatrice au Paradis. L'œuvre compte 100 chants.",                                     hint:"Trois royaumes de l'Au-delà : le bas, le milieu et le haut du cosmos chrétien."},
{id:60, cat:"Littérature",   q:"Quel est le célèbre dilemme de Hamlet de Shakespeare ?",                                                  ans:"'Être ou ne pas être, telle est la question' — venger son père ou accepter l'injustice et vivre.",                  exp:"Hamlet hésite à venger son père assassiné par son oncle. Shakespeare invente un héros paralysé par sa propre conscience. La pièce fut créée vers 1600.",                                                  hint:"Un prince danois qui réfléchit trop — l'inaction comme tragédie existentielle."},
{id:61, cat:"Littérature",   q:"Qu'est-ce que le réalisme littéraire incarné par Les Misérables de Victor Hugo ?",                       ans:"Un courant représentant la société telle qu'elle est — misère, injustice et luttes sociales sans idéalisation.",   exp:"Les Misérables (1862) suit Jean Valjean 19 ans après sa libération du bagne. Traduit en 50 langues, adapté en comédie musicale mondiale.",                                                                hint:"Montrer la réalité sociale brute — misère, bagne et barricades."},
{id:62, cat:"Littérature",   q:"Pourquoi Madame Bovary de Flaubert fut-il poursuivi en justice à sa parution ?",                         ans:"Pour outrage à la morale publique — Flaubert fut acquitté, contrairement à Baudelaire la même année (1857).",     exp:"Emma Bovary rêve d'une vie romantique et s'endette pour ses amants. Le roman invente le style indirect libre — rapporter les pensées du personnage sans guillemets.",                                     hint:"La même année que Les Fleurs du Mal — deux procès pour immoralité en 1857."},
{id:63, cat:"Littérature",   q:"Quel pacte est au cœur du Portrait de Dorian Gray d'Oscar Wilde ?",                                      ans:"Dorian garde éternellement sa jeunesse tandis que son portrait vieillit et reflète ses crimes à sa place.",         exp:"Wilde explore la décadence victorienne et la corruption morale. Publié en 1890, le roman fut utilisé contre lui lors de son procès pour homosexualité en 1895.",                                          hint:"Un portrait qui prend sur lui la laideur morale — Dorian reste beau, le tableau se corrompt."},
{id:64, cat:"Littérature",   q:"Quelle technique narrative Proust invente-t-il dans La Recherche du Temps Perdu ?",                       ans:"Le monologue intérieur et la mémoire involontaire — un récit guidé par les sensations plutôt que par l'action.",   exp:"7 volumes, 3 000 pages, 2 000 personnages. La madeleine trempée dans le thé déclenche le récit. Proust écrivit couché, dans une chambre capitonnée. L'œuvre dura 15 ans.",                               hint:"Une madeleine trempée dans du thé suffit à faire surgir un monde — la mémoire sensorielle."},

// ── MUSIQUE ───────────────────────────────────────────────────────
{id:65, cat:"Musique",       q:"Quelle révolution Guillaume de Machaut opère-t-il dans l'histoire de la musique ?",                      ans:"Il est le premier compositeur identifié à signer une messe complète — inventant l'idée du compositeur comme auteur.", exp:"Sa Messe de Notre-Dame (vers 1365) est polyphonique à 4 voix. Avant lui, la musique médiévale était anonyme.",                                                                                          hint:"Avant lui, la musique n'avait pas d'auteur — il impose l'idée d'une création personnelle."},
{id:66, cat:"Musique",       q:"Qu'est-ce que l'Ars Nova et pourquoi l'Église le condamna-t-elle ?",                                     ans:"Style musical du XIVe s. à polyphonie complexe — jugé trop festif et sophistiqué pour la liturgie par le pape.",  exp:"L'Ars Nova abandonne le plain-chant monodique pour des harmonies sophistiquées. Machaut en est le principal représentant.",                                                                              hint:"'L'Art Nouveau' du Moyen Âge — une musique si complexe qu'elle parut sacrilège."},
{id:67, cat:"Musique",       q:"Pourquoi L'Orfeo de Monteverdi (1607) est-il considéré comme le premier opéra ?",                        ans:"Il est la première œuvre à unifier texte, musique et dramaturgie en un tout expressif — naissance du genre.",      exp:"Monteverdi utilise des instruments pour caractériser les émotions. L'orchestre de L'Orfeo comprend 40 instruments — une innovation absolue.",                                                              hint:"Pour la première fois, la musique sert l'expression dramatique d'un bout à l'autre de l'œuvre."},
{id:68, cat:"Musique",       q:"Pourquoi Les Quatre Saisons de Vivaldi sont-elles du 'baroque descriptif' ?",                             ans:"Vivaldi décrit musicalement des sons précis : coucou, orage, glace — la musique imite la nature.",                  exp:"Composées vers 1723, accompagnées de sonnets décrivant les scènes. Chaque saison est un concerto pour violon solo. Parmi les œuvres classiques les plus enregistrées.",                                  hint:"La musique reproduit des effets concrets : le tonnerre, les oiseaux, le vent froid."},
{id:69, cat:"Musique",       q:"Dans quelle tonalité est la Symphonie n°40 de Mozart et pourquoi est-elle si particulière ?",             ans:"Sol mineur — l'une des deux symphonies sombres de Mozart, perçue comme anxieuse et inhabituelle.",                  exp:"Composée en 1788 en six semaines. Elle n'a peut-être jamais été jouée du vivant de Mozart. Son premier mouvement est l'un des plus célèbres de la musique classique.",                                   hint:"Le mineur chez Mozart est rare — cette tonalité sombre révèle un compositeur angoissé."},
{id:70, cat:"Musique",       q:"Quelle innovation majeure Beethoven introduit-il dans la Symphonie n°9 ?",                                ans:"Il intègre un chœur et des solistes vocaux dans une symphonie — jamais fait avant lui.",                           exp:"La 9e (1824) fut composée alors que Beethoven était totalement sourd. L'Ode à la Joie est devenue l'hymne européen. Il dirigea la création sans entendre une note.",                                     hint:"La voix humaine dans une symphonie — une fusion inédite entre orchestre et chœur."},
{id:71, cat:"Musique",       q:"Qu'est-ce que l'impressionnisme musical incarné par Debussy ?",                                           ans:"Une musique qui suggère des atmosphères floues plutôt que des sentiments affirmés — comme une aquarelle sonore.",   exp:"Debussy abandonne la tonalité classique au profit de modes anciens. Pelléas (1902) choque par son refus du grand aria opératique — on y chante presque comme on parle.",                                  hint:"La musique suggère sans affirmer — des couleurs sonores floues, comme un tableau impressionniste."},

// ── ARCHITECTURE ──────────────────────────────────────────────────
{id:72, cat:"Architecture",  q:"À quelle divinité était dédié le Parthénon, et quel principe mathématique le régit ?",                   ans:"Athéna, déesse de la sagesse — les architectes utilisèrent le nombre d'or pour toutes les proportions.",             exp:"Construit entre -447 et -432 sur l'Acropole, ses colonnes sont légèrement inclinées pour corriger les illusions d'optique. Son fronton racontait la naissance d'Athéna.",                                hint:"La déesse protectrice d'Athènes — et des proportions mathématiquement parfaites."},
{id:73, cat:"Architecture",  q:"Quelle prouesse Sainte-Sophie représente-t-elle à sa construction en 537 ?",                              ans:"Une coupole de 31 m de diamètre à 55 m de hauteur, jamais réalisé auparavant.",                                    exp:"Construite en 5 ans par Justinien, elle fut la plus grande cathédrale du monde pendant 1 000 ans. Mosquée en 1453, musée en 1934, mosquée à nouveau en 2020.",                                           hint:"Une immense coupole qui semble 'flotter' grâce à une rangée de fenêtres à sa base."},
{id:74, cat:"Architecture",  q:"Qu'est-ce que l'architecture romane de l'Abbaye de Cluny ?",                                              ans:"Murs épais, voûtes en berceau, fenêtres étroites — à l'opposé du gothique léger et aérien.",                      exp:"Cluny III (1088–1130) fut la plus grande église chrétienne jusqu'à Saint-Pierre de Rome. Détruite à la Révolution, il n'en reste qu'un clocher.",                                                        hint:"Roman = lourd et massif, gothique = léger et lumineux — deux philosophies de la pierre."},
{id:75, cat:"Architecture",  q:"Quelle innovation technique permit à Notre-Dame de Paris de s'élever à 69 mètres ?",                     ans:"L'arc-boutant — qui reporte les poussées de la voûte vers l'extérieur, libérant les murs pour de grandes verrières.", exp:"Commencée en 1163, Notre-Dame est le modèle du gothique à son apogée. Ses 69 mètres semblaient défier les lois de la physique aux contemporains.",                                                   hint:"Ces arches extérieures spectaculaires qui 'portent' la cathédrale depuis l'extérieur."},
{id:76, cat:"Architecture",  q:"Quelle philosophie le Centre Pompidou incarne-t-il en 1977 ?",                                            ans:"Le high-tech ou architecture inside-out — toute la structure (tuyaux, escaliers, gaines) est exposée à l'extérieur.", exp:"Piano et Rogers ont retourné le bâtiment. Les tuyaux sont codés par couleur (rouge=circulation, bleu=air, jaune=électricité, vert=eau).",                                                           hint:"Tout ce qui est normalement caché — les tuyaux, les escaliers — est mis à l'extérieur."},

// ── CINÉMA ────────────────────────────────────────────────────────
{id:77, cat:"Cinéma",        q:"Pourquoi Le Voyage dans la Lune de Méliès (1902) est-il le premier film de fiction ?",                   ans:"C'est le premier film avec trucages, décors construits et une narration complète avec début, milieu et fin.",      exp:"Méliès invente le fondu, la surimpression et les effets spéciaux. Ses 14 minutes nécessitèrent 3 mois de travail. L'image de la fusée dans l'œil de la Lune est iconique.",                             hint:"Pour la première fois, un film raconte une histoire inventée avec des effets spéciaux."},
{id:78, cat:"Cinéma",        q:"Quelle révolution formelle Orson Welles opère-t-il dans Citizen Kane (1941) ?",                          ans:"La profondeur de champ totale, des angles de caméra inédits et une narration non-chronologique.",                   exp:"Welles avait 25 ans pour son premier film. Kane fut un échec commercial mais est considéré le meilleur film de l'histoire. Xanadu s'inspire de la villa de William Randolph Hearst.",                    hint:"Des plans où tout est net — plus les flashbacks comme structure narrative."},
{id:79, cat:"Cinéma",        q:"Qu'est-ce que la Nouvelle Vague dont À bout de souffle de Godard est le manifeste ?",                    ans:"Un cinéma libre, tourné en extérieur avec peu de moyens, refusant les conventions du cinéma de studio.",           exp:"Godard filme avec une caméra à main dans les rues de Paris, improvise des dialogues, utilise le jump cut. Belmondo et Seberg tournent sans répétition.",                                                  hint:"Un cinéma fait dans la rue, sans argent, qui casse toutes les règles."},
{id:80, cat:"Cinéma",        q:"Pourquoi Metropolis de Fritz Lang (1927) est-il fondateur pour la science-fiction ?",                    ans:"Il invente les codes visuels du genre : ville verticale, robots, dystopie et lutte des classes dans le futur.",    exp:"Metropolis coûta 5 millions de Reichsmarks — le film le plus cher du cinéma muet. La restauration (2010) retrouva des bobines disparues en Argentine.",                                                   hint:"La cité verticale avec les riches en haut et les ouvriers sous terre — un modèle repris 100 ans après."},

let deck=[], idx=0, flipped=false, knownSet=new Set(), reviewSet=new Set();

function filterBy(cat, btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  deck = cat==='all' ? shuffle([...ALL_CARDS]) : shuffle(ALL_CARDS.filter(c=>c.cat===cat));
  idx=0; flipped=false; knownSet.clear(); reviewSet.clear();
  updateCounters(); buildStrip(); advance();
}
function loadContent(){
  const card=deck[idx];
  document.getElementById('fc-cat').textContent  = card.cat;
  document.getElementById('fc-cat2').textContent = card.cat;
  document.getElementById('fc-q').textContent    = card.q;
  document.getElementById('fc-q2').textContent   = card.q;
  document.getElementById('fc-ans').textContent  = card.ans;
  document.getElementById('fc-exp').textContent  = card.exp||'';
  document.getElementById('fc-hint').textContent = card.hint ? '💡 ' + card.hint : '';
  const pct=(idx/deck.length)*100;
  document.getElementById('p-text').textContent=`Carte ${idx+1} / ${deck.length}`;
  document.getElementById('p-fill').style.width=pct+'%';
  document.querySelectorAll('#strip .thumb-art').forEach((el,i)=>el.classList.toggle('cur',i===idx));
}
function advance(){
  const ov=document.getElementById('overlay'),fr=document.getElementById('front'),wrap=document.getElementById('fc');
  ov.classList.add('dark');
  setTimeout(()=>{
    wrap.classList.add('no-anim'); wrap.classList.remove('flipped'); flipped=false; fr.classList.remove('iris');
    loadContent();
    requestAnimationFrame(()=>requestAnimationFrame(()=>{wrap.classList.remove('no-anim');ov.classList.remove('dark');fr.classList.add('iris');}));
  },280);
}
function flipCard(){ if(flipped){idx=(idx+1)%deck.length;advance();}else{flipped=true;document.getElementById('fc').classList.add('flipped');} }
function nextCard(){idx=(idx+1)%deck.length;advance();}
function prevCard(){idx=(idx-1+deck.length)%deck.length;advance();}
function shuffleCards(){deck=shuffle([...deck]);idx=0;flipped=false;knownSet.clear();reviewSet.clear();updateCounters();buildStrip();advance();}
function markKnown(){knownSet.add(deck[idx].id);reviewSet.delete(deck[idx].id);updateCounters();idx=(idx+1)%deck.length;advance();}
function markReview(){reviewSet.add(deck[idx].id);knownSet.delete(deck[idx].id);const c=deck.splice(idx,1)[0];deck.splice(Math.min(idx+3,deck.length),0,c);updateCounters();if(idx>=deck.length)idx=0;advance();}
function updateCounters(){document.getElementById('k-count').textContent=knownSet.size;document.getElementById('r-count').textContent=reviewSet.size;document.getElementById('rem-count').textContent=deck.length-knownSet.size-reviewSet.size;}
function buildStrip(){
  const strip=document.getElementById('strip');strip.innerHTML='';
  deck.forEach((card,i)=>{const d=document.createElement('div');d.className='thumb-art'+(i===0?' cur':'');d.textContent=card.cat.slice(0,4);d.onclick=()=>{idx=i;advance();};d.title=card.q;strip.appendChild(d);});
}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nextCard();}
  if(e.key==='ArrowLeft'){e.preventDefault();prevCard();}
  if(e.key==='Enter'){e.preventDefault();flipCard();}
  if(e.key==='k'||e.key==='K')markKnown();
  if(e.key==='r'||e.key==='R')markReview();
});
(function(){
  const c=document.getElementById('stars-canvas'),ctx=c.getContext('2d');let stars=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  function init(){resize();stars=Array.from({length:200},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.2+.15,a:Math.random()*.5+.08,speed:Math.random()*.0004+.00015,phase:Math.random()*Math.PI*2}));}
  let t=0;function draw(){t++;ctx.clearRect(0,0,c.width,c.height);for(const s of stars){const f=s.a*(.65+.35*Math.sin(t*s.speed*80+s.phase));ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,210,230,${f})`;ctx.fill();}requestAnimationFrame(draw);}
  addEventListener('resize',init);init();draw();
})();
deck=shuffle([...ALL_CARDS]);buildStrip();loadContent();
</script>
