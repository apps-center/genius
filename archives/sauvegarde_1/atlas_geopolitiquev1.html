<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Géopolitique Mondial</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05080f;--panel:#0b1120;--panel2:#0e1628;
  --star:#e8dfc4;--line:rgba(200,180,120,.15);
  --eau:#3ab4d4;--energie:#e8c040;--alim:#80c840;
  --demo:#e87040;--villes:#c070e0;--flux:#4080e0;--tensions:#e04040;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--star);font-family:'Crimson Pro',Georgia,serif;display:flex;flex-direction:column;}

/* ── TOP BAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:54px;flex-shrink:0;
  background:rgba(5,8,15,.96);border-bottom:1px solid var(--line);
  backdrop-filter:blur(12px);z-index:100;
}
.topbar-logo{font-family:'Cinzel',serif;font-size:.95rem;font-weight:900;letter-spacing:.12em;
  background:linear-gradient(135deg,#f5e6a3,#d4a843 50%,#f0c060);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  white-space:nowrap;}
.topbar-sub{font-size:.7rem;color:rgba(232,223,196,.35);letter-spacing:.18em;text-transform:uppercase;margin-left:10px;}
.topbar-nav{display:flex;gap:6px;}
.tnav{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;
  padding:6px 14px;border:1px solid rgba(200,180,120,.2);border-radius:3px;
  background:none;color:rgba(232,223,196,.5);cursor:pointer;transition:all .2s;}
.tnav:hover,.tnav.active{color:var(--star);border-color:rgba(200,180,120,.5);background:rgba(200,180,120,.08);}
.tnav.question-btn{color:#60c8a0;border-color:rgba(96,200,160,.35);}
.tnav.question-btn:hover,.tnav.question-btn.active{background:rgba(96,200,160,.1);border-color:rgba(96,200,160,.6);}

/* ── MAIN LAYOUT ── */
.app{flex:1;display:flex;overflow:hidden;}

/* ── LEFT SIDEBAR ── */
.sidebar{
  width:62px;flex-shrink:0;
  background:rgba(5,8,15,.95);border-right:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;
  padding:12px 0;gap:4px;overflow-y:auto;transition:width .25s;
}
.sys-btn{
  width:46px;height:46px;border-radius:8px;border:1px solid rgba(200,180,120,.12);
  background:none;cursor:pointer;font-size:1.3rem;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;position:relative;flex-shrink:0;
}
.sys-btn:hover,.sys-btn.active{background:rgba(200,180,120,.1);border-color:rgba(200,180,120,.4);transform:scale(1.08);}
.sys-btn .stip{
  position:absolute;left:52px;top:50%;transform:translateY(-50%);
  background:var(--panel);border:1px solid rgba(200,180,120,.3);
  border-radius:4px;padding:4px 10px;
  font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--star);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:200;
}
.sys-btn:hover .stip{opacity:1;}
.sys-divider{width:36px;height:1px;background:var(--line);margin:6px 0;flex-shrink:0;}

/* ── CENTER : MAP VIEW ── */
.center{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}

/* MAP */
#map-view{flex:1;position:relative;overflow:hidden;}
#world-svg{width:100%;height:100%;display:block;}
.country-path{fill:#1a2540;stroke:#0b1120;stroke-width:.5;cursor:pointer;transition:fill .2s;}
.country-path:hover{fill:#2a3a60;}
.country-path.highlighted{fill:#2a4070;}
.country-path.active-country{stroke-width:1.5;}

.map-overlay{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;}
.map-title{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(232,223,196,.4);background:rgba(5,8,15,.7);padding:5px 12px;border-radius:3px;backdrop-filter:blur(4px);}
.map-controls{display:flex;gap:6px;pointer-events:all;}
.map-btn{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;
  border:1px solid rgba(200,180,120,.2);border-radius:3px;background:rgba(5,8,15,.8);
  color:rgba(232,223,196,.5);cursor:pointer;transition:all .2s;backdrop-filter:blur(4px);}
.map-btn:hover,.map-btn.active{color:var(--star);border-color:rgba(200,180,120,.5);}

/* HOTSPOTS */
.hotspot{position:absolute;cursor:pointer;transform:translate(-50%,-50%);z-index:10;}
.hotspot-dot{width:10px;height:10px;border-radius:50%;border:2px solid rgba(255,255,255,.6);
  animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.3);}50%{box-shadow:0 0 0 8px rgba(255,255,255,.0);}}
.hotspot-label{position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;
  background:rgba(5,8,15,.85);padding:2px 7px;border-radius:2px;opacity:0;transition:opacity .15s;}
.hotspot:hover .hotspot-label{opacity:1;}

/* ── RIGHT PANEL ── */
.right-panel{
  width:0;flex-shrink:0;overflow:hidden;
  background:var(--panel);border-left:1px solid var(--line);
  transition:width .3s ease;display:flex;flex-direction:column;
}
.right-panel.open{width:380px;}
.panel-inner{width:380px;height:100%;overflow-y:auto;padding:20px;}

.panel-close{position:absolute;top:12px;right:12px;background:none;border:none;
  color:rgba(232,223,196,.35);font-size:1.1rem;cursor:pointer;padding:4px 8px;border-radius:3px;
  transition:color .2s;}
.panel-close:hover{color:var(--star);}

/* Panel content */
.p-icon{font-size:2rem;margin-bottom:8px;display:block;}
.p-tag{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;
  padding:2px 8px;border-radius:2px;margin-bottom:10px;border:1px solid;display:inline-block;opacity:.7;}
.p-title{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:900;line-height:1.2;margin-bottom:6px;}
.p-question{font-size:.88rem;color:rgba(232,223,196,.55);font-style:italic;margin-bottom:16px;
  padding-bottom:14px;border-bottom:1px solid var(--line);}

.p-section{margin-bottom:16px;}
.p-section-title{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.24em;
  text-transform:uppercase;opacity:.38;margin-bottom:10px;}

.stat-row{display:flex;gap:8px;margin-bottom:12px;}
.stat-box{flex:1;text-align:center;padding:10px 6px;background:rgba(255,255,255,.03);
  border:1px solid var(--line);border-radius:4px;}
.stat-val{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;line-height:1;}
.stat-label{font-size:.65rem;color:rgba(232,223,196,.45);margin-top:4px;line-height:1.3;}

.tension-item{padding:10px 12px;border-radius:4px;margin-bottom:8px;
  background:rgba(255,255,255,.03);border-left:3px solid;cursor:pointer;transition:background .2s;}
.tension-item:hover{background:rgba(255,255,255,.06);}
.tension-title{font-family:'Cinzel',serif;font-size:.75rem;font-weight:700;margin-bottom:3px;}
.tension-desc{font-size:.78rem;color:rgba(232,223,196,.6);line-height:1.45;font-style:italic;}

.actor-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px;}
.actor-chip{font-size:.65rem;padding:3px 9px;border-radius:12px;
  background:rgba(255,255,255,.04);border:1px solid rgba(200,180,120,.18);
  color:rgba(232,223,196,.7);}

.scenario-row{display:flex;gap:8px;margin-top:10px;}
.scenario-box{flex:1;padding:10px;border-radius:4px;border:1px solid;}
.scenario-label{font-family:'Cinzel',serif;font-size:.62rem;font-weight:700;margin-bottom:5px;}
.scenario-desc{font-size:.74rem;line-height:1.45;color:rgba(232,223,196,.65);}

.case-item{padding:10px 12px;background:rgba(255,255,255,.03);border-radius:4px;
  margin-bottom:8px;border:1px solid var(--line);}
.case-title{font-family:'Cinzel',serif;font-size:.75rem;font-weight:700;margin-bottom:4px;}
.case-desc{font-size:.76rem;color:rgba(232,223,196,.6);line-height:1.45;}

.link-chips{display:flex;gap:6px;flex-wrap:wrap;}
.link-chip{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;
  padding:4px 11px;border-radius:12px;border:1px solid;cursor:pointer;
  background:none;transition:all .2s;}
.link-chip:hover{opacity:.8;}

/* Country panel */
.country-dep{display:flex;flex-direction:column;gap:5px;}
.dep-item{font-size:.78rem;padding:5px 10px;background:rgba(255,255,255,.03);
  border-radius:3px;border-left:2px solid rgba(232,220,100,.3);color:rgba(232,223,196,.75);}
.vuln-item{font-size:.78rem;padding:5px 10px;background:rgba(232,80,60,.05);
  border-radius:3px;border-left:2px solid rgba(232,80,60,.35);color:rgba(232,223,196,.75);}
.role-item{font-size:.78rem;padding:5px 10px;background:rgba(96,200,160,.05);
  border-radius:3px;border-left:2px solid rgba(96,200,160,.35);color:rgba(232,223,196,.75);}

/* ── BOTTOM BAR (system selector strip) ── */
.bottom-strip{
  height:60px;flex-shrink:0;
  background:rgba(5,8,15,.95);border-top:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;gap:6px;padding:0 16px;
  overflow-x:auto;
}
.sys-pill{
  display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:20px;
  border:1px solid rgba(200,180,120,.15);background:none;cursor:pointer;
  transition:all .2s;flex-shrink:0;white-space:nowrap;
}
.sys-pill:hover,.sys-pill.active{border-color:rgba(200,180,120,.45);background:rgba(200,180,120,.08);}
.sys-pill .spi{font-size:1rem;}
.sys-pill .spl{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(232,223,196,.6);}
.sys-pill.active .spl{color:var(--star);}

/* ── QUESTION MODE ── */
#question-view{
  position:absolute;inset:0;background:rgba(5,8,15,.97);
  backdrop-filter:blur(16px);z-index:50;display:none;
  flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;overflow-y:auto;
}
#question-view.open{display:flex;}
.qv-title{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:900;margin-bottom:6px;
  background:linear-gradient(135deg,#f5e6a3,#d4a843);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;}
.qv-sub{font-size:.78rem;color:rgba(232,223,196,.38);letter-spacing:.12em;text-transform:uppercase;margin-bottom:36px;}
.q-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;max-width:900px;width:100%;}
.q-card{padding:18px 20px;background:var(--panel);border:1px solid rgba(200,180,120,.18);
  border-radius:6px;cursor:pointer;transition:all .22s;text-align:left;}
.q-card:hover{border-color:rgba(200,180,120,.45);background:var(--panel2);transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,.4);}
.q-card-q{font-family:'Cinzel',serif;font-size:.85rem;font-weight:700;margin-bottom:8px;line-height:1.3;}
.q-card-t{font-size:.78rem;color:rgba(232,223,196,.5);font-style:italic;line-height:1.45;}
.q-card-arrow{margin-top:12px;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;opacity:.4;}

/* ── FIL ROUGE ── */
.fil-rouge{
  position:absolute;bottom:70px;left:70px;right:0;
  pointer-events:none;z-index:5;
}
.fr-chain{display:flex;align-items:center;gap:0;padding:8px 16px;
  background:rgba(5,8,15,.85);border-top:1px solid var(--line);backdrop-filter:blur(8px);
  overflow-x:auto;pointer-events:all;
}
.fr-node{font-size:.68rem;letter-spacing:.08em;padding:3px 8px;border-radius:3px;
  border:1px solid;cursor:pointer;white-space:nowrap;transition:all .18s;}
.fr-node:hover{opacity:.8;}
.fr-arrow{color:rgba(232,223,196,.25);margin:0 4px;font-size:.7rem;}
.fr-label{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(232,223,196,.28);margin-right:12px;flex-shrink:0;}

/* ── STARS ── */
#stars-bg{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(200,180,120,.2);border-radius:2px;}

@media(max-width:700px){
  .right-panel.open{width:100%;position:absolute;inset:0;z-index:40;}
  .topbar-sub{display:none;}
  .sidebar{width:0;overflow:hidden;}
  .bottom-strip{gap:4px;}
  .sys-pill .spl{display:none;}
  .sys-pill{padding:8px 10px;}
}
</style>
</head>
<body>

<canvas id="stars-bg"></canvas>

<!-- TOP BAR -->
<div class="topbar">
  <div style="display:flex;align-items:baseline;gap:0">
    <span class="topbar-logo">Atlas Géopolitique Mondial</span>
    <span class="topbar-sub">Ressources · Flux · Tensions · Transitions</span>
  </div>
  <div class="topbar-nav">
    <button class="tnav active" onclick="showView('map')" id="btn-map">🗺️ Carte</button>
    <button class="tnav question-btn" onclick="showView('questions')" id="btn-q">❓ Questions</button>
    <button class="tnav" onclick="window.open('chronologie_historique.html')" style="color:rgba(212,168,67,.7);border-color:rgba(212,168,67,.2)">⏳ Chronologie</button>
  </div>
</div>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div id="sys-btns"></div>
    <div class="sys-divider"></div>
    <button class="sys-btn" onclick="showView('questions')" title="Questions">
      <span>❓</span>
      <span class="stip">Mode Questions</span>
    </button>
  </div>

  <!-- CENTER -->
  <div class="center">

    <!-- MAP VIEW -->
    <div id="map-view">
      <svg id="world-svg" viewBox="0 0 960 500"></svg>
      <div class="map-overlay">
        <span class="map-title" id="map-title">Vue globale — cliquez sur un système ou un pays</span>
        <div class="map-controls">
          <button class="map-btn active" onclick="setMapMode('global')" id="mbtn-global">Monde</button>
          <button class="map-btn" onclick="setMapMode('stress')" id="mbtn-stress">Stress hydrique</button>
          <button class="map-btn" onclick="setMapMode('demo')" id="mbtn-demo">Démographie</button>
          <button class="map-btn" onclick="setMapMode('energy')" id="mbtn-energy">Énergie</button>
        </div>
      </div>
      <!-- Fil rouge -->
      <div class="fil-rouge" id="fil-rouge" style="display:none">
        <div class="fr-chain" id="fr-chain"></div>
      </div>
    </div>

    <!-- BOTTOM STRIP -->
    <div class="bottom-strip" id="bottom-strip"></div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel" id="right-panel">
    <div class="panel-inner" id="panel-inner"></div>
  </div>

</div>

<!-- QUESTION VIEW -->
<div id="question-view">
  <div class="qv-title">❓ Questions Géopolitiques</div>
  <div class="qv-sub">Choisissez une question pour explorer le système</div>
  <div class="q-grid" id="q-grid"></div>
  <button class="map-btn" style="margin-top:28px;pointer-events:all" onclick="showView('map')">← Retour à la carte</button>
</div>

<script>
const GEO = {"systems":[{"id":"eau","icon":"🌊","color":"#3ab4d4","title":"Eau & Climat","question":"Qui manquera d'eau en 2050 ?","intro":"L'eau douce représente 2,5 % de l'eau sur Terre. 70 % est captive des glaciers. Moins de 1 % est accessible à l'humanité. Pourtant, l'agriculture en consomme 70 %, l'industrie 20 %, les ménages 10 %.","stats":[{"val":"2,2 Md","label":"humains sans eau potable sûre"},{"val":"+55 %","label":"hausse de la demande mondiale d'ici 2050"},{"val":"40 %","label":"de la population mondiale en stress hydrique d'ici 2030"}],"actors":["États riverains","Banque Mondiale","FAO","Multinationales de l'eau (Veolia, Suez)","Agriculteurs","ONG Water Aid"],"tensions":[{"title":"Nil : Éthiopie vs Égypte","desc":"Le barrage GERD d'Éthiopie menace le débit du Nil. L'Égypte dépend à 95 % du Nil. Une crise diplomatique majeure, potentiellement militaire."},{"title":"Mékong : Chine vs Asie du Sud-Est","desc":"La Chine a construit 11 barrages sur le Mékong, réduisant les débits vers le Cambodge, le Laos, la Thaïlande et le Vietnam. Sécurité alimentaire de 60 millions de personnes menacée."},{"title":"Aquifère d'Arabie : surexploitation","desc":"L'Arabie Saoudite pompe des nappes fossiles vieilles de 20 000 ans pour l'agriculture. Réserves estimées à 75 ans. Aucune recharge possible."}],"scenarios":[{"label":"Optimiste 2050","color":"#40c880","desc":"Accords de gestion transfrontalière, dessalement solaire, agriculture sèche. 90 % de la population mondiale avec accès sécurisé."},{"label":"Pessimiste 2050","color":"#e84040","desc":"3 milliards d'humains en stress hydrique sévère. Premières guerres officiellement liées à l'eau. Exodes massifs des zones arides."}],"cases":[{"title":"Singapour — Zéro dépendance","flag":"🇸🇬","desc":"Singapour importe 60 % de son eau de Malaisie mais vise l'indépendance totale via le recyclage des eaux usées (NEWater) et le dessalement. Modèle mondial de sobriété hydrique."},{"title":"Aral — La mer disparue","flag":"🌍","desc":"La mer d'Aral (Asie centrale) a perdu 90 % de sa surface en 50 ans à cause de l'irrigation soviétique intensive. Catastrophe écologique, économique et sanitaire sans précédent."}],"links":["energie","alimentation","demographie"]},{"id":"energie","icon":"⚡","color":"#e8c040","title":"Énergie & Minerais","question":"Qui contrôle les minerais de la transition énergétique ?","intro":"La transition vers les énergies renouvelables ne réduit pas les dépendances aux matières premières — elle les déplace. Du pétrole vers le lithium, le cobalt, le cuivre, les terres rares. De nouveaux monopoles remplacent les anciens.","stats":[{"val":"60 %","label":"du cobalt mondial extrait en RDC"},{"val":"85 %","label":"des terres rares transformées en Chine"},{"val":"1 500 %","label":"hausse de la demande en lithium d'ici 2040"}],"actors":["OPEP+","Chine (CATL, BYD)","Tesla, Volkswagen","Glencore, Rio Tinto","Banques de développement","Communautés minières"],"tensions":[{"title":"Triangle du lithium : Chili, Argentine, Bolivie","desc":"70 % des réserves mondiales de lithium se trouvent dans ces 3 pays. La Chine rachète les mines. Les États-Unis et l'Europe tentent de contre-investir. Enjeu stratégique de la décennie."},{"title":"Terres rares : dépendance occidentale","desc":"L'Occident dépend à 85-90 % de la Chine pour le traitement des terres rares (néodyme, dysprosium...) utilisées dans les éoliennes et les moteurs électriques. Une dépendance structurelle."},{"title":"Gaz naturel : Europe post-Ukraine","desc":"L'invasion de l'Ukraine a exposé la dépendance européenne au gaz russe (40 % des imports). Réorientation vers le GNL américain, qatari, algérien. Un réassemblage géopolitique en cours."}],"scenarios":[{"label":"Optimiste 2050","color":"#40c880","desc":"Diversification des chaînes d'approvisionnement, recyclage des batteries, fusion nucléaire commerciale. Souveraineté énergétique démocratisée."},{"label":"Pessimiste 2050","color":"#e84040","desc":"Course aux minerais critiques incontrôlée, conflits en Afrique centrale, nouvelles dépendances aussi fortes que le pétrole. La transition renforce les inégalités géopolitiques."}],"cases":[{"title":"RDC — Richesse sans développement","flag":"🇨🇩","desc":"La RDC possède 70 % du cobalt mondial, des réserves colossales de cuivre et de coltan. Pourtant, 75 % de la population vit sous le seuil de pauvreté. Paradoxe des ressources (Resource Curse)."},{"title":"Norvège — Le fonds souverain","flag":"🇳🇴","desc":"La Norvège a transformé ses revenus pétroliers en fonds souverain de 1 400 milliards de dollars — le plus grand au monde. Un modèle de gestion intergénérationnelle des ressources."}],"links":["eau","tensions","transitions"]},{"id":"alimentation","icon":"🌾","color":"#80c840","title":"Alimentation & Sols","question":"Peut-on nourrir 10 milliards d'humains durablement ?","intro":"L'agriculture utilise 70 % de l'eau douce mondiale, 50 % des terres habitables et génère 25 % des émissions de gaz à effet de serre. Le système alimentaire mondial est à la fois la plus grande menace écologique et la première nécessité humaine.","stats":[{"val":"820 M","label":"personnes en situation de faim chronique"},{"val":"33 %","label":"des sols mondiaux dégradés ou épuisés"},{"val":"4 pays","label":"produisent 70 % des exportations mondiales de blé"}],"actors":["FAO","PAM","Cargill, ADM, Bunge (Big Food)","Monsanto-Bayer","Petits agriculteurs (70 % des aliments mondiaux)","Fonds d'investissement fonciers"],"tensions":[{"title":"Accaparement des terres (Land Grabbing)","desc":"Des fonds souverains (Chine, Émirats, Qatar) et des multinationales achètent des millions d'hectares en Afrique, en Asie et en Amérique latine. Les communautés locales sont expropriées."},{"title":"Guerre en Ukraine : crise du blé mondial","desc":"Ukraine et Russie fournissent 30 % du blé mondial. Le blocus de 2022 a déclenché une crise alimentaire en Afrique du Nord et au Moyen-Orient. La géopolitique décide qui mange."},{"title":"Déforestation amazonienne","desc":"80 % de la déforestation amazonienne est liée à l'élevage bovin et au soja (alimentation animale). Le Brésil est le premier exportateur mondial de viande — et le premier déforesteur."}],"scenarios":[{"label":"Optimiste 2050","color":"#40c880","desc":"Agroécologie à grande échelle, réduction du gaspillage (1/3 de la production mondiale), protéines alternatives, régimes alimentaires décarbonés. Sécurité alimentaire universelle possible."},{"label":"Pessimiste 2050","color":"#e84040","desc":"Dégradation des sols accélérée, sécheresses chroniques, chocs de prix alimentaires répétés. 2 milliards de personnes en insécurité alimentaire sévère."}],"cases":[{"title":"Pays-Bas — L'agriculture ultra-intensive","flag":"🇳🇱","desc":"Les Pays-Bas sont le 2ème exportateur mondial de produits agricoles (après les USA) sur un territoire grand comme la Bretagne. Une prouesse technologique — mais aussi l'un des pays avec la plus forte pollution aux nitrates d'Europe."},{"title":"Éthiopie — Le tigre africain de l'agriculture","flag":"🇪🇹","desc":"L'Éthiopie a quadruplé sa production agricole en 20 ans grâce à l'irrigation. Mais elle reste vulnérable aux sécheresses (El Niño) et dépendante d'aides extérieures en année sèche."}],"links":["eau","demographie","transitions"]},{"id":"demographie","icon":"👥","color":"#e87040","title":"Démographie & Migrations","question":"Où la pression humaine va-t-elle exploser ?","intro":"En 2100, la Terre abritera 10 à 12 milliards d'humains — presque tous la croissance venant d'Afrique subsaharienne. Pendant ce temps, l'Europe et la Chine vieillissent et se dépopulent. Deux planètes démographiques coexistent.","stats":[{"val":"8,2 Md","label":"d'humains aujourd'hui (2024)"},{"val":"2,5 Md","label":"d'Africains prévus en 2050"},{"val":"100 M","label":"de migrants climatiques d'ici 2050 (Banque Mondiale)"}],"actors":["UNHCR","OIM (migrants)","Frontex (UE)","Gouvernements nationaux","Diasporas","Passeurs et réseaux clandestins"],"tensions":[{"title":"Sahel : la poudrière démographique","desc":"Le Sahel (Niger, Mali, Burkina Faso...) est la région au taux de fécondité le plus élevé du monde (6-7 enfants/femme) + stress hydrique + insécurité alimentaire + instabilité politique. Une crise humanitaire en cours."},{"title":"Chine : la bombe du vieillissement","desc":"La Chine a perdu de la population en 2022 pour la première fois depuis 1961. Le ratio actifs/retraités s'effondre. La politique de l'enfant unique (1980-2015) aura des conséquences structurelles pendant 50 ans."},{"title":"Méditerranée : le mur de l'Europe","desc":"Entre 2014 et 2024, plus de 30 000 personnes ont péri en Méditerranée. L'UE externalise sa frontière vers le Maroc, la Tunisie, la Turquie. Une géopolitique de l'abandon organisé."}],"scenarios":[{"label":"Optimiste 2050","color":"#40c880","desc":"Dividende démographique africain bien géré, migrations ordonnées comblant les déficits démographiques européens, transition éducative accélérant la baisse de fécondité."},{"label":"Pessimiste 2050","color":"#e84040","desc":"100 à 200 millions de déplacés climatiques, fermeture des frontières, radicalisation politique, vieillissement non financé en Europe et en Asie orientale."}],"cases":[{"title":"Niger — Le pays le plus jeune du monde","flag":"🇳🇪","desc":"L'âge médian au Niger est 15 ans. 50 % de la population a moins de 15 ans. Avec un taux de fécondité de 7, la population doublera d'ici 2040. Les infrastructures, l'éducation et l'emploi ne suivent pas."},{"title":"Japon — Le modèle du vieillissement extrême","flag":"🇯🇵","desc":"Le Japon perd 500 000 habitants par an. 30 % de la population a plus de 65 ans. 10 millions de maisons abandonnées (akiya). Un laboratoire mondial du vieillissement non choisi."}],"links":["villes","alimentation","tensions"]},{"id":"villes","icon":"🏙️","color":"#c070e0","title":"Villes & Habitat","question":"Comment les mégapoles absorbent-elles les chocs du XXIe siècle ?","intro":"En 1800, 3 % de l'humanité vivait en ville. Aujourd'hui : 57 %. En 2050 : 70 %. La ville est devenue le format dominant de l'existence humaine. Mais la moitié de la croissance urbaine mondiale se fait dans des bidonvilles.","stats":[{"val":"1,1 Md","label":"d'humains vivent dans des bidonvilles"},{"val":"33","label":"mégapoles de plus de 10 millions d'habitants"},{"val":"70 %","label":"des émissions mondiales de CO₂ viennent des villes"}],"actors":["Maires (C40 Cities)","Promoteurs immobiliers","Banque Mondiale (urbanisme)","ONU-Habitat","Habitants des slums","Architectes et urbanistes"],"tensions":[{"title":"Lagos 2050 : 30 millions sans plan","desc":"Lagos pourrait devenir la plus grande métropole mondiale avec 30 à 35 millions d'habitants en 2050. Elle manque déjà d'eau, de transports, d'électricité. La croissance urbaine non planifiée comme défi majeur du siècle."},{"title":"Miami : la ville qui coule","desc":"Miami repose sur du calcaire poreux. La montée des eaux s'infiltre par le bas. L'imperméabilisation du sol accélère les inondations. La Floride investit 4 milliards dans la résilience — mais déjà trop tard pour certains quartiers."},{"title":"Ségrégation urbaine et gentrification","desc":"Dans les grandes métropoles mondiales (London, Paris, San Francisco, Mumbai), les centres se gentrifient et expulsent les classes populaires en périphérie. La ville devient une machine à inégalités spatiales."}],"scenarios":[{"label":"Optimiste 2050","color":"#40c880","desc":"Villes compactes, mixtes, vertes. Transport décarbonés. Logement abordable. Résilience climatique intégrée. Le modèle Copenhagen/Amsterdam généralisé."},{"label":"Pessimiste 2050","color":"#e84040","desc":"Métropolisation chaotique, bidonvilles incontrôlables, chaleur extrême, inondations répétées. 2 milliards d'urbains pauvres sans filet de sécurité."}],"cases":[{"title":"Medellín — La ville la plus innovante du monde","flag":"🇨🇴","desc":"En 1993, Medellín était la ville la plus meurtrière du monde (Pablo Escobar). En 2013, elle reçoit le prix de la ville la plus innovante. Télécabines, escalators dans les quartiers pauvres, bibliothèques urbaines. Un modèle de transformation."},{"title":"Singapour — La ville-État jardin","flag":"🇸🇬","desc":"Singapour est à la fois la ville la plus dense et la plus verte d'Asie. Toitures végétalisées obligatoires, intégration de la nature dans l'architecture, gestion de l'eau parfaite. Un modèle coûteux mais reproductible."}],"links":["demographie","eau","transitions"]},{"id":"flux","icon":"🚢","color":"#4080e0","title":"Flux & Commerce Mondial","question":"Quels détroits peuvent paralyser l'économie mondiale ?","intro":"90 % des marchandises mondiales voyagent par mer. Six détroits stratégiques peuvent bloquer le commerce mondial. Chaque jour, 15 millions de barils de pétrole passent par Ormuz. La mondialisation repose sur quelques goulets d'étranglement.","stats":[{"val":"90 %","label":"du commerce mondial transporté par mer"},{"val":"6","label":"détroits peuvent bloquer 60 % du commerce mondial"},{"val":"800 M","label":"de conteneurs EVP transportés par an"}],"actors":["Maersk, MSC, CMA-CGM (3 groupes = 50 % des conteneurs)","OMC","Autorités portuaires (Shanghaï, Rotterdam, Singapour)","Marines nationales","Pirates (golfe de Guinée, Aden)"],"tensions":[{"title":"Ormuz : le robinet du pétrole mondial","desc":"Le détroit d'Ormuz (34 km) est traversé par 20 % du pétrole mondial. L'Iran menace régulièrement de le fermer. Une crise iranienne pourrait multiplier par 3 le prix du pétrole en 48 heures."},{"title":"Suez : la cicatrice de l'Ever Given","desc":"En mars 2021, un porte-conteneurs bloqua le canal de Suez 6 jours. Coût : 9 milliards de dollars par jour. La fragilité des chaînes logistiques mondiales révélée en direct."},{"title":"Mer de Chine méridionale : la revendication totale","desc":"La Chine revendique 90 % de la Mer de Chine méridionale (ligne des 9 traits). 5 000 milliards de dollars de commerce y transitent chaque année. Vietnam, Philippines, Malaisie contestent. Les USA patrouillent."}],"scenarios":[{"label":"Optimiste 2050","color":"#40c880","desc":"Diversification des routes (Arctique, nouvelles lignes trans-africaines), relocalisation de certaines productions, résilience logistique. Le monde apprend de l'Ever Given."},{"label":"Pessimiste 2050","color":"#e84040","desc":"Fragmentation du commerce mondial en blocs régionaux rivaux, piraterie en hausse, fermetures de détroits lors de conflits. La mondialisation se fracture."}],"cases":[{"title":"Rotterdam — La porte de l'Europe","flag":"🇳🇱","desc":"Rotterdam est le plus grand port d'Europe. 470 millions de tonnes de marchandises par an. 40 % des imports énergétiques européens y transitent. La transition vers le GNL américain post-Ukraine y est parfaitement visible."},{"title":"Route de la Soie Maritme — L'OBOR chinois","flag":"🇨🇳","desc":"La Chine investit dans des ports du monde entier (Pakistan, Sri Lanka, Tanzanie, Grèce-Pirée). Une stratégie de contrôle des flux mondiaux qui inquiète les USA et l'Europe."}],"links":["energie","tensions","alimentation"]},{"id":"tensions","icon":"⚔️","color":"#e04040","title":"Tensions & Gouvernance","question":"Qui contrôle, qui conteste, qui arbitre ?","intro":"La géopolitique du XXIe siècle n'est plus seulement la géopolitique des États — c'est la géopolitique des ressources, des données, des routes et des normes. De nouveaux acteurs (entreprises tech, fonds souverains, villes) contestent la souveraineté des États.","stats":[{"val":"55+","label":"conflits armés actifs dans le monde (2024)"},{"val":"117 M","label":"de déplacés forcés dans le monde"},{"val":"3","label":"pays possèdent 80 % des armes nucléaires mondiales"}],"actors":["P5 (USA, Chine, Russie, France, UK)","OTAN","BRICS+","ONU (Conseil de sécurité)","Entreprises tech (Meta, Google, Huawei)","Milices non-étatiques"],"tensions":[{"title":"Rivalité USA-Chine : le découplage technologique","desc":"Les USA bloquent l'accès de la Chine aux semi-conducteurs avancés (TSMC, NVIDIA). La Chine riposte sur les terres rares. Une guerre froide technologique remodèle les alliances mondiales."},{"title":"Russie-Ukraine : le retour des guerres territoriales","desc":"Le conflit en Ukraine (2022-) a brisé l'ordre de sécurité européen post-1991. Il remet en cause les frontières, le droit international, les garanties de sécurité. Un précédent pour Taiwan, la Corée, l'Arctique."},{"title":"Sahel : la fin de la sphère d'influence française","desc":"Entre 2020 et 2023, 4 pays du Sahel (Mali, Burkina Faso, Niger, Tchad) ont connu des coups d'État. La France a été expulsée de 3 d'entre eux. La Russie (Wagner) et la Chine avancent leurs pions."}],"scenarios":[{"label":"Optimiste 2050","color":"#40c880","desc":"Multilatéralisme réformé, gouvernance globale des biens communs (eau, climat, espace), réduction des arsenaux nucléaires, diplomatie climatique comme ciment coopératif."},{"label":"Pessimiste 2050","color":"#e84040","desc":"Monde bipolaire USA-Chine fragmenté, course aux armements dans l'espace et le cyber, effondrement de l'ONU comme arbitre, conflits de ressources endémiques."}],"cases":[{"title":"Taiwan — L'île qui vaut 3 000 milliards","flag":"🇹🇼","desc":"TSMC fabrique 90 % des puces les plus avancées du monde. Une invasion de Taiwan par la Chine provoquerait une pénurie mondiale de semi-conducteurs estimée à 3 000 milliards de dollars de pertes en 2 ans. La géopolitique des puces."},{"title":"Arctique — Le nouveau Far West","flag":"🌍","desc":"La fonte de l'Arctique ouvre de nouvelles routes maritimes et révèle des ressources (pétrole, gaz, minerais). Russie, USA, Canada, Danemark (via Groenland) et Chine se disputent cette nouvelle frontière."}],"links":["energie","flux","eau"]}],"questions":[{"q":"Qui va manquer d'eau en 2050 ?","system":"eau","teaser":"La réponse dépend à la fois du climat, de l'agriculture et de la géopolitique des fleuves transfrontaliers."},{"q":"Pourquoi la guerre en Ukraine a-t-elle fait monter le prix du pain GEO.systems.forEach(s=>{

});

// ── Build question grid ──
const qg=document.getElementById('q-grid');
GEO.questions.forEach(q=>{
  const sys=GEO.systems.find(s=>s.id===q.system)||{};
  const card=document.createElement('div');card.className='q-card';
  card.style.borderLeftColor=sys.color||'#e8dfc4';
  card.style.borderLeftWidth='3px';
  card.innerHTML=`<div class="q-card-q">${sys.icon||''} ${q.q}</div>
    <div class="q-card-t">${q.teaser}</div>
    <div class="q-card-arrow">Explorer → ${sys.title||''}</div>`;
  card.addEventListener('click',()=>{openSystem(q.system);showView('map');});
  qg.appendChild(card);
});

const worldSVG = document.getElementById('world-svg');

// Draw graticule lines
function drawGraticule(){
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('stroke','rgba(200,220,255,0.06)');g.setAttribute('stroke-width','.5');g.setAttribute('fill','none');
  for(let lon=-180;lon<=180;lon+=30){const x=((lon+180)/360)*960;const l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',x);l.setAttribute('y1',0);l.setAttribute('x2',x);l.setAttribute('y2',500);g.appendChild(l);}
  for(let lat=-90;lat<=90;lat+=30){const y=((90-lat)/180)*500;const l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',0);l.setAttribute('y1',y);l.setAttribute('x2',960);l.setAttribute('y2',y);g.appendChild(l);}
  worldSVG.appendChild(g);
}
drawGraticule();

// Ocean background
const ocean=document.createElementNS('http://www.w3.org/2000/svg','rect');
ocean.setAttribute('width','960');ocean.setAttribute('height','500');
ocean.setAttribute('fill','#0a1525');ocean.setAttribute('rx','0');
worldSVG.insertBefore(ocean,worldSVG.firstChild);

// Equator & Tropics
function addLatLine(lat,dash,color){
  const y=((90-lat)/180)*500;
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',0);l.setAttribute('y1',y);l.setAttribute('x2',960);l.setAttribute('y2',y);
  l.setAttribute('stroke',color);l.setAttribute('stroke-width','.8');
  if(dash)l.setAttribute('stroke-dasharray','4,4');
  worldSVG.appendChild(l);
}

// Tooltip
const tooltip=document.createElement('div');
tooltip.style.cssText='position:absolute;z-index:20;background:rgba(8,14,28,.92);border:1px solid rgba(200,180,120,.35);border-radius:4px;padding:6px 12px;pointer-events:none;opacity:0;transition:opacity .15s;font-family:Cinzel,serif;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:#e8dfc4;backdrop-filter:blur(6px);';

function showTooltip(c,poly){
  const hasFiche=GEO.countries[c.id];
  tooltip.innerHTML=`${c.name}<span style="color:rgba(232,223,196,.35);margin-left:8px;font-size:.55rem">${hasFiche?'Cliquer pour la fiche':'→'}</span>`;
  tooltip.style.opacity='1';
  document.getElementById('map-view').addEventListener('mousemove',moveTooltip);
}
function moveTooltip(e){
  const r=document.getElementById('map-view').getBoundingClientRect();
  tooltip.style.left=(e.clientX-r.left+12)+'px';
  tooltip.style.top=(e.clientY-r.top-28)+'px';
}
function hideTooltip(){tooltip.style.opacity='0';document.getElementById('map-view').removeEventListener('mousemove',moveTooltip);}

// Hotspots
const hsGroup=document.createElementNS('http://www.w3.org/2000/svg','g');
worldSVG.appendChild(hsGroup);
HOTSPOTS.forEach(h=>{
  const x=(h.x/100)*960, y=(h.y/100)*500;
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.style.cursor='pointer';
  // Outer pulse ring
  const ring=document.createElementNS('http://www.w3.org/2000/svg','circle');
  ring.setAttribute('cx',x);ring.setAttribute('cy',y);ring.setAttribute('r',8);
  ring.setAttribute('fill','none');ring.setAttribute('stroke',h.color);ring.setAttribute('stroke-width',1);ring.setAttribute('opacity',.4);
  // Inner dot
  const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
  dot.setAttribute('cx',x);dot.setAttribute('cy',y);dot.setAttribute('r',4);
  dot.setAttribute('fill',h.color);dot.setAttribute('opacity',.85);
  // Label
  const label=document.createElementNS('http://www.w3.org/2000/svg','text');
  label.setAttribute('x',x+9);label.setAttribute('y',y+1);label.setAttribute('font-size',7);
  label.setAttribute('fill',h.color);label.setAttribute('opacity',.7);label.setAttribute('font-family','Cinzel,serif');
  label.textContent=h.label;
  g.appendChild(ring);g.appendChild(dot);g.appendChild(label);
  g.addEventListener('click',()=>openSystem(h.system));
  hsGroup.appendChild(g);
});

  const mx=(x1+x2)/2, my=Math.min(y1,y2)-30;

  line.setAttribute('fill','none');line.setAttribute('stroke',r.color);line.setAttribute('stroke-width',1.5);
  line.setAttribute('stroke-dasharray','6,4');
  routeGroup.appendChild(line);
});

// ── Map modes ──
let currentMode='global';
function setMapMode(mode){
  currentMode=mode;
  document.querySelectorAll('.map-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mbtn-'+mode)?.classList.add('active');
  const colors=COUNTRY_COLORS[mode]||{};
  document.querySelectorAll('.country-path').forEach(p=>{
    const id=p.dataset.id;
    p.setAttribute('fill',colors[id]||'#1a2540');
  });
  const titles={global:'Vue globale — cliquez sur un système ou un pays',stress:'Stress hydrique mondial',demo:'Pressions démographiques',energy:'Dépendances énergétiques'};
  document.getElementById('map-title').textContent=titles[mode]||'';
}

function showView(v){
  document.getElementById('question-view').classList.toggle('open',v==='questions');
  document.getElementById('btn-map').classList.toggle('active',v==='map');
  document.getElementById('btn-q').classList.toggle('active',v==='questions');
}

// ── Open system ──
let currentSystem=null;
function openSystem(id){
  const sys=GEO.systems.find(s=>s.id===id);if(!sys)return;
  currentSystem=id;
  // update UI
  document.querySelectorAll('.sys-btn,.sys-pill').forEach(b=>{
    b.classList.toggle('active',b.dataset.id===id);
  });
  // highlight countries on map
  document.querySelectorAll('.country-path').forEach(p=>p.classList.remove('active-country'));
  // Render panel
  const c=sys.color;
  let html=`
    <div style="position:relative">
      <button class="panel-close" onclick="closePanel()">✕</button>
      <span class="p-icon">${sys.icon}</span>
      <div class="p-tag" style="color:${c};border-color:${c};background:${c}18">${sys.title}</div>
      <div class="p-title" style="color:${c}">${sys.title}</div>
      <div class="p-question">${sys.question}</div>
      <p style="font-size:.82rem;line-height:1.58;color:rgba(232,223,196,.72);margin-bottom:18px">${sys.intro}</p>

      <div class="p-section">
        <div class="p-section-title">Chiffres clés</div>
        <div class="stat-row">
          ${sys.stats.map(s=>`<div class="stat-box"><div class="stat-val" style="color:${c}">${s.val}</div><div class="stat-label">${s.label}</div></div>`).join('')}
        </div>
      </div>

      <div class="p-section">
        <div class="p-section-title">Tensions & Points chauds</div>
        ${sys.tensions.map(t=>`<div class="tension-item" style="border-color:${c}">
          <div class="tension-title" style="color:${c}">${t.title}</div>
          <div class="tension-desc">${t.desc}</div>
        </div>`).join('')}
      </div>

      <div class="p-section">
        <div class="p-section-title">Acteurs clés</div>
        <div class="actor-chips">${sys.actors.map(a=>`<span class="actor-chip">${a}</span>`).join('')}</div>
      </div>

      <div class="p-section">
        <div class="p-section-title">Études de cas</div>
        ${sys.cases.map(cs=>`<div class="case-item">
          <div class="case-title">${cs.flag} ${cs.title}</div>
          <div class="case-desc">${cs.desc}</div>
        </div>`).join('')}
      </div>

      <div class="p-section">
        <div class="p-section-title">Scénarios 2050</div>
        <div class="scenario-row">
          ${sys.scenarios.map(s=>`<div class="scenario-box" style="border-color:${s.color}22;background:${s.color}08">
            <div class="scenario-label" style="color:${s.color}">${s.label}</div>
            <div class="scenario-desc">${s.desc}</div>
          </div>`).join('')}
        </div>
      </div>

      <div class="p-section">
        <div class="p-section-title">Systèmes connexes</div>
        <div class="link-chips">
          ${sys.links.map(l=>{const ls=GEO.systems.find(s=>s.id===l)||{};return`<button class="link-chip" style="color:${ls.color||'#e8dfc4'};border-color:${ls.color||'#e8dfc4'}44" onclick="openSystem('${l}')">${ls.icon||''} ${ls.title||l}</button>`;}).join('')}
        </div>
      </div>
    </div>`;
  document.getElementById('panel-inner').innerHTML=html;

  showFilRouge(id);

// ── Open country ──
function openCountry(id){
  const country=GEO.countries[id];
  if(!country){
    // Generic
    const name=COUNTRIES_SVG.find(c=>c.id===id)?.name||id;
    document.getElementById('panel-inner').innerHTML=`<div style="position:relative"><button class="panel-close" onclick="closePanel()">✕</button><div class="p-title">${name}</div><p style="font-size:.82rem;color:rgba(232,223,196,.5);margin-top:12px;font-style:italic">Données détaillées disponibles pour les grandes puissances. Cliquez sur un système pour explorer les dynamiques mondiales.</p></div>`;
    document.getElementById('right-panel').classList.add('open');
    return;
  }
  let html=`<div style="position:relative">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div style="font-size:2rem;margin-bottom:6px">${country.flag}</div>
    <div class="p-title">${country.name}</div>
    <div style="display:flex;gap:12px;margin:10px 0 16px">
      <div class="stat-box"><div class="stat-val" style="color:#e8dfc4;font-size:.9rem">${country.pop}</div><div class="stat-label">Population</div></div>
      <div class="stat-box"><div class="stat-val" style="color:#e8dfc4;font-size:.9rem">${country.pib}</div><div class="stat-label">PIB</div></div>
    </div>
    <div class="p-section">
      <div class="p-section-title">🔴 Dépendances critiques</div>
      <div class="country-dep">${country.deps.map(d=>`<div class="dep-item">${d}</div>`).join('')}</div>
    </div>
    <div class="p-section">
      <div class="p-section-title">⚠️ Vulnérabilités</div>
      <div class="country-dep">${country.vulns.map(d=>`<div class="vuln-item">${d}</div>`).join('')}</div>
    </div>
    <div class="p-section">
      <div class="p-section-title">🌍 Rôles mondiaux</div>
      <div class="country-dep">${country.roles.map(d=>`<div class="role-item">${d}</div>`).join('')}</div>
    </div>
    <div class="p-section">
      <div class="p-section-title">⚔️ Tensions actives</div>
      <div class="actor-chips">${country.tensions.map(t=>`<span class="actor-chip" style="border-color:rgba(224,64,64,.3);color:rgba(232,180,180,.8)">${t}</span>`).join('')}</div>
    </div>
  </div>`;
  document.getElementById('panel-inner').innerHTML=html;
  document.getElementById('right-panel').classList.add('open');
  // Highlight country
  document.querySelectorAll('.country-path').forEach(p=>{
    p.classList.toggle('active-country',p.dataset.id===id);
    p.setAttribute('stroke',p.dataset.id===id?'rgba(232,223,196,0.6)':'#0b1120');
  });
}

function closePanel(){
  document.getElementById('right-panel').classList.remove('open');
  document.querySelectorAll('.sys-btn,.sys-pill').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.country-path').forEach(p=>{p.setAttribute('stroke','#0b1120');p.classList.remove('active-country');});
  document.getElementById('fil-rouge').style.display='none';
  currentSystem=null;
}

// ── Fil Rouge ──
const FIL_ROUGE={
  eau:[{id:'eau',label:'Stress hydrique',c:'#3ab4d4'},{id:'alimentation',label:'Sécurité alimentaire',c:'#80c840'},{id:'demographie',label:'Pression démographique',c:'#e87040'},{id:'tensions',label:'Conflits transfrontaliers',c:'#e04040'}],
  energie:[{id:'energie',label:'Minerais critiques',c:'#e8c040'},{id:'tensions',label:'Rivalités géopolitiques',c:'#e04040'},{id:'flux',label:'Routes approvisionnement',c:'#4080e0'},{id:'transitions',label:'Transition énergétique',c:'#40c880'}],
  alimentation:[{id:'alimentation',label:'Production alimentaire',c:'#80c840'},{id:'eau',label:'Irrigation',c:'#3ab4d4'},{id:'demographie',label:'Croissance pop.',c:'#e87040'},{id:'tensions',label:'Accaparement terres',c:'#e04040'}],
  demographie:[{id:'demographie',label:'Croissance pop.',c:'#e87040'},{id:'villes',label:'Urbanisation',c:'#c070e0'},{id:'alimentation',label:'Besoins alimentaires',c:'#80c840'},{id:'tensions',label:'Migrations forcées',c:'#e04040'}],
  villes:[{id:'villes',label:'Mégapoles',c:'#c070e0'},{id:'eau',label:'Pénuries urbaines',c:'#3ab4d4'},{id:'demographie',label:'Exode rural',c:'#e87040'},{id:'energie',label:'Consommation énergétique',c:'#e8c040'}],
  flux:[{id:'flux',label:'Routes maritimes',c:'#4080e0'},{id:'energie',label:'Transport pétrole/gaz',c:'#e8c040'},{id:'alimentation',label:'Commerce alimentaire',c:'#80c840'},{id:'tensions',label:'Points étranglement',c:'#e04040'}],
  tensions:[{id:'tensions',label:'Rivalités de puissance',c:'#e04040'},{id:'energie',label:'Ressources stratégiques',c:'#e8c040'},{id:'flux',label:'Contrôle routes',c:'#4080e0'},{id:'eau',label:'Diplomatie eau',c:'#3ab4d4'}],
};

function showFilRouge(id){
  const chain=FIL_ROUGE[id]||[];
  const fc=document.getElementById('fr-chain');
  fc.innerHTML=`<span class="fr-label">Fil rouge</span>`;
  chain.forEach((n,i)=>{
    const btn=document.createElement('button');
    btn.className='fr-node';btn.textContent=n.label;
    btn.style.color=n.c;btn.style.borderColor=n.c+'55';
    btn.addEventListener('click',()=>openSystem(n.id));
    fc.appendChild(btn);
    if(i<chain.length-1){const arr=document.createElement('span');arr.className='fr-arrow';arr.textContent='→';fc.appendChild(arr);}
  });
  document.getElementById('fil-rouge').style.display='';
}

</script>
